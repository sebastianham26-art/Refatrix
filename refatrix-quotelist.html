<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 견적 목록</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--gold:#B8893B;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1100px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:16px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input,select{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}.msg.ok{display:block;background:var(--income-bg);color:var(--income)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);position:relative}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .chip .n{display:inline-block;margin-left:5px;background:var(--expense);color:#fff;border-radius:999px;font-size:10px;padding:0 5px;min-width:16px;text-align:center}
  .chip.on .n{background:#fff;color:var(--expense)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
  th,td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.r,th.r{text-align:right}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px}
  .st.draft{background:#eef0f2;color:#555}.st.confirmed{background:#fdf3e3;color:#9a6512}
  .st.converted{background:var(--income-bg);color:var(--income)}.st.cancelled{background:var(--expense-bg);color:var(--expense)}
  .st.delete_pending{background:#fbe7e2;color:var(--expense);border:1px dashed #e7a99f}
  .guest{font-size:10px;font-weight:700;color:#7a4ea0;background:#f1ebf7;padding:1px 6px;border-radius:999px;margin-left:4px}
  .arrow{color:var(--income);font-weight:700}
  .pvrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .pvtag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pvtag.ok{background:var(--income-bg);color:var(--income)}.pvtag.warn{background:#fdf3e3;color:#9a6512}.pvtag.dev{background:#f1ebf7;color:#7a4ea0}
  .pvseg{background:#faf8f3;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:12px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">견적 목록 · 매출 추적</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div style="font-weight:800;color:var(--brand);margin-bottom:10px">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="filters">
        <div><label>시작일</label><input id="from" type="date"></div>
        <div><label>종료일</label><input id="to" type="date"></div>
        <div><button class="btn" onclick="load()">조회</button></div>
        <div style="margin-left:auto"><a href="refatrix-quote.html" style="text-decoration:none"><button class="btn ghost">＋ 새 견적</button></a></div>
      </div>
      <div class="chips" id="chips" style="margin-top:12px"></div>
      <div class="msg" id="msg"></div>
      <div id="listWrap" style="overflow-x:auto"><div class="hint" style="margin-top:12px">조회를 누르세요.</div></div>
    </div>
  </div>
</div>

<!-- 견적 상세 / 편집 모달 -->
<div id="dtModal" style="display:none;position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto">
  <div style="background:#fff;border-radius:14px;max-width:760px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)">
    <div style="display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)">
      <span style="font-size:15px;font-weight:800;color:var(--brand)" id="dtTitle">견적 상세</span>
      <button class="btn ghost sm" style="margin-left:auto" onclick="closeDetail()">닫기 ✕</button>
    </div>
    <div style="padding:16px 18px" id="dtBody"></div>
  </div>
</div>

<!-- 매출 전환 모달 -->
<div id="cvModal" style="display:none;position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:100;align-items:flex-start;justify-content:center;padding:50px 16px">
  <div style="background:#fff;border-radius:14px;max-width:460px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)">
    <div style="display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)">
      <span style="font-size:15px;font-weight:800;color:var(--brand)">매출 전환</span>
      <button class="btn ghost sm" style="margin-left:auto" onclick="closeConvert()">닫기 ✕</button>
    </div>
    <div style="padding:16px 18px">
      <div id="cvInfo" class="hint" style="margin-bottom:10px"></div>
      <div id="cvPreview" style="margin-bottom:12px"></div>
      <div id="cvGuestWrap" class="hidden">
        <label>고객 지정 (불특정 견적 → 등록 고객 선택)</label>
        <select id="cvCustomer" style="width:100%"></select>
        <div class="hint" style="margin:4px 0 10px">불특정 고객 견적은 등록된 고객을 지정해야 매출로 전환됩니다.</div>
      </div>
      <label>매출일 (인보이스 기록일)</label>
      <input id="cvDate" type="date" style="width:170px">
      <div class="hint" style="margin-top:8px">전환하면 재고가 차감되고, 임시 SAT 번호(TMP-)가 부여됩니다. 실제 SAT는 나중에 입력할 수 있습니다.</div>
      <div class="msg" id="cvMsg"></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn" id="cvBtn" onclick="doConvert()">전환 실행</button>
        <button class="btn ghost" onclick="closeConvert()">취소</button>
      </div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  let isDirector=false;
  let filter='all', counts={open:0,guest_pending:0};
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtq=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:3});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      isDirector=(d.user?.role==='director');
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      const today=new Date(); const first=new Date(today.getFullYear(),today.getMonth(),1);
      $('from').value=first.toISOString().slice(0,10); $('to').value=today.toISOString().slice(0,10);
      load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  function setFilter(f){ filter=f; renderChips(); load(); }
  function renderChips(){
    const defs=[['all','전체'],['open','견적후 미결'],['guest','불특정 미등록'],['delpend','🗑 삭제대기'],['converted','매출 전환됨']];
    $('chips').innerHTML=defs.map(([k,label])=>{
      let n=''; if(k==='open'&&counts.open)n='<span class="n">'+counts.open+'</span>';
      if(k==='guest'&&counts.guest_pending)n='<span class="n">'+counts.guest_pending+'</span>';
      if(k==='delpend'&&counts.delete_pending)n='<span class="n">'+counts.delete_pending+'</span>';
      return '<div class="chip'+(filter===k?' on':'')+'" onclick="setFilter(\''+k+'\')">'+label+n+'</div>';
    }).join('');
  }

  async function loadCounts(){
    try{ counts=await fetch(session.api+'/api/quotes/open-count',{headers:auth()}).then(r=>r.json()); }catch(e){ counts={open:0,guest_pending:0}; }
    renderChips();
  }

  async function load(){
    await loadCounts();
    const m=$('msg');m.className='msg';
    let qs='from='+($('from').value||'')+'&to='+($('to').value||'');
    if(filter==='open')qs+='&open=1';
    else if(filter==='guest')qs+='&guest=1';
    else if(filter==='converted')qs+='&status=converted';
    else if(filter==='delpend')qs+='&status=delete_pending';
    try{
      const d=await fetch(session.api+'/api/quotes?'+qs,{headers:auth()}).then(r=>r.json());
      render(d.items||[]);
    }catch(e){ $('listWrap').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }

  function render(items){
    if(!items.length){ $('listWrap').innerHTML='<div class="hint" style="margin-top:12px">해당 조건의 견적이 없습니다.</div>'; return; }
    const stLbl={draft:'작성중',confirmed:'확정',converted:'매출전환',cancelled:'취소',delete_pending:'🗑 삭제대기'};
    let html='<table><thead><tr>'
      +'<th>견적번호</th><th>견적일</th><th>고객</th><th>작성자</th><th class="r">SKU</th><th class="r">총수량</th><th class="r">IVA포함 총액</th><th>상태</th><th>매출일 / SAT</th><th>작업</th>'
      +'</tr></thead><tbody>';
    items.forEach(q=>{
      const conv=q.status==='converted';
      const canConvert = q.status==='draft' || q.status==='confirmed';
      let action='<button class="btn ghost sm" onclick=\'openDetail('+JSON.stringify(q.id)+')\'>상세</button>';
      if(canConvert) action+=' <button class="btn sm" onclick=\'openConvert('+JSON.stringify(q.id)+','+JSON.stringify(q.is_guest)+','+JSON.stringify(q.party_name||'')+')\'>매출 전환</button>';
      else if(conv) action+=' <span class="hint">전환완료</span>';
      html+='<tr>'
        +'<td><b class="qlink" style="cursor:pointer;color:var(--brand);text-decoration:underline;text-underline-offset:2px" onclick=\'openDetail('+JSON.stringify(q.id)+')\'>'+esc(q.quote_no||'')+'</b></td>'
        +'<td>'+esc(q.quote_date||'')+'</td>'
        +'<td>'+esc(q.party_name||'')+(q.is_guest?'<span class="guest">불특정</span>':'')+'</td>'
        +'<td>'+esc(q.creator_name||'—')+'</td>'
        +'<td class="r">'+(q.sku_count||0)+'</td>'
        +'<td class="r">'+fmtq(q.total_qty)+'</td>'
        +'<td class="r">'+fmt(q.total_mxn)+'</td>'
        +'<td><span class="st '+q.status+'">'+(stLbl[q.status]||q.status)+'</span></td>'
        +'<td>'+(conv?('<span class="arrow">→ '+esc(q.sale_date||'')+'</span>'+(q.sale_sat_no?'<br><span class="hint">'+esc(q.sale_sat_no)+'</span>':'')):'<span class="hint">미전환</span>')+'</td>'
        +'<td>'+action+'</td>'
        +'</tr>';
    });
    html+='</tbody></table>';
    html+='<div class="hint" style="margin-top:8px">총 '+items.length+'건 · 견적일과 매출일(전환일)을 함께 표시합니다. SAT가 TMP-로 시작하면 임시 번호입니다(나중에 실제 SAT 입력).</div>';
    $('listWrap').innerHTML=html;
  }

  // ===== 견적 상세 / 편집 =====
  let dtId=null, dtData=null, dtEdit=false;
  const stLblFull={draft:'작성중',confirmed:'확정',converted:'매출전환',cancelled:'취소',delete_pending:'삭제 승인대기'};
  async function openDetail(id){
    dtId=id; dtEdit=false;
    $('dtBody').innerHTML='<div class="hint">불러오는 중…</div>';
    $('dtModal').style.display='flex';
    try{ dtData=await fetch(session.api+'/api/quotes/'+id,{headers:auth()}).then(r=>r.json()); renderDetail(); }
    catch(e){ $('dtBody').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }
  function closeDetail(){ $('dtModal').style.display='none'; dtId=null; dtData=null; dtEdit=false; }
  const flagLbl={ok:'<span style="color:var(--income);font-weight:700">즉시</span>',low_stock:'<span style="color:#9a6512;font-weight:700">부족</span>',not_found:'<span style="color:#6B4FB0;font-weight:700">개발</span>'};
  function renderDetail(){
    const q=dtData.quote, lines=dtData.lines||[];
    $('dtTitle').textContent='견적 '+(q.quote_no||'')+' · '+(stLblFull[q.status]||q.status);
    const editable = q.status==='draft' || q.status==='confirmed';
    if(dtEdit){ renderEdit(); return; }
    let h='<div class="hint" style="margin-bottom:8px">고객 <b>'+esc(q.party_name||'')+'</b>'+(q.is_guest?' <span class="guest">불특정</span>':'')+' · 견적일 '+esc(q.quote_date||'')+(q.memo?(' · 메모: '+esc(q.memo)):'')+'</div>';
    h+='<div><table style="width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed">'
      +'<colgroup><col style="width:17%"><col style="width:30%"><col style="width:9%"><col style="width:12%"><col style="width:9%"><col style="width:14%"><col style="width:9%"></colgroup>'
      +'<thead><tr><th style="text-align:left">코드</th><th style="text-align:left">품명</th><th class="r">수량</th><th class="r">단가</th><th class="r">할인%</th><th class="r">라인합계</th><th>재고</th></tr></thead><tbody>';
    lines.forEach(l=>{
      h+='<tr style="vertical-align:top">'
        +'<td style="word-break:break-word">'+esc(l.ctr_code||l.input_code||'')+(l.syd_codes?'<br><span class="hint" style="font-size:10px">'+esc(l.syd_codes)+'</span>':'')+'</td>'
        +'<td style="word-break:break-word">'+esc(l.product_name||'(미등록)')+(l.app_text?'<br><span class="hint" style="font-size:10px">'+esc(l.app_text)+'</span>':'')+'</td>'
        +'<td class="r">'+fmtq(l.qty)+'</td>'
        +'<td class="r">'+fmt(l.list_price)+'</td>'
        +'<td class="r">'+(Number(l.discount_rate)||0)+'%</td>'
        +'<td class="r">'+fmt(l.line_total)+'</td>'
        +'<td style="word-break:break-word">'+(flagLbl[l.stock_flag]||l.stock_flag||'')+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="text-align:right;margin-top:10px;font-size:13px">소계 <b>'+fmt(q.subtotal_mxn)+'</b> · IVA <b>'+fmt(q.iva_mxn)+'</b> · <span style="font-size:15px;color:var(--brand)">총액 <b>'+fmt(q.total_mxn)+'</b></span></div>';
    h+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">';
    if(editable){
      h+='<button class="btn" onclick="startEdit()">✎ SKU·수량 편집</button>';
      h+='<button class="btn ghost" style="color:var(--expense);border-color:#e7b6af" onclick="askDelete()">🗑 삭제 요청</button>';
    } else if(q.status==='delete_pending'){
      h+='<span class="hint" style="color:#9a6512">🗑 삭제 승인 대기 중'+(q.del_reason?(' — 사유: '+esc(q.del_reason)):'')+'. 디렉터 승인 전까지 집계에서 제외됩니다.</span>';
      if(isDirector){ h+='<button class="btn" onclick="approveDelete()">삭제 승인</button><button class="btn ghost" onclick="rejectDelete()">반려</button>'; }
    } else h+='<span class="hint">전환·취소된 견적은 편집·삭제할 수 없습니다 (보기 전용).</span>';
    h+='<button class="btn ghost" onclick="closeDetail()">닫기</button></div>';
    h+='<div id="delForm" style="margin-top:12px"></div>';
    $('dtBody').innerHTML=h;
  }
  function startEdit(){ dtEdit=true; renderDetail(); }
  function renderEdit(){
    const q=dtData.quote;
    if(!dtData._edit){ dtData._edit=(dtData.lines||[]).map(l=>({ input_code:(l.ctr_code||l.input_code||''), qty:Number(l.qty)||0, _name:l.product_name||'', _flag:l.stock_flag, _existing:true })); }
    const el=dtData._edit;
    let h='<div class="hint" style="margin-bottom:8px">이 견적에서는 <b>SKU 추가·삭제</b>와 <b>각 SKU 수량 조절</b>만 가능합니다. 단가·할인·고객 등 다른 변경이 필요하면 <b>신규 견적</b>으로 진행하세요. (저장 시 재고분류 자동 재계산)</div>';
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px"><thead><tr><th style="text-align:left">코드</th><th style="text-align:left">품명</th><th class="r">수량</th><th></th></tr></thead><tbody id="edRows">';
    el.forEach((l,i)=>{
      // 기존 라인: 코드 고정(읽기전용) · 수량만 조절. 신규 줄: 코드 입력 가능.
      const codeCell = l._existing
        ? '<b>'+esc(l.input_code)+'</b>'
        : '<input type="text" value="'+esc(l.input_code)+'" placeholder="CTR 또는 SYD" style="width:140px" onchange="edSet('+i+',\'input_code\',this.value)">';
      h+='<tr>'
        +'<td>'+codeCell+'</td>'
        +'<td>'+esc(l._name||(l._existing?'':'(추가 후 재계산)'))+(l._flag?' '+(flagLbl[l._flag]||''):'')+'</td>'
        +'<td class="r"><input type="number" step="1" min="0" value="'+l.qty+'" style="width:80px;text-align:right" onchange="edSet('+i+',\'qty\',this.value)"></td>'
        +'<td class="r"><button class="btn ghost sm" onclick="edDel('+i+')" title="이 SKU 삭제">✕</button></td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    h+='<div style="margin-top:8px"><button class="btn ghost sm" onclick="edAdd()">+ SKU 추가</button> <button class="btn ghost sm" onclick="edRecalc()">미리보기 재계산</button></div>';
    h+='<div id="edPreview" class="hint" style="margin-top:8px"></div>';
    h+='<div class="msg" id="edMsg"></div>';
    h+='<div style="display:flex;gap:8px;margin-top:14px"><button class="btn" onclick="saveEdit()">저장</button><button class="btn ghost" onclick="cancelEdit()">취소</button></div>';
    $('dtBody').innerHTML=h;
  }
  function edSet(i,k,v){ dtData._edit[i][k]= k==='qty'?(Number(v)||0):v; }
  function edDel(i){ dtData._edit.splice(i,1); renderEdit(); }
  function edAdd(){ dtData._edit.push({input_code:'',qty:1,_name:'',_flag:null,_existing:false}); renderEdit(); }
  function cancelEdit(){ dtData._edit=null; dtEdit=false; renderDetail(); }
  async function edRecalc(){
    const lines=(dtData._edit||[]).filter(l=>l.input_code&&l.qty>0).map(l=>({code:l.input_code,qty:l.qty}));
    if(!lines.length){ $('edPreview').textContent='유효한 줄이 없습니다.'; return; }
    try{
      const body={customer_id:dtData.quote.customer_id||null,lines};
      const d=await fetch(session.api+'/api/quotes/preview',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)}).then(r=>r.json());
      if(d&&d.lines){ dtData._edit.forEach(e=>{ const m=d.lines.find(x=>(x.ctr_code===e.input_code||x.input_code===e.input_code)); if(m){ e._name=m.product_name||'(미등록)'; e._flag=m.stock_flag; } });
        const t=d.totals||{}; renderEdit();
        $('edPreview').innerHTML='재계산: 총수량 <b>'+fmtq(t.totalQty||0)+'</b> · 총액 <b>'+fmt(t.total||0)+'</b>'; }
    }catch(e){ $('edPreview').textContent='재계산 실패'; }
  }
  async function saveEdit(){
    const m=$('edMsg'); m.className='msg';
    const lines=(dtData._edit||[]).filter(l=>l.input_code&&l.qty>0).map(l=>({code:l.input_code,qty:l.qty}));
    if(!lines.length){ m.className='msg err'; m.textContent='최소 한 줄 이상 입력하세요.'; return; }
    try{
      const body={customer_id:dtData.quote.customer_id||null,memo:dtData.quote.memo||null,lines};
      const res=await fetch(session.api+'/api/quotes/'+dtId,{method:'PUT',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)});
      const d=await res.json();
      if(!res.ok||d.error){ m.className='msg err'; m.textContent='저장 실패: '+(d.error==='already_converted'?'이미 매출 전환된 견적입니다':(d.error||res.status)); return; }
      m.className='msg ok'; m.textContent='저장되었습니다.';
      dtData._edit=null; dtEdit=false;
      dtData=await fetch(session.api+'/api/quotes/'+dtId,{headers:auth()}).then(r=>r.json());
      renderDetail(); load();
    }catch(e){ m.className='msg err'; m.textContent='서버 연결 실패'; }
  }

  function askDelete(){
    $('delForm').innerHTML='<div style="border:1px solid #e7b6af;border-radius:10px;padding:12px;background:#fbf0ee">'
      +'<label style="color:var(--expense)">삭제 사유 (디렉터 승인용) *</label>'
      +'<textarea id="delReason" rows="2" style="width:100%" placeholder="예: 고객 취소 / 중복 견적 / 오입력"></textarea>'
      +'<div class="msg" id="delMsg"></div>'
      +'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn" style="background:var(--expense)" onclick="submitDelete()">삭제 요청 보내기</button><button class="btn ghost" onclick="document.getElementById(\'delForm\').innerHTML=\'\'">취소</button></div>'
      +'<div class="hint" style="margin-top:6px">삭제 요청 즉시 집계(지표·추이)에서 제외되고, 디렉터 승인 시 완전 삭제됩니다. 반려되면 원래대로 복구됩니다.</div>'
      +'</div>';
  }
  async function submitDelete(){
    const m=$('delMsg'); m.className='msg';
    const reason=($('delReason')?$('delReason').value:'').trim();
    if(!reason){ m.className='msg err'; m.textContent='삭제 사유를 입력하세요.'; return; }
    try{
      const res=await fetch(session.api+'/api/quotes/'+dtId+'/delete-request',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({reason})});
      const d=await res.json();
      if(!res.ok||d.error){ m.className='msg err'; m.textContent='요청 실패: '+(d.note||d.error||res.status); return; }
      closeDetail(); load();
    }catch(e){ m.className='msg err'; m.textContent='서버 연결 실패'; }
  }
  async function approveDelete(){
    try{ const res=await fetch(session.api+'/api/quotes/'+dtId+'/delete-approve',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:'{}'});
      const d=await res.json(); if(!res.ok||d.error){ alert('승인 실패: '+(d.error||res.status)); return; }
      closeDetail(); load();
    }catch(e){ alert('서버 연결 실패'); }
  }
  async function rejectDelete(){
    try{ const res=await fetch(session.api+'/api/quotes/'+dtId+'/delete-reject',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:'{}'});
      const d=await res.json(); if(!res.ok||d.error){ alert('반려 실패: '+(d.error||res.status)); return; }
      closeDetail(); load();
    }catch(e){ alert('서버 연결 실패'); }
  }

  let cvId=null, cvGuest=false, custCache=null;
  async function loadCustomersOnce(){
    if(custCache)return custCache;
    try{ const d=await fetch(session.api+'/api/customers',{headers:auth()}).then(r=>r.json()); custCache=d.items||[]; }catch(e){ custCache=[]; }
    return custCache;
  }
  async function openConvert(id,isGuest,party){
    cvId=id; cvGuest=!!isGuest;
    $('cvMsg').className='msg';
    $('cvInfo').innerHTML='견적: <b>'+esc(party||'')+'</b>'+(isGuest?' <span class="guest">불특정</span>':'');
    $('cvDate').value=new Date().toISOString().slice(0,10);
    $('cvGuestWrap').classList.toggle('hidden',!cvGuest);
    if(cvGuest){
      const cs=await loadCustomersOnce();
      $('cvCustomer').innerHTML='<option value="">— 고객 선택 —</option>'+cs.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');
    }
    $('cvPreview').innerHTML='<div class="hint">분류 미리보기 불러오는 중…</div>';
    $('cvModal').style.display='flex';
    try{
      const pv=await fetch(session.api+'/api/quotes/'+id+'/convert-preview',{headers:auth()}).then(r=>r.json());
      renderPreview(pv);
    }catch(e){ $('cvPreview').innerHTML='<div class="hint">미리보기를 불러오지 못했습니다.</div>'; }
  }
  function renderPreview(pv){
    const c=pv.counts||{};
    let h='<div style="font-weight:700;color:var(--brand);margin-bottom:6px">전환 미리보기 (3갈래 분류)</div>';
    h+='<div class="pvrow"><span class="pvtag ok">① 즉시 매출 '+c.in_stock+'</span> <span class="pvtag warn">② 부족(발주) '+c.shortage+'</span> <span class="pvtag dev">③ 개발요청 '+c.new_dev+'</span></div>';
    if((pv.in_stock||[]).length) h+='<div class="pvseg"><b>① 즉시 매출</b><br>'+pv.in_stock.map(x=>esc(x.ctr_code)+' ×'+x.qty+' (재고 '+x.avail+')').join('<br>')+'</div>';
    if((pv.shortage||[]).length) h+='<div class="pvseg"><b>② 부족 → 가용분만 매출 + 부족분 기록</b><br>'+pv.shortage.map(x=>esc(x.ctr_code)+' 요청 '+x.qty+' / 출고 '+x.fulfill+' / <span style="color:var(--expense)">부족 '+x.short+'</span>').join('<br>')+'</div>';
    if((pv.new_dev||[]).length) h+='<div class="pvseg"><b>③ 미등록 → 개발요청 생성</b><br>'+pv.new_dev.map(x=>esc(x.input_code||'(코드없음)')+' ×'+x.qty).join('<br>')+'</div>';
    if(!(pv.in_stock||[]).length && !(pv.shortage||[]).length && !(pv.new_dev||[]).length) h+='<div class="hint">전환할 품목이 없습니다.</div>';
    $('cvPreview').innerHTML=h;
  }
  function closeConvert(){ $('cvModal').style.display='none'; cvId=null; }
  async function doConvert(){
    const m=$('cvMsg');m.className='msg';
    const body={inv_date:$('cvDate').value||null};
    if(cvGuest){
      const cid=$('cvCustomer').value;
      if(!cid){m.className='msg err';m.textContent='고객을 지정하세요(불특정 견적).';return;}
      body.customer_id=Number(cid);
    }
    $('cvBtn').disabled=true;
    try{
      const res=await fetch(session.api+'/api/quotes/'+cvId+'/convert',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)});
      const d=await res.json();
      if(!res.ok||d.error){
        let msg=d.error;
        if(d.error==='guest_needs_customer')msg='불특정 견적입니다. 고객을 지정하세요.';
        else if(d.error==='no_valid_lines')msg='전환할 유효한 품목이 없습니다(매칭된 제품 필요).';
        else if(d.error==='already_converted')msg='이미 전환된 견적입니다.';
        else if(d.error==='sale_failed')msg='매출 생성 실패: '+JSON.stringify(d.detail||{});
        m.className='msg err';m.textContent='전환 실패: '+msg;return;
      }
      m.className='msg ok';
      let parts=[];
      if(d.invoice_id) parts.push('인보이스 #'+d.invoice_id);
      if(d.shortages&&d.shortages.length) parts.push('부족 '+d.shortages.length+'건 기록');
      if(d.dev_requests) parts.push('개발요청 '+d.dev_requests+'건 생성');
      m.textContent='전환 완료 — '+(parts.join(' · ')||'처리됨');
      setTimeout(()=>{ closeConvert(); load(); },1400);
    }catch(e){m.className='msg err';m.textContent='서버 연결 실패';}
    finally{$('cvBtn').disabled=false;}
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
