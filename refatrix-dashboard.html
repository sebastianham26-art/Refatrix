<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 대시보드</title>
<style>
  :root{--paper:#F4F1EA;--brand:#143D34;--ink:#1A1A1A;--muted:#6B6B6B;--line:#E2DDD2;
    --income:#0F6E56;--expense:#B23A2E;--gold:#9A7B16;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1200px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:12px}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .who{font-size:13px;text-align:right}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .tabs{display:flex;gap:8px;margin-top:14px}
  .tab{padding:8px 14px;border:1px solid var(--line);border-radius:8px 8px 0 0;background:#efeae0;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted)}
  .tab.on{background:#fff;color:var(--brand);border-bottom-color:#fff}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px}
  .card h2{margin:0 0 10px;font-size:15px;color:var(--brand)}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600}
  input,select{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--brand)}
  .btn{padding:9px 16px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5}.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.gold{background:var(--gold)}.btn.sm{padding:6px 11px;font-size:12px}.btn.danger{background:var(--expense)}
  .msg{margin-top:12px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:#fbe9e7;color:var(--expense);border:1px solid #f0c5bf}
  .msg.ok{display:block;background:#e7f3ee;color:var(--income);border:1px solid #c2e0d4}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hint{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .hidden{display:none}
  /* 위젯 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-top:10px}
  .w{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;border-top:3px solid var(--catc, var(--brand))}
  .w .wh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .w .wt{font-size:14px;font-weight:800;color:var(--brand)}
  .w .wno{font-size:10px;color:var(--muted);font-weight:700}
  /* 카테고리 구역 */
  .catsec{margin-top:22px}
  .cathead{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .catdot{width:11px;height:11px;border-radius:3px;background:var(--catc,#888)}
  .catname{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--catc,#444)}
  .catcount{font-size:11px;color:var(--muted);font-weight:700}
  .catbar{height:2px;border-radius:2px;background:var(--catc,#ddd);opacity:.35;margin-top:4px}
  .catchip{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;background:var(--catbg,#eee);color:var(--catc,#555)}
  /* 상단 영역 바로가기 바 (고정) */
  .catnav{position:sticky;top:0;z-index:30;display:flex;gap:7px;flex-wrap:wrap;padding:10px 2px;margin-top:8px;background:var(--paper);border-bottom:1px solid var(--line)}
  .catnav button{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--catc,#ccc);background:#fff;color:var(--catc,#444);font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit}
  .catnav button:hover{background:var(--catbg,#f0f0f0)}
  .catnav button .nd{width:9px;height:9px;border-radius:3px;background:var(--catc,#888)}
  .catnav button .nc{font-size:10px;color:var(--muted);font-weight:700}
  .kpi{font-size:26px;font-weight:800;color:var(--brand)}.kpi small{font-size:13px;color:var(--muted);font-weight:600}
  .bar{background:#f0ece2;border-radius:8px;height:18px;overflow:hidden;margin-top:8px}.bar>div{height:100%;background:var(--income);color:#fff;font-size:11px;display:flex;align-items:center;padding-left:8px;white-space:nowrap}
  .pipe{display:flex;flex-direction:column;gap:5px;margin-top:4px}.prow{display:flex;align-items:center;gap:8px;font-size:12px}.pname{width:74px;font-weight:600;flex:0 0 auto}.pbar{flex:1;background:#f0ece2;border-radius:5px;height:13px;overflow:hidden}.pbar>div{height:100%;background:var(--brand)}.pn{width:24px;text-align:right;font-weight:700}
  .pend{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:13px}.pend b{color:var(--expense)}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:11.5px;background:#faf8f3}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .st-open{background:#fff4d6;color:#8a6512}.st-approved{background:#e7f3ee;color:var(--income)}.st-rejected{background:#fbe9e7;color:var(--expense)}
  /* 구성 편집기 */
  .wedit{border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px}
  .wedit .top{display:flex;align-items:center;gap:8px}
  .wedit .fld{display:inline-flex;align-items:center;gap:4px;font-size:12px;margin:4px 10px 0 0}
  .order{display:flex;gap:4px}
</style>
<link rel="stylesheet" href="refatrix-i18n.css?v=20260621j">
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">대시보드 · 위젯</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who" style="margin-left:14px"></div></div>

  <div class="card" id="loginCard">
    <h2>로그인</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="tabs" id="tabs"></div>

    <!-- 내 대시보드 -->
    <div id="tab-my">
      <div id="catNav" class="catnav"></div>
      <div id="widgetGrid"></div>
      <div class="card">
        <h2>대시보드 조정 요청</h2>
        <div class="hint" style="margin-top:0">원하는 변경(위젯 추가/제거 등)을 적어 보내면 디렉터가 검토해 반영합니다.</div>
        <div style="display:flex;gap:8px;margin-top:8px"><input id="reqNote" style="flex:1" placeholder="예: 마케팅 예산 위젯을 추가하고 싶어요"><button class="btn sm" id="reqSend">요청 보내기</button></div>
        <div class="msg" id="reqMsg"></div>
      </div>
    </div>

    <!-- 디렉터: 유저별 구성 -->
    <div id="tab-config" class="hidden">
      <div class="card">
        <h2>유저별 위젯 구성</h2>
        <div class="hint" style="margin-top:0">유저를 고르고 보여줄 위젯을 켜세요. 위젯 안의 세부 항목(필드)도 유저별로 켜고 끌 수 있습니다.</div>
        <label>유저</label><select id="cfgUser" style="min-width:220px"></select>
        <div id="cfgEditor" style="margin-top:10px"></div>
        <div id="cfgSensitive" style="margin-top:14px"></div>
        <button class="btn gold sm" id="cfgSave" style="margin-top:10px">이 유저 구성 저장</button>
        <div class="msg" id="cfgMsg"></div>
      </div>
    </div>

    <!-- 디렉터: 요청함 -->
    <div id="tab-requests" class="hidden">
      <div class="card">
        <h2>조정 요청함</h2>
        <div id="reqList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  let registry=[], portalSum=null, mktOv=null, salesData=null, finData=null, mktCust=null, miscData=null, curTab='my';
  let users=[], cfgUserId=null, cfgState=[];
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const isDirector=()=> session.user && session.user.role==='director';
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:0});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }

  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+(d.user?.name||login_id)+'</b><br>역할: '+(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      renderTabs(); await loadRegistry(); loadMyDashboard();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  function renderTabs(){
    const tabs=[['my','내 대시보드']];
    if(isDirector()){tabs.push(['config','유저별 위젯 구성']);tabs.push(['requests','조정 요청함']);}
    $('tabs').innerHTML=tabs.map(([k,n])=>`<div class="tab ${curTab===k?'on':''}" onclick="switchTab('${k}')">${n}</div>`).join('');
  }
  function switchTab(k){
    curTab=k;renderTabs();
    ['my','config','requests'].forEach(t=>$('tab-'+t).classList.toggle('hidden',t!==k));
    if(k==='config')loadConfigUsers();
    if(k==='requests')loadRequests();
    if(k==='my')loadMyDashboard();
  }

  async function loadRegistry(){
    try{registry=(await fetch(session.api+'/api/dashboard/registry',{headers:auth()}).then(r=>r.json())).widgets||[];}catch(e){registry=[];}
  }
  function regOf(key){return registry.find(w=>w.key===key);}

  // ===== 내 대시보드 =====
  async function loadMyDashboard(){
    $('widgetGrid').innerHTML='<div class="hint">불러오는 중…</div>';
    try{
      const [cfg,sum]=await Promise.all([
        fetch(session.api+'/api/dashboard/config',{headers:auth()}).then(r=>r.json()),
        fetch(session.api+'/api/portal/summary',{headers:auth()}).then(r=>r.json()),
      ]);
      portalSum=sum;
      const on=(cfg.config||[]).filter(c=>c.enabled);
      // 마케팅 위젯이 있으면 마케팅 개요 로드
      if(on.some(c=>c.widget_key==='W08_mkt_budget')){
        try{const now=new Date();const ym=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');
          mktOv=await fetch(session.api+'/api/marketing/overview?start='+ym,{headers:auth()}).then(r=>r.json());}catch(e){mktOv=null;}
      }
      // 영업(S__) 위젯이 있으면 salesdata 로드
      if(on.some(c=>c.widget_key.startsWith('S0'))){
        try{salesData=await fetch(session.api+'/api/dashboard/salesdata',{headers:auth()}).then(r=>r.json());}catch(e){salesData=null;}
      }
      // 마케팅/재무(M__/F__) 위젯이 있으면 findata 로드
      if(on.some(c=>/^(M0|F0)/.test(c.widget_key))){
        try{finData=await fetch(session.api+'/api/dashboard/findata',{headers:auth()}).then(r=>r.json());}catch(e){finData=null;}
      }
      // 제품/기타(P__/X__/U__) 위젯이 있으면 miscdata 로드
      if(on.some(c=>/^(P0|X0|U0)/.test(c.widget_key))){
        try{miscData=await fetch(session.api+'/api/dashboard/miscdata',{headers:auth()}).then(r=>r.json());}catch(e){miscData=null;}
      }
      renderWidgets(on);
    }catch(e){$('widgetGrid').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  const SCREEN_FILE={portal:'refatrix-portal.html',customers:'refatrix-customers.html',targets:'refatrix-targets.html',pipeline:'refatrix-pipeline.html',marketing:'refatrix-marketing.html',products:'refatrix-products.html',finance:'refatrix-finance.html',sales:'refatrix-sales.html',importcost:'refatrix-importcost.html',users:'refatrix-users.html',budget:'refatrix-budget.html'};
  function gotoScreen(link){ if(SCREEN_FILE[link]) location.href=SCREEN_FILE[link]; }

  // 카테고리 색상·순서 (영역 구분)
  const CAT_ORDER=['공통','영업','마케팅','재무','제품','기타'];
  const CAT_COLOR={
    '공통':{c:'#143D34',bg:'#e3ece8'},
    '영업':{c:'#1F6FB2',bg:'#e2eef7'},
    '마케팅':{c:'#9A4FB0',bg:'#f0e6f4'},
    '재무':{c:'#B23A2E',bg:'#f8e5e2'},
    '제품':{c:'#9A7B16',bg:'#f4edd9'},
    '기타':{c:'#5B6770',bg:'#e9ecee'},
  };
  function catColor(cat){return CAT_COLOR[cat]||{c:'#5B6770',bg:'#e9ecee'};}

  function catId(cat){return 'catsec-'+CAT_ORDER.indexOf(cat);}
  function scrollToCat(cat){const el=document.getElementById(catId(cat));if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

  function renderWidgets(list){
    const nav=$('catNav');
    if(!list.length){$('widgetGrid').innerHTML='<div class="hint">표시할 위젯이 없습니다. 디렉터에게 구성을 요청하세요.</div>';if(nav)nav.innerHTML='';return;}
    // 카테고리별로 그룹화(원래 순서 유지)
    const groups={};
    list.forEach(c=>{const r=regOf(c.widget_key);if(!r)return;(groups[r.cat]||=[]).push(c);});
    const cats=Object.keys(groups).sort((a,b)=>{const ia=CAT_ORDER.indexOf(a),ib=CAT_ORDER.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
    // 상단 바로가기 바
    if(nav) nav.innerHTML=cats.map(cat=>{const col=catColor(cat);
      return `<button style="--catc:${col.c};--catbg:${col.bg}" onclick="scrollToCat('${cat}')"><span class="nd"></span>${cat}<span class="nc">${groups[cat].length}</span></button>`;}).join('');
    // 영역별 위젯
    $('widgetGrid').innerHTML=cats.map(cat=>{
      const col=catColor(cat);
      const cards=groups[cat].map(c=>{
        const r=regOf(c.widget_key);
        const linkBtn=r.link?`<a class="btn ghost sm" style="padding:3px 9px;font-size:11px" href="${SCREEN_FILE[r.link]||'#'}">열기 →</a>`:'';
        return `<div class="w" style="--catc:${col.c}"><div class="wh"><span class="wt">${r.name}</span><span style="display:flex;gap:6px;align-items:center">${linkBtn}<span class="wno">${r.no}</span></span></div><div id="wbody-${c.widget_key}">${widgetHTML(c)}</div></div>`;
      }).join('');
      return `<div class="catsec" id="${catId(cat)}" style="--catc:${col.c};--catbg:${col.bg}">
        <div class="cathead"><span class="catdot"></span><span class="catname">${cat}</span><span class="catcount">위젯 ${groups[cat].length}</span></div>
        <div class="catbar"></div>
        <div class="grid">${cards}</div>
      </div>`;
    }).join('');
  }
  function widgetHTML(c){
    const s=c.settings||{};const b=portalSum?portalSum.badges||{}:{};const sd=salesData||{};const fd=finData||{};const md=miscData||{};
    switch(c.widget_key){
      case 'W01_sales_perf':{
        const p=portalSum&&portalSum.perf;if(!p)return '<div class="hint">데이터 없음</div>';
        const rate=p.rate==null?0:Math.min(100,p.rate);
        if(p.locked||s.amount===false) return `<div class="kpi">${p.rate==null?'—':p.rate+'%'} <small>달성률(${p.year})</small></div><div class="bar"><div style="width:${rate}%"></div></div>${p.locked?'<div class="hint">🔒 금액 권한 없음</div>':''}`;
        return `<div class="kpi">${p.rate==null?'—':p.rate+'%'} <small>달성률(${p.year})</small></div><div class="bar"><div style="width:${rate}%">${fmt(p.actual)}</div></div><div class="hint">목표 ${fmt(p.target)} · 실적 ${fmt(p.actual)} MXN</div>`;
      }
      case 'W02_pipeline':{
        const pp=portalSum&&portalSum.pipeline;if(!pp||!pp.length)return '<div class="hint">데이터 없음</div>';
        const mx=Math.max(1,...pp.map(x=>x.count));
        return '<div class="pipe">'+pp.map(x=>`<div class="prow"><div class="pname">${x.name.replace(/^\d+_/,'')}</div><div class="pbar"><div style="width:${Math.round(x.count/mx*100)}%"></div></div><div class="pn">${x.count}</div></div>`).join('')+'</div>';
      }
      case 'W03_pending':{
        const items=[];const add=(n,l)=>{if(n>0)items.push([n,l]);};
        if(portalSum&&portalSum.isDirector){add(b.target_approvals,'매출목표 승인 대기');add(b.marketing_approvals,'마케팅 승인 대기');add(b.sales_change_approvals,'매출 수정 승인 대기');add(b.directives_open_all,'지시 미완료');}
        add(b.directives_unread,'미읽음 지시');add(b.stalled_customers,'30일+ 정체 고객');add(b.target_rejected,'반려 매출목표');add(b.marketing_rejected,'반려 마케팅');add(b.overdue_customers,'연체 AR 고객');
        return items.length?items.map(([n,l])=>`<div class="pend"><span>${l}</span><b>${n}건</b></div>`).join(''):'<div class="hint">처리할 건이 없습니다 ✓</div>';
      }
      case 'W09_stalled':{
        const n=b.stalled_customers||0;
        let html=`<div class="kpi">${n} <small>명 정체(30일+)</small></div>`;
        if(s.ar) html+=`<div class="hint">연체 AR 고객: ${b.overdue_customers||0}명</div>`;
        return html;
      }
      case 'W08_mkt_budget':{
        if(!mktOv)return '<div class="hint">데이터 없음</div>';
        const months=mktOv.months||[];let bud=0,alloc=0;
        months.forEach(m=>{bud+=(mktOv.budget&&mktOv.budget[m])||0;alloc+=(mktOv.alloc_sum&&mktOv.alloc_sum[m])||0;});
        const rate=bud>0?Math.round(alloc/bud*100):0;
        if(s.amount===false) return `<div class="kpi">${rate}% <small>소진율</small></div><div class="bar"><div style="width:${Math.min(100,rate)}%"></div></div>`;
        return `<div class="kpi">${rate}% <small>소진율</small></div><div class="bar"><div style="width:${Math.min(100,rate)}%">${fmt(alloc)}</div></div><div class="hint">예산 ${fmt(bud)} · 배분 ${fmt(alloc)} MXN (연간)</div>`;
      }
      case 'W10_process':{
        return `<div class="hint" style="margin-top:0">업무 프로세스 지도(고객뷰·제품뷰)를 포털에서 단계별로 봅니다. 우측 상단 "열기 →"로 이동.</div>`;
      }
      case 'S01_customer_status':{
        const cu=sd.customers||{};
        let html=`<div class="kpi">${cu.count||0} <small>고객</small></div><div class="hint">연체 고객 ${cu.overdue||0}명</div>`;
        if(cu.locked) html+=`<div class="hint">🔒 미수금 권한 없음</div>`;
        else if(s.outstanding!==false) html+=`<div class="hint">총 미수금 ${fmt(cu.outstanding||0)} MXN</div>`;
        return html;
      }
      case 'S02_target_status':{
        const ts=sd.target_status||[];if(!ts.length)return '<div class="hint">데이터 없음</div>';
        const lbl={draft:'작성중',submitted:'제출됨',approved:'승인',rejected:'반려'};
        const col={draft:'#888',submitted:'var(--gold)',approved:'var(--income)',rejected:'var(--expense)'};
        return ts.map(t=>`<div class="pend"><span>${t.team}</span><b style="color:${col[t.status]||'#888'}">${lbl[t.status]||t.status}</b></div>`).join('');
      }
      case 'S03_pipeline_kanban':{
        const pp=portalSum&&portalSum.pipeline;if(!pp||!pp.length)return '<div class="hint">데이터 없음</div>';
        const mx=Math.max(1,...pp.map(x=>x.count));
        return '<div class="pipe">'+pp.map(x=>`<div class="prow"><div class="pname">${x.name.replace(/^\d+_/,'')}</div><div class="pbar"><div style="width:${Math.round(x.count/mx*100)}%"></div></div><div class="pn">${x.count}</div></div>`).join('')+'</div>';
      }
      case 'S04_bottleneck':{
        const n=b.stalled_customers||0;
        return `<div class="kpi">${n} <small>정체(30일+)</small></div><div class="hint">병목 단계는 파이프라인 화면에서 확인하세요.</div>`;
      }
      case 'S05_recent_meetings':{
        const rm=sd.recent_meetings||[];if(!rm.length)return '<div class="hint">최근 미팅이 없습니다.</div>';
        return '<table><tbody>'+rm.map(m=>`<tr><td style="padding:5px 6px">${m.d}</td><td style="padding:5px 6px"><b>${m.customer}</b></td><td style="padding:5px 6px">${m.advanced?`→ ${m.stage_after||''}`:'<span class="hint" style="margin:0">유지</span>'}</td></tr>`).join('')+'</tbody></table>';
      }
      case 'S06_directives':{
        const d=sd.directives||{};
        if(d.unread!=null) return `<div class="kpi">${d.unread} <small>미읽음 지시</small></div>`;
        return `<div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill st-open">미읽음 ${d.open||0}</span><span class="pill" style="background:#e7eef3;color:#2b5a78">진행 ${d.read||0}</span><span class="pill st-approved">완료 ${d.done||0}</span></div>`;
      }
      case 'S07_target_detail':{
        const p=portalSum&&portalSum.perf;if(!p)return '<div class="hint">데이터 없음</div>';
        const rate=p.rate==null?0:Math.min(100,p.rate);
        if(p.locked||s.amount===false) return `<div class="kpi">${p.rate==null?'—':p.rate+'%'} <small>달성률</small></div><div class="bar"><div style="width:${rate}%"></div></div>${p.locked?'<div class="hint">🔒 금액 권한 없음</div>':''}`;
        return `<div class="kpi">${p.rate==null?'—':p.rate+'%'} <small>달성률</small></div><div class="bar"><div style="width:${rate}%">${fmt(p.actual)}</div></div><div class="hint">목표 ${fmt(p.target)} · 실적 ${fmt(p.actual)}</div>`;
      }
      case 'M01_mkt_status':{
        const st=fd.marketing_status||'draft';
        const lbl={draft:'작성중',submitted:'제출됨',approved:'승인',rejected:'반려'};
        const col={draft:'#888',submitted:'var(--gold)',approved:'var(--income)',rejected:'var(--expense)'};
        return `<div class="kpi" style="color:${col[st]||'#888'}">${lbl[st]||st}</div><div class="hint">마케팅 계획 승인 단계</div>`;
      }
      case 'M02_mkt_budget':{
        const mk=fd.marketing;if(!mk)return '<div class="hint">데이터 없음</div>';
        const rate=mk.rate||0;
        if(mk.locked||s.amount===false) return `<div class="kpi">${rate}% <small>소진율</small></div><div class="bar"><div style="width:${Math.min(100,rate)}%"></div></div>${mk.locked?'<div class="hint">🔒 금액 권한 없음</div>':''}`;
        return `<div class="kpi">${rate}% <small>소진율</small></div><div class="bar"><div style="width:${Math.min(100,rate)}%">${fmt(mk.alloc)}</div></div><div class="hint">예산 ${fmt(mk.budget)} · 배분 ${fmt(mk.alloc)} MXN(연간)</div>`;
      }
      case 'M03_mkt_top':{
        const mk=fd.marketing;const top=(mk&&mk.top)||[];
        if(!top.length)return '<div class="hint">배분 데이터 없음</div>';
        return '<table><tbody>'+top.map(t=>`<tr><td style="padding:5px 6px"><b>${t.name}</b></td><td style="padding:5px 6px;text-align:right">${(mk.locked||s.amount===false)?(mk.locked?'🔒':''):fmt(t.total)+' MXN'}</td></tr>`).join('')+'</tbody></table>';
      }
      case 'F01_cashflow':{
        const cf=fd.cashflow;if(!cf)return '<div class="hint">데이터 없음</div>';
        if(cf.locked) return `<div class="hint">🔒 재무 금액 권한 없음</div>`;
        if(s.amount===false) return `<div class="hint">금액 숨김(표시 끔)</div>`;
        const net=cf.net||0;const col=net>=0?'var(--income)':'var(--expense)';
        return `<div class="kpi" style="color:${col}">${fmt(net)} <small>순현금(${cf.ym})</small></div><div class="hint">유입 ${fmt(cf.inflow)} · 유출 ${fmt(cf.outflow)} MXN</div>`;
      }
      case 'F02_plan_actual':{
        const pa=fd.plan_vs_actual;if(!pa)return '<div class="hint">데이터 없음</div>';
        const rate=pa.rate==null?0:Math.min(100,pa.rate);
        if(pa.locked||s.amount===false) return `<div class="kpi">${pa.rate==null?'—':pa.rate+'%'} <small>지출 집행률(${pa.ym})</small></div><div class="bar"><div style="width:${rate}%"></div></div>${pa.locked?'<div class="hint">🔒 금액 권한 없음</div>':''}`;
        return `<div class="kpi">${pa.rate==null?'—':pa.rate+'%'} <small>지출 집행률(${pa.ym})</small></div><div class="bar"><div style="width:${rate}%">${fmt(pa.actual)}</div></div><div class="hint">계획 ${fmt(pa.plan)} · 실적 ${fmt(pa.actual)} MXN</div>`;
      }
      case 'F03_ar_overdue':{
        const ar=fd.ar_overdue||{};
        let html=`<div class="kpi" style="color:var(--expense)">${ar.count||0} <small>연체 건</small></div>`;
        if(ar.locked) html+=`<div class="hint">🔒 연체액 권한 없음</div>`;
        else if(s.amount!==false) html+=`<div class="hint">연체 총액 ${fmt(ar.total||0)} MXN</div>`;
        return html;
      }
      case 'F04_pending':{
        const n=fd.pending_approvals||0;
        return `<div class="kpi">${n} <small>승인 대기</small></div><div class="hint">매출 수정/삭제 요청</div>`;
      }
      case 'F05_fx':{
        const fx=fd.fx;if(!fx)return '<div class="hint">환율 데이터 없음</div>';
        return `<div class="kpi">${Number(fx.rate).toFixed(2)} <small>MXN / USD</small></div><div class="hint">기준일 ${fx.date}</div>`;
      }
      case 'P01_product_count':{
        const p=md.products||{};
        return `<div class="kpi">${p.count||0} <small>제품(SKU)</small></div><div class="hint">제품마스터에서 차량적용·SyD 관리</div>`;
      }
      case 'X01_import_pending':{
        const ip=md.import_pending||{};
        return `<div class="kpi" style="color:${(ip.count||0)>0?'var(--gold)':'var(--brand)'}">${ip.count||0} <small>건 승인 대기</small></div><div class="hint">수입원가 배분 승인</div>`;
      }
      case 'X02_closed_periods':{
        const cp=md.closed_periods||{};
        return `<div class="kpi">${cp.count||0} <small>마감 기간</small></div><div class="hint">최근 마감: ${cp.latest||'없음'}</div>`;
      }
      case 'U01_user_status':{
        const u=md.users;if(!u)return '<div class="hint">디렉터만 볼 수 있습니다.</div>';
        const roleLbl={director:'디렉터',treasury:'재무',marketing:'마케팅',ops:'운영',sales:'영업',viewer:'열람'};
        const chips=Object.entries(u.by_role||{}).map(([r,n])=>`<span class="pill" style="background:#eef0ea;color:#444">${roleLbl[r]||r} ${n}</span>`).join(' ');
        return `<div class="kpi">${u.count||0} <small>사용자</small></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${chips}</div>`;
      }
      default: return '<div class="hint">—</div>';
    }
  }

  async function sendRequest(){
    const m=$('reqMsg');m.className='msg';m.style.display='none';
    const note=$('reqNote').value.trim();if(!note){m.className='msg err';m.style.display='block';m.textContent='요청 내용을 입력하세요.';return;}
    try{const res=await fetch(session.api+'/api/dashboard/request',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({note})});
      const d=await res.json();if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent='요청을 보냈습니다. 디렉터 검토 후 반영됩니다.';$('reqNote').value='';
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='서버 연결 실패';}
  }

  // ===== 디렉터: 유저별 구성 =====
  async function loadConfigUsers(){
    if(!users.length){try{users=(await fetch(session.api+'/api/users',{headers:auth()}).then(r=>r.json())).items||[];}catch(e){users=[];}}
    $('cfgUser').innerHTML=users.map(u=>`<option value="${u.id}">${u.name} (${u.login_id||u.role})</option>`).join('');
    if(users.length){cfgUserId=users[0].id;loadUserConfig(users[0].id);}
    $('cfgUser').onchange=()=>{cfgUserId=Number($('cfgUser').value);loadUserConfig(cfgUserId);};
  }
  async function loadUserConfig(uid){
    try{
      const full=await fetch(session.api+'/api/dashboard/config?user_id='+uid,{headers:auth()}).then(r=>r.json());
      const cfg=full.config||[];
      // 현재 켜진 위젯 맵
      const onMap={};cfg.forEach(c=>onMap[c.widget_key]={enabled:c.enabled,settings:c.settings||{}});
      // 전체 위젯을 나열하되, 현재 구성 순서 우선
      const ordered=[...cfg.map(c=>c.widget_key), ...registry.map(w=>w.key).filter(k=>!cfg.find(c=>c.widget_key===k))];
      cfgState=ordered.map(k=>({widget_key:k,enabled:onMap[k]?onMap[k].enabled:false,settings:onMap[k]?onMap[k].settings:{}}));
      renderEditor();
      renderSensitive(uid, full.sensitive||{});
    }catch(e){$('cfgEditor').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  function renderSensitive(uid, granted){
    const KEYS=[['fin_amount','재무 금액(캐시플로·집행)'],['ar_amount','미수·연체 금액'],['mkt_amount','마케팅 배분 금액'],['sales_amount','영업 목표·실적 금액']];
    const u=users.find(x=>String(x.id)===String(uid));
    if(u&&u.role==='director'){$('cfgSensitive').innerHTML='<div class="hint">디렉터는 모든 민감 금액을 볼 수 있습니다.</div>';return;}
    $('cfgSensitive').innerHTML='<div style="border-top:1px solid var(--line);padding-top:10px"><b style="font-size:13px;color:var(--brand)">🔒 민감 금액 표시 권한</b>'+
      '<div class="hint" style="margin:4px 0 8px">끄면 서버가 금액을 아예 내려보내지 않습니다(개발자도구로도 못 봄). 비율·건수는 그대로 보입니다.</div>'+
      KEYS.map(([k,label])=>`<label class="fld"><input type="checkbox" ${granted[k]?'checked':''} onchange="toggleSensitive(${uid},'${k}',this.checked)"> ${label}</label>`).join('')+'</div>';
  }
  async function toggleSensitive(uid,key,on){
    try{await fetch(session.api+'/api/dashboard/sensitive',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({user_id:uid,field_key:key,visible:on})});}catch(e){alert('실패');}
  }
  function renderEditor(){
    $('cfgEditor').innerHTML=cfgState.map((c,i)=>{
      const r=regOf(c.widget_key);if(!r)return '';
      const col=catColor(r.cat);
      const flds=(r.fields||[]).map(f=>`<label class="fld"><input type="checkbox" ${ (c.settings[f.key]!=null?c.settings[f.key]:f.def)?'checked':''} onchange="toggleField(${i},'${f.key}',this.checked)"> ${f.name}${f.note?` <span class="hint" style="margin:0">(${f.note})</span>`:''}</label>`).join('');
      return `<div class="wedit" style="--catc:${col.c};--catbg:${col.bg};border-left:3px solid ${col.c}"><div class="top">
        <label class="fld" style="margin:0"><input type="checkbox" ${c.enabled?'checked':''} onchange="toggleWidget(${i},this.checked)"> <b>${r.no} ${r.name}</b></label>
        <span class="catchip" style="margin-left:6px">${r.cat}</span>
        <span class="order" style="margin-left:auto"><button class="btn ghost sm" onclick="move(${i},-1)">▲</button><button class="btn ghost sm" onclick="move(${i},1)">▼</button></span>
      </div>${flds?`<div style="margin-top:4px">${flds}</div>`:''}</div>`;
    }).join('');
  }
  function toggleWidget(i,on){cfgState[i].enabled=on;}
  function toggleField(i,k,on){cfgState[i].settings={...cfgState[i].settings,[k]:on};}
  function move(i,dir){const j=i+dir;if(j<0||j>=cfgState.length)return;const t=cfgState[i];cfgState[i]=cfgState[j];cfgState[j]=t;renderEditor();}
  async function saveConfig(){
    const m=$('cfgMsg');m.className='msg';m.style.display='none';
    const widgets=cfgState.filter(c=>c.enabled).map(c=>({widget_key:c.widget_key,enabled:true,settings:c.settings}));
    try{const res=await fetch(session.api+'/api/dashboard/config',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({user_id:cfgUserId,widgets})});
      const d=await res.json();if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='저장 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent='구성을 저장했습니다.';
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='서버 연결 실패';}
  }

  // ===== 디렉터: 요청함 =====
  async function loadRequests(){
    $('reqList').innerHTML='<div class="hint">불러오는 중…</div>';
    try{
      const d=await fetch(session.api+'/api/dashboard/requests',{headers:auth()}).then(r=>r.json());
      const items=d.items||[];
      if(!items.length){$('reqList').innerHTML='<div class="hint">요청이 없습니다.</div>';return;}
      $('reqList').innerHTML='<table><thead><tr><th>유저</th><th>요청 내용</th><th>상태</th><th>처리</th></tr></thead><tbody>'+
        items.map(r=>`<tr><td><b>${r.user_name}</b> <span class="hint" style="margin:0">${r.user_role}</span><br><span class="hint" style="margin:0">${r.created_at}</span></td>
          <td style="max-width:320px;white-space:normal">${r.note}</td>
          <td><span class="pill st-${r.status}">${ {open:'대기',approved:'승인',rejected:'반려'}[r.status] }</span></td>
          <td>${r.status==='open'?`<button class="btn sm" onclick="decideReq(${r.id},true)">승인</button> <button class="btn danger sm" onclick="decideReq(${r.id},false)">반려</button>`:(r.decided_at||'')}</td></tr>`).join('')+'</tbody></table>'+
        '<div class="hint">승인 후 “유저별 위젯 구성”에서 실제 위젯을 반영하세요.</div>';
    }catch(e){$('reqList').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  async function decideReq(id,approve){
    try{await fetch(session.api+'/api/dashboard/requests/'+id+'/decide',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({approve})});loadRequests();}catch(e){alert('실패');}
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  $('reqSend').addEventListener('click',sendRequest);
  $('cfgSave').addEventListener('click',saveConfig);

  // 포털 자동 로그인
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
