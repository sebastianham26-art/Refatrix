<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 재고이동</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--gold:#B8893B;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1100px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input,select{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}.msg.ok{display:block;background:var(--income-bg);color:var(--income)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .inrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .inrow>div{display:flex;flex-direction:column}
  .acwrap{position:relative}
  .acbox{position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);margin-top:3px;max-height:260px;overflow:auto}
  .acitem{padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px}
  .acitem:last-child{border-bottom:none}.acitem.sel,.acitem:hover{background:#f0f5f2}
  .acitem .c{font-weight:700;color:var(--brand)}.acitem .s{font-size:11px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
  th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.r,th.r{text-align:right}
  .mv{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px}
  .mv.in{background:var(--income-bg);color:var(--income)}.mv.out{background:var(--expense-bg);color:var(--expense)}.mv.adjust{background:#eef0f2;color:#555}
  .org{font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;background:#f1ebf7;color:#7a4ea0}
  .org.매출{background:var(--expense-bg);color:var(--expense)}.org.수입{background:var(--income-bg);color:var(--income)}.org.수동{background:#fdf3e3;color:#9a6512}
  .stock-sum{position:sticky;top:0;z-index:5;display:flex;gap:10px;flex-wrap:wrap;background:#fff;border-bottom:2px solid var(--brand);padding:10px 2px;margin-bottom:8px}
  .stock-sum .sb{flex:1;min-width:120px;background:#faf8f3;border:1px solid var(--line,#E6E1D6);border-radius:10px;padding:9px 13px}
  .stock-sum .sb .v{font-size:19px;font-weight:800;color:var(--brand)}.stock-sum .sb .l{font-size:11px;color:var(--muted)}
  .daygrp{border:1px solid var(--line,#E6E1D6);border-radius:10px;margin-top:8px;overflow:hidden}
  .dayhd{background:#f4f1ea;padding:8px 12px;font-weight:800;color:var(--brand);display:flex;justify-content:space-between;align-items:center}
  .evrow{padding:8px 12px;border-top:1px solid var(--line,#eee);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .evrow:hover{background:#faf8f3}.evrow .caret{transition:transform .15s}.evrow.open .caret{transform:rotate(90deg)}
  .evdetail{display:none;background:#fcfbf8;padding:0 12px 8px}.evdetail.open{display:block}
  .mongrp{border:1px solid var(--line,#E6E1D6);border-radius:10px;margin-top:10px;overflow:hidden}
  .monhd{background:#eef2ee;padding:11px 14px;font-weight:800;color:var(--brand);display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px;font-size:14px}
  .monhd:hover{background:#e6ede7}.monhd .caret{transition:transform .15s}.monhd.open .caret{transform:rotate(90deg)}
  .monbody{display:none}.monbody.open{display:block}
  .evdate{display:inline-block;font-size:10.5px;color:var(--muted);background:#f0ece2;border-radius:5px;padding:1px 6px;margin-right:3px;font-weight:600}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .mchip{display:inline-block;padding:3px 10px;margin:2px;border-radius:999px;border:1px solid #ccc;background:#fff;color:#555;font-size:12px;cursor:pointer}
  .mchip.on{border-color:var(--brand);background:#e6f3ee;color:var(--brand);font-weight:700}
  .evhi{animation:evflash 2.4s ease-out}
  @keyframes evflash{0%{background:#fff6d6;box-shadow:0 0 0 3px #f0c419}40%{background:#fff6d6}100%{background:transparent;box-shadow:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">재고이동 (입고·출고·조정)</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <!-- 등록 -->
    <div class="card">
      <div class="card-h">이동 등록 <span class="hint" style="font-weight:500">— 참조번호 필수 (수입인보이스 / 샘플사유 등). 입고·출고·조정 모두 평균원가는 변경하지 않습니다.</span></div>
      <div class="inrow">
        <div style="min-width:120px"><label>유형</label>
          <select id="mtype" style="width:120px" onchange="onTypeChange()">
            <option value="in">입고 (+)</option>
            <option value="out">출고 (−)</option>
            <option value="adjust">조정 (±)</option>
          </select></div>
        <div class="acwrap" style="flex:1;min-width:200px"><label>제품 (CTR/SYD 검색)</label>
          <input id="prod" type="text" autocomplete="off" placeholder="코드/이름 입력" oninput="onProdInput()" onkeydown="prodKey(event)">
          <div id="acBox" class="acbox hidden"></div>
          <div class="hint" id="prodPick" style="margin-top:3px"></div>
        </div>
        <div style="min-width:100px"><label id="qtyLbl">수량</label><input id="qty" type="number" step="1" value="1" style="width:100px"></div>
        <div style="min-width:160px"><label>참조번호 *</label><input id="ref" type="text" placeholder="예: IMP-INV-2026-001" style="width:180px"></div>
        <div style="min-width:140px"><label>사유(선택)</label><input id="note" type="text" placeholder="예: 무료샘플" style="width:150px"></div>
        <div style="min-width:140px"><label>입고날짜 *</label><input id="mdate" type="date" style="width:150px"></div>
        <div><button class="btn" id="saveBtn" onclick="saveMove()">등록</button></div>
        <div style="margin-left:auto"><label>엑셀 일괄</label>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn ghost sm" onclick="downloadTemplate()">양식</button>
            <input id="xlsx" type="file" accept=".xlsx,.xls,.csv" onchange="onXlsx(event)" style="font-size:11px">
          </div>
        </div>
      </div>
      <div class="msg" id="saveMsg"></div>
      <div id="bulkPreview"></div>
    </div>

    <!-- 내역 -->
    <div class="card">
      <div class="card-h">이동 내역 <button class="btn ghost sm" style="float:right;font-size:11.5px;padding:3px 10px" onclick="openValueAudit()">재고금액 검토</button></div>
      <div id="stockSummary" class="stock-sum"><span class="hint">재고 요약 불러오는 중…</span></div>
      <div class="filters">
        <div style="flex-basis:100%;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span class="hint" style="margin:0">빠른 이동:</span><span id="monthChips"></span>
          <span style="margin-left:8px"><input id="evJump" type="text" inputmode="numeric" placeholder="이벤트 번호" style="width:110px" onkeydown="if(event.key==='Enter')jumpEvent()"> <button class="btn ghost sm" onclick="jumpEvent()">이벤트로 이동</button></span>
        </div>
        <div><label>유형</label><select id="fType" onchange="loadList()"><option value="">전체</option><option value="in">입고</option><option value="out">출고</option><option value="adjust">조정</option></select></div>
        <div><label>출처</label><select id="fSrc" onchange="loadList()"><option value="">전체</option><option value="manual">수동만</option></select></div>
        <div><label>시작일</label><input id="fFrom" type="date" onchange="loadList()"></div>
        <div><label>종료일</label><input id="fTo" type="date" onchange="loadList()"></div>
        <div style="flex:1;min-width:200px"><label>검색 (이벤트#3 · 참조 · 코드 · 품명)</label><input id="fSearch" type="text" placeholder="예: 3  또는  batch:2  또는  CTR-1001" onkeydown="if(event.key==='Enter')loadList()" style="width:100%"></div>
        <div style="align-self:flex-end"><button class="btn ghost sm" onclick="loadList()">검색</button> <button class="btn ghost sm" onclick="clearFilters()">초기화</button></div>
        <div><button class="btn ghost sm" onclick="loadList()">새로고침</button></div>
      </div>
      <div id="activeFilter"></div>
      <div id="listWrap"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
    </div>
  </div>
</div>

<!-- 재고금액 검토 모달 -->
<div id="vaModal" style="display:none;position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto">
  <div style="background:#fff;border-radius:14px;max-width:760px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3);max-height:calc(100vh - 80px);display:flex;flex-direction:column">
    <div style="padding:14px 18px;border-bottom:1px solid var(--line,#e6e1d6);display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:800;color:var(--brand);font-size:15px">재고금액 검토</div>
      <button class="btn ghost sm" onclick="closeValueAudit()">닫기 ✕</button>
    </div>
    <div style="padding:14px 18px;overflow:auto;flex:1">
      <div id="vaSummary" class="hint">불러오는 중…</div>
      <div id="vaList" style="margin-top:10px"></div>
    </div>
    <div style="padding:12px 18px;border-top:1px solid var(--line,#e6e1d6);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span id="vaMsg" style="font-size:12px;margin-right:auto"></span>
      <button class="btn ghost sm" id="vaZeroUnsup" onclick="resetValue('unsupported')">근거 없는 원가 0으로</button>
      <button class="btn ghost sm" id="vaZeroAll" onclick="resetValue('all')" style="border-color:var(--expense);color:var(--expense)">전체 0으로</button>
    </div>
  </div>
</div>

<!-- 수동입고 수정 모달 (이전) -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:14px;max-width:420px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3);padding:18px 20px">
    <div style="font-weight:800;color:var(--brand);font-size:15px;margin-bottom:4px">이벤트 일괄 수정</div>
    <div class="hint" id="emInfo" style="margin-bottom:10px"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><label style="font-size:12px;color:var(--muted)">입고 날짜 *</label><br><input id="emDate" type="date" style="width:100%;padding:7px 9px"></div>
      <div><label style="font-size:12px;color:var(--muted)">참조번호 *</label><br><input id="emRef" type="text" style="width:100%;padding:7px 9px"></div>
      <div><label style="font-size:12px;color:var(--muted)">사유(이름)</label><br><input id="emNote" type="text" placeholder="예: Luemi #1" style="width:100%;padding:7px 9px"></div>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;align-items:center">
      <span id="emMsg" style="font-size:12px;margin-right:auto"></span>
      <button class="btn ghost sm" onclick="closeEdit()">취소</button>
      <button class="btn" id="emSave" onclick="saveMoveEdit()">저장</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let session={token:null,user:null,api:''};
  let picked=null, acItems=[], acSel=-1, acTimer=null;
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtq=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:3});
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      if($('mdate') && !$('mdate').value) $('mdate').value=new Date().toISOString().slice(0,10);
      loadList();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  function onTypeChange(){
    const t=$('mtype').value;
    $('qtyLbl').textContent = t==='adjust' ? '수량 (±, 감소는 음수)' : '수량';
  }

  // 자동완성
  function onProdInput(){
    picked=null;$('prodPick').textContent='';
    const q=$('prod').value.trim(); clearTimeout(acTimer);
    if(q.length<1){hideAc();return;}
    acTimer=setTimeout(async()=>{
      try{ const d=await fetch(session.api+'/api/quotes/search-code?q='+encodeURIComponent(q),{headers:auth()}).then(r=>r.json()); acItems=d.items||[]; acSel=-1; renderAc(); }catch(e){ hideAc(); }
    },180);
  }
  function renderAc(){
    if(!acItems.length){hideAc();return;}
    $('acBox').innerHTML=acItems.map((it,i)=>'<div class="acitem'+(i===acSel?' sel':'')+'" onmousedown="event.preventDefault()" onclick="pickProd('+i+')"><span class="c">'+esc(it.ctr_code)+'</span> <span class="s">'+esc(it.name||'')+(it.syd_codes&&it.syd_codes.length?' · SYD '+esc(it.syd_codes.join(' / ')):'')+'</span></div>').join('');
    $('acBox').classList.remove('hidden');
  }
  function hideAc(){$('acBox').classList.add('hidden');acItems=[];acSel=-1;}
  function pickProd(i){ const it=acItems[i]; if(!it)return; picked=it; $('prod').value=it.ctr_code; $('prodPick').innerHTML='선택됨: <b>'+esc(it.ctr_code)+'</b> '+esc(it.name||''); hideAc(); $('qty').focus(); }
  function prodKey(e){
    if($('acBox').classList.contains('hidden'))return;
    if(e.key==='ArrowDown'){e.preventDefault();acSel=Math.min(acSel+1,acItems.length-1);renderAc();}
    else if(e.key==='ArrowUp'){e.preventDefault();acSel=Math.max(acSel-1,0);renderAc();}
    else if(e.key==='Enter'){e.preventDefault();if(acSel>=0)pickProd(acSel);}
    else if(e.key==='Escape')hideAc();
  }
  document.addEventListener('click',(e)=>{ if(!e.target.closest('#prod')&&!e.target.closest('#acBox')) hideAc(); });

  async function saveMove(){
    const m=$('saveMsg');m.className='msg';
    if(!picked){m.className='msg err';m.textContent='제품을 검색해서 선택하세요.';return;}
    const type=$('mtype').value, qty=Number($('qty').value), ref=$('ref').value.trim();
    const mdate=$('mdate').value;
    if(!ref){m.className='msg err';m.textContent='참조번호를 입력하세요.';return;}
    if(!mdate){m.className='msg err';m.textContent='입고 날짜를 입력하세요.';$('mdate').focus();return;}
    if(type!=='adjust' && (!qty||qty<=0)){m.className='msg err';m.textContent='수량을 입력하세요(양수).';return;}
    if(type==='adjust' && !qty){m.className='msg err';m.textContent='조정 수량을 입력하세요(증가 +, 감소 −).';return;}
    $('saveBtn').disabled=true;
    try{
      const res=await fetch(session.api+'/api/stock/movements',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({product_id:picked.product_id,move_type:type,qty,ref,note:$('note').value.trim(),moved_at:mdate})});
      const d=await res.json();
      if(!res.ok||d.error){
        let msg=d.error;
        if(d.error==='would_go_negative')msg='재고 부족: '+d.code+' 현재 '+d.current+', 요청 '+d.requested;
        if(d.error==='ref_required')msg='참조번호는 필수입니다.';
        m.className='msg err';m.textContent='등록 실패: '+msg;return;
      }
      m.className='msg ok';m.textContent='등록됨: '+d.code+' '+d.before+'→'+d.after;

      const mOutQ=evKeys.reduce((s,k)=>s+evs[k].filter(m=>m.move_type==='out').reduce((t,m)=>t+Math.abs(m.qty),0),0);
      const mqp=[]; if(mInQ)mqp.push('+'+fmtq(mInQ)); if(mOutQ)mqp.push('−'+fmtq(mOutQ));
      const monId='mon'+mi; const monOpen=(mi===0); // 최신 월만 펼친 상태로 시작
      html+='<div class="mongrp"><div class="monhd'+(monOpen?' open':'')+'" onclick="toggleMon(\''+monId+'\')"><span><span class="caret">▶</span> '+esc(monLabel(mo))+' <span class="hint">'+monCount+'건</span></span><span class="hint">'+mqp.join(' · ')+'</span></div>';
      html+='<div class="monbody'+(monOpen?' open':'')+'" id="'+monId+'">';
      // 이벤트 정렬: 최신 날짜 → 큰 이벤트 번호 순
      evKeys.sort((a,b)=>{ const A=evs[a][0],B=evs[b][0]; const d=new Date(B.moved_at)-new Date(A.moved_at);
        return d!==0?d:((B.event_no||0)-(A.event_no||0)); });
      evKeys.forEach(ek=>{

        const adjQ=arr.filter(m=>m.move_type==='adjust').reduce((s,m)=>s+Math.abs(m.qty),0);
        const qp=[]; if(inQ)qp.push('+'+fmtq(inQ)); if(outQ)qp.push('−'+fmtq(outQ)); if(adjQ)qp.push('조정 '+fmtq(adjQ));
        const label=evLabel(arr[0]);

        const allManual=arr.every(m=>m.origin!=='매출'&&m.origin!=='수입');
        html+='<div class="evrow" data-ev="'+(evNo!=null?evNo:'')+'" data-batch="'+(batchId!=null?batchId:'')+'" onclick="toggleEv(\''+id+'\')"><span><span class="caret">▶</span> '+evTitle+' <span class="hint">'+arr.length+'건</span></span><span class="hint">'+qp.join(' · ')+'</span></div>';
        html+='<div class="evdetail" id="'+id+'" data-ev="'+(evNo!=null?evNo:'')+'" data-batch="'+(batchId!=null?batchId:'')+'">';
        if(allManual && evNo!=null)
          html+='<div style="padding:6px 4px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost sm" style="padding:3px 10px;font-size:11.5px" onclick="editEvent('+evNo+')">✎ 이벤트 #'+evNo+' 일괄 수정 (날짜·참조·사유)</button>'
            +'<button class="btn ghost sm" style="padding:3px 10px;font-size:11.5px;border-color:var(--expense);color:var(--expense)" onclick="deleteEvent('+evNo+')">🗑 이벤트 #'+evNo+' 삭제</button></div>';

        else
          html+='<div class="hint" style="padding:6px 4px">자동 기록(매출) 이벤트는 수정·삭제할 수 없습니다.</div>';
        html+='<table><thead><tr><th>시각</th><th>제품</th><th class="r">수량</th><th>참조</th><th>사유</th><th>담당</th></tr></thead><tbody>';
        arr.forEach(m=>{ const dt=new Date(m.moved_at); const ts=isNaN(dt)?'':dt.toTimeString().slice(0,5);
          const sign=m.move_type==='out'?'−':(m.move_type==='in'?'+':'');
          html+='<tr><td>'+ts+'</td><td><b>'+esc(m.ctr_code||'')+'</b> <span class="hint">'+esc(m.product_name||'')+'</span></td>'
            +'<td class="r">'+sign+fmtq(Math.abs(m.qty))+'</td><td>'+esc(m.ref||'')+'</td><td>'+esc(reasonOf(m))+'</td><td class="hint">'+esc(m.created_by_name||'')+'</td></tr>'; });
        html+='</tbody></table></div>';
      });
      html+='</div></div>';
    });
    html+='<div class="hint" style="margin-top:8px">'+(meta.capped?'<span style="color:var(--expense);font-weight:700">⚠ 최근 '+items.length+'건만 표시됩니다.</span> 더 과거의 월이 안 보이면 위의 월 칩(예: 2026·4월)을 누르거나 시작일·종료일을 지정하세요. ':'최근 '+items.length+'건 · ')+'월을 클릭해 펼치고, 이벤트를 클릭하면 품목 내역이 펼쳐집니다. 이벤트마다 번호가 부여되며, 수동 이벤트는 [일괄 수정]·[삭제]가 가능합니다.</div>';
    $('listWrap').innerHTML=html;
    // 검색 시 자동으로 모든 월·이벤트 펼치기 (바로 보이도록)
    if(meta.searched){

      document.querySelectorAll('.evdetail').forEach(d=>{ d.classList.add('open'); const row=d.previousElementSibling; if(row)row.classList.add('open'); });

      const det=document.querySelector('.evdetail[data-ev="'+meta.focusEv+'"]');

      const tgt=row||det;
      if(tgt){ tgt.scrollIntoView({behavior:'smooth',block:'center'}); tgt.classList.add('evhi'); setTimeout(()=>tgt.classList.remove('evhi'),2500); }
    }
  }

        +'근거 없음 <b style="color:var(--expense)">$'+fmt(d.unsupported)+'</b>';
      if(!d.items.length){ $('vaList').innerHTML='<div class="hint" style="margin-top:8px">재고금액이 있는 제품이 없습니다.</div>'; return; }
      let h='<div style="max-height:340px;overflow:auto;border:1px solid var(--line,#e6e1d6);border-radius:8px"><table style="margin:0;font-size:12px"><thead><tr><th>제품</th><th class="r">재고수량</th><th class="r">평균원가</th><th class="r">재고금액</th><th>근거</th></tr></thead><tbody>';
      d.items.forEach(p=>{ h+='<tr><td><b>'+esc(p.code)+'</b> <span class="hint">'+esc(p.name||'')+'</span></td>'
        +'<td class="r">'+fmtq(p.stock_qty)+'</td><td class="r">'+fmt(p.avg_cost)+'</td><td class="r"><b>'+fmt(p.value)+'</b></td>'
        +'<td>'+(p.has_import?'<span style="color:var(--income)">수입 입고</span>':'<span style="color:var(--expense)">근거 없음</span>')+'</td></tr>'; });
      h+='</tbody></table></div><div class="hint" style="margin-top:6px">평균원가는 수입 입고 시에만 설정됩니다. 수입 이력이 없는 제품의 재고금액은 근거가 없으므로 0으로 처리할 수 있습니다.</div>';
      $('vaList').innerHTML=h;
    }catch(e){ $('vaSummary').textContent='불러오지 못했습니다.'; }
  }
  function closeValueAudit(){ $('vaModal').style.display='none'; }
  async function resetValue(scope){
    const msg=$('vaMsg'); msg.style.color='';
    const label = scope==='all' ? '모든 제품의 평균원가를 0으로 만들어 재고금액을 0으로 합니다.' : '수입 이력이 없는(근거 없는) 제품의 평균원가만 0으로 만듭니다.';
    if(!confirm(label+'\n\n진행할까요? (되돌리려면 다시 수입 입고를 해야 합니다)')) return;
    $('vaZeroUnsup').disabled=true; $('vaZeroAll').disabled=true;
    try{
      const r=await fetch(session.api+'/api/stock/value-audit/reset',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({scope})});
      const d=await r.json();
      if(!r.ok||d.error){ msg.style.color='var(--expense)';msg.textContent='처리 실패'; }
      else { await openValueAudit(); loadSummary(); msg.style.color='var(--income)';msg.textContent=d.zeroed+'개 제품의 평균원가를 0으로 처리했습니다.'; }
    }catch(e){ msg.style.color='var(--expense)';msg.textContent='서버 연결 실패'; }
    finally{ $('vaZeroUnsup').disabled=false; $('vaZeroAll').disabled=false; }
  }
  function editEvent(evNo){
    evNo=Number(evNo);
    const arr=curItems.filter(x=>Number(x.event_no)===evNo);
    if(!arr.length)return;
    editEventNo=evNo;
    const codes=arr.map(m=>m.ctr_code).filter(Boolean);
    const codeList=codes.slice(0,4).join(', ')+(codes.length>4?(' 외 '+(codes.length-4)+'건'):'');
    $('emInfo').textContent='이벤트 #'+evNo+' · '+arr.length+'건 ('+codeList+') — 날짜·참조·사유를 한 번에 변경합니다.';
    const m0=arr[0]; const dt=new Date(m0.moved_at);
    $('emDate').value=isNaN(dt)?'':dt.toISOString().slice(0,10);
    $('emRef').value=m0.ref||''; $('emNote').value=m0.note||''; $('emMsg').textContent='';
    $('editModal').style.display='flex';
  }
  function closeEdit(){ $('editModal').style.display='none'; editEventNo=null; }
  async function deleteBatch(batchId){
    batchId=Number(batchId);
    const arr=curItems.filter(x=>Number(x.batch_id)===batchId);
    const n=arr.length;
    if(!confirm('수입 batch:'+batchId+' ('+n+'건)을 모두 삭제합니다.\n입고된 수량이 재고에서 차감됩니다.\n되돌릴 수 없습니다. 진행할까요?')) return;
    try{
      const r=await fetch(session.api+'/api/stock/batches/'+batchId,{method:'DELETE',headers:auth()});
      const d=await r.json();
      if(!r.ok||d.error){ alert(d.note||'삭제 실패'); return; }
      loadList();
    }catch(e){ alert('서버 연결 실패'); }
  }
  async function deleteEvent(evNo){
    evNo=Number(evNo);
    const arr=curItems.filter(x=>Number(x.event_no)===evNo);
    const n=arr.length;
    if(!confirm('이벤트 #'+evNo+' ('+n+'건)을 삭제합니다.\n입고는 재고에서 차감, 출고는 재고로 복원됩니다.\n되돌릴 수 없습니다. 진행할까요?')) return;
    try{
      const r=await fetch(session.api+'/api/stock/events/'+evNo,{method:'DELETE',headers:auth()});
      const d=await r.json();
      if(!r.ok||d.error){ alert(d.note||(d.error==='linked'?'매출·수입 연동 이벤트는 삭제할 수 없습니다.':'삭제 실패')); return; }
      loadList();
    }catch(e){ alert('서버 연결 실패'); }
  }
  async function saveMoveEdit(){
    if(editEventNo==null)return; const msg=$('emMsg');msg.style.color='';
    const moved_at=$('emDate').value, ref=$('emRef').value.trim(), note=$('emNote').value.trim();
    if(!moved_at){msg.style.color='var(--expense)';msg.textContent='입고 날짜를 입력하세요.';return;}
    if(!ref){msg.style.color='var(--expense)';msg.textContent='참조번호를 입력하세요.';return;}
    $('emSave').disabled=true;
    try{
      const r=await fetch(session.api+'/api/stock/events/'+editEventNo,{method:'PATCH',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({moved_at,ref,note})});
      const d=await r.json();
      if(!r.ok||d.error){ msg.style.color='var(--expense)';msg.textContent=d.note||(d.error==='not_manual'?'자동 기록 이벤트는 수정할 수 없습니다.':'수정 실패'); $('emSave').disabled=false; return; }
      closeEdit(); loadList();
    }catch(e){ msg.style.color='var(--expense)';msg.textContent='서버 연결 실패'; }
    finally{ $('emSave').disabled=false; }
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
