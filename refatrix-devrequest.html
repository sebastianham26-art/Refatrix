<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 제품개발요청</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--gold:#B8893B;--purple:#6B4FB0;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1150px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input,select,textarea{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  textarea{width:100%;resize:vertical}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}.msg.ok{display:block;background:var(--income-bg);color:var(--income)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .kpis{display:flex;gap:12px;flex-wrap:wrap}
  .kpi{flex:1;min-width:150px;background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .kpi .v{font-size:24px;font-weight:800;color:var(--brand)}.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  th,td{padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:top}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.r,th.r{text-align:right}
  .st{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px}
  .st.received{background:#eef0f2;color:#555}.st.reviewed{background:#fdf3e3;color:#9a6512}
  .st.factory_requested{background:#e8eefb;color:#2f5db2}.st.developed{background:var(--income-bg);color:var(--income)}.st.cancelled{background:var(--expense-bg);color:var(--expense)}
  .stage{display:flex;gap:3px;align-items:center;font-size:10px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:#dcd7cb;display:inline-block}
  .dot.on{background:var(--income)}
  .modal{position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .box{background:#fff;border-radius:14px;max-width:540px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .hd{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .bd{padding:16px 18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .seg{border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px}
  .seg h4{margin:0 0 8px;font-size:12.5px;color:var(--brand)}
  .mrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .mrow .ml{font-size:12px;color:#6f6a60;font-weight:600;margin-right:4px}
  .mbtn{min-width:38px;padding:6px 9px;border:1px solid var(--line,#e0dccb);background:#fff;border-radius:8px;font-size:12px;font-weight:700;color:#8a8676;cursor:pointer}
  .mbtn.on{background:var(--brand,#143D34);color:#fff;border-color:var(--brand,#143D34)}
</style>
<link rel="stylesheet" href="refatrix-i18n.css?v=20260621j">
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">제품개발요청 (경쟁사 코드 대응)</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <!-- KPI -->
    <div class="card">
      <div class="card-h">이번 달 개발 KPI</div>
      <div class="kpis">
        <div class="kpi"><div class="v" id="kCompleted">–</div><div class="l">당월 개발완료 건수</div></div>
        <div class="kpi"><div class="v" id="kAvg">–</div><div class="l">평균 소요일 (요청→완료)</div></div>
        <div class="kpi"><div class="v" id="kOpen">–</div><div class="l">진행 중 (미완료)</div></div>
      </div>
    </div>

    <!-- 신규 접수 -->
    <div class="card">
      <div class="card-h">① 오더 접수 (영업) <span class="hint" style="font-weight:500">— 경쟁사 코드로 고객 요청을 접수합니다</span></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div><label>경쟁사 코드 *</label><input id="nCode" type="text" placeholder="예: COMP-XYZ" style="width:150px"></div>
        <div><label>고객</label><select id="nCust" style="width:200px"></select></div>
        <div><label>요청수량</label><input id="nQty" type="number" step="1" style="width:100px"></div>
        <div style="flex:1;min-width:160px"><label>접수 메모</label><input id="nMemo" type="text" style="width:100%"></div>
        <div><button class="btn" onclick="createReq()">접수 등록</button></div>
      </div>
      <div class="msg" id="nMsg"></div>
    </div>

    <!-- 목록 -->
    <div class="card">
      <div class="card-h">개발요청 목록</div>
      <div class="mrow" id="months" style="margin:4px 0 10px"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select id="fStatus" onchange="load()"><option value="">전체</option><option value="received">접수</option><option value="reviewed">검토완료</option><option value="factory_requested">공장요청</option><option value="developed">개발완료</option><option value="cancelled">취소</option></select>
        <button class="btn ghost sm" onclick="load()">새로고침</button>
      </div>
      <div id="listWrap"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
    </div>
  </div>
</div>

<!-- 상세/단계 모달 -->
<div class="modal" id="dModal">
  <div class="box">
    <div class="hd"><span style="font-size:15px;font-weight:800;color:var(--brand)" id="dTitle">개발요청</span><button class="btn ghost sm" style="margin-left:auto" onclick="closeModal()">닫기 ✕</button></div>
    <div class="bd" id="dBody"></div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  let custList=[], cur=null;
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const dd=(n)=> n==null?'–':(n+'일');
  // application "메이커 차종 연식..." → {maker, model, year}
  function splitApp(app){
    const s=String(app||'').trim();
    if(!s) return {maker:'',model:'',year:''};
    const p=s.split(/\s+/);
    return { maker:p[0]||'', model:p[1]||'', year:p.slice(2).join(' ')||'' };
  }

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      try{ const p=new URLSearchParams(location.hash.slice(1)); if(p.get('view')==='developed'){ $('fStatus').value='developed'; } }catch(e){}
      loadCustomers(); renderMonths(); loadKpi(); load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  async function loadCustomers(){
    try{ const d=await fetch(session.api+'/api/customers',{headers:auth()}).then(r=>r.json()); custList=d.items||[];
      $('nCust').innerHTML='<option value="">— 고객 —</option>'+custList.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');
    }catch(e){}
  }
  async function loadKpi(){
    try{ const d=await fetch(session.api+'/api/dev-requests/kpi',{headers:auth()}).then(r=>r.json());
      $('kCompleted').textContent=d.completed; $('kAvg').textContent=d.avg_days==null?'–':d.avg_days; $('kOpen').textContent=d.open;
    }catch(e){}
  }
  async function createReq(){
    const m=$('nMsg');m.className='msg';
    const code=$('nCode').value.trim();
    if(!code){m.className='msg err';m.textContent='경쟁사 코드를 입력하세요.';return;}
    try{
      const body={input_code:code,customer_id:$('nCust').value?Number($('nCust').value):null,requested_qty:Number($('nQty').value)||null,order_memo:$('nMemo').value.trim()||null};
      const res=await fetch(session.api+'/api/dev-requests',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)});
      const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.textContent='등록 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.textContent='접수 등록되었습니다.';
      $('nCode').value='';$('nQty').value='';$('nMemo').value='';
      load(); loadKpi();
    }catch(e){m.className='msg err';m.textContent='서버 연결 실패';}
  }

  let devMonths=[], DEV_FYEAR=new Date().getFullYear();
  function renderMonths(){
    const btns=Array.from({length:12},(_,i)=>{const mm=String(i+1).padStart(2,'0');const ym=DEV_FYEAR+'-'+mm;
      return '<button class="mbtn '+(devMonths.includes(ym)?'on':'')+'" onclick="toggleMonth(\''+ym+'\')">'+(i+1)+'월</button>';}).join(' ');
    $('months').innerHTML='<span class="ml">조회 월 ('+DEV_FYEAR+', 복수 선택 · 전체는 모두 해제)</span>'+btns;
  }
  function toggleMonth(ym){ const i=devMonths.indexOf(ym); if(i>=0)devMonths.splice(i,1); else devMonths.push(ym); renderMonths(); load(); }

  async function load(){
    const params=[]; if($('fStatus').value)params.push('status='+$('fStatus').value);
    if(devMonths.length)params.push('months='+encodeURIComponent(devMonths.join(',')));
    const qs=params.length?('?'+params.join('&')):'';
    try{ const d=await fetch(session.api+'/api/dev-requests'+qs,{headers:auth()}).then(r=>r.json()); render(d.items||[]); }
    catch(e){ $('listWrap').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }
  const stLbl={received:'접수',reviewed:'검토완료',factory_requested:'공장요청',developed:'개발완료',cancelled:'취소'};
  function stageDots(r){
    const steps=[r.requested_at,r.reviewed_at,r.factory_requested_at,r.developed_at];
    return '<span class="stage">'+steps.map(s=>'<span class="dot'+(s?' on':'')+'"></span>').join('')+'</span>';
  }
  function render(items){
    if(!items.length){ $('listWrap').innerHTML='<div class="hint" style="margin-top:10px">개발요청이 없습니다.</div>'; return; }
    let html='<table><thead><tr><th>경쟁사코드</th><th>고객</th><th class="r">수량</th><th>진행</th><th>상태</th><th>차량(메이커/차종/연식)</th><th>접수일</th><th>완료일</th><th class="r">소요(전체)</th><th>결과코드</th><th>작업</th></tr></thead><tbody>';
    items.forEach(r=>{
      const v=splitApp(r.review_app);
      const veh=[v.maker,v.model,v.year].filter(Boolean).join(' / ');
      html+='<tr>'
        +'<td><b>'+esc(r.input_code||'')+'</b></td>'
        +'<td>'+esc(r.customer_name||'-')+'</td>'
        +'<td class="r">'+(r.requested_qty==null?'-':r.requested_qty)+'</td>'
        +'<td>'+stageDots(r)+'</td>'
        +'<td><span class="st '+r.status+'">'+(stLbl[r.status]||r.status)+'</span></td>'
        +'<td>'+esc(veh||'-')+'</td>'
        +'<td>'+esc(r.requested_at||'')+'</td>'
        +'<td>'+esc(r.developed_at||'-')+'</td>'
        +'<td class="r">'+dd(r.dur_total)+'</td>'
        +'<td>'+(r.result_ctr_code?'<b>'+esc(r.result_ctr_code)+'</b>':'-')+'</td>'
        +'<td><button class="btn sm" onclick=\'openModal('+JSON.stringify(r.id)+')\'>관리</button></td>'
        +'</tr>';
    });
    html+='</tbody></table>';
    $('listWrap').innerHTML=html;
  }

  async function openModal(id){
    try{ cur=await fetch(session.api+'/api/dev-requests/'+id,{headers:auth()}).then(r=>r.json()); }catch(e){ return; }
    $('dTitle').textContent='개발요청: '+(cur.input_code||'');
    renderModal();
    $('dModal').style.display='flex';
  }
  function closeModal(){ $('dModal').style.display='none'; cur=null; }
  function renderModal(){
    const r=cur;
    let h='';
    h+='<div class="hint">고객 <b>'+esc(r.customer_name||'-')+'</b> · 요청수량 '+(r.requested_qty==null?'-':r.requested_qty)+' · 상태 <span class="st '+r.status+'">'+(stLbl[r.status]||r.status)+'</span></div>';
    // 단계별 일정 + 소요기간
    h+='<div class="seg"><h4>단계별 일정 / 소요기간</h4>';
    h+='<table style="margin:0"><tbody>'
      +'<tr><td>① 오더 접수일</td><td><b>'+esc(r.requested_at||'-')+'</b></td><td class="hint"></td></tr>'
      +'<tr><td>② 검토완료일</td><td><b>'+esc(r.reviewed_at||'-')+'</b></td><td class="hint">'+dd(r.dur_review)+'</td></tr>'
      +'<tr><td>③ 공장 개발요청일</td><td><b>'+esc(r.factory_requested_at||'-')+'</b></td><td class="hint">'+dd(r.dur_factory)+'</td></tr>'
      +'<tr><td>④ 개발완료일</td><td><b>'+esc(r.developed_at||'-')+'</b></td><td class="hint">'+dd(r.dur_develop)+'</td></tr>'
      +'<tr><td><b>전체 (요청→완료)</b></td><td></td><td class="hint"><b>'+dd(r.dur_total)+'</b></td></tr>'
      +'</tbody></table></div>';
    if(r.status==='cancelled'){ $('dBody').innerHTML=h+'<div class="hint" style="margin-top:10px">취소된 요청입니다.</div>'; return; }
    if(r.status==='developed'){
      const vv=splitApp(r.review_app);
      h+='<div class="seg"><h4>개발 결과</h4><div class="hint">경쟁사 <b>'+esc(r.review_syd_code||r.input_code||'')+'</b> → 신규 <b>'+esc(r.result_ctr_code||'')+'</b> (자동 매핑 완료)<br>메이커 <b>'+esc(vv.maker||'-')+'</b> · 차종 <b>'+esc(vv.model||'-')+'</b> · 연식 <b>'+esc(vv.year||'-')+'</b><br>App: '+esc(r.review_app||'-')+' · List: '+(r.review_list_price==null?'-':r.review_list_price)+'</div></div>';
      $('dBody').innerHTML=h; return;
    }
    // ② 검토완료 입력 (제품·마케팅)
    h+='<div class="seg"><h4>② 검토완료 입력 (제품·마케팅)</h4>'
      +'<div class="grid2">'
      +'<div><label>SYD 코드 *</label><input id="rSyd" type="text" value="'+esc(r.review_syd_code||'')+'"></div>'
      +'<div><label>Application (메이커 차종 연식)</label><input id="rApp" type="text" placeholder="예: kia soul 2005-2010" value="'+esc(r.review_app||'')+'"></div>'
      +'<div><label>List price *</label><input id="rList" type="number" step="0.01" value="'+(r.review_list_price==null?'':r.review_list_price)+'"></div>'
      +'<div><label>검토완료일</label><input id="rDate" type="date" value="'+esc(r.reviewed_at||'')+'"></div>'
      +'</div>'
      +'<div class="hint" style="margin-top:6px">Application은 <b>메이커 차종 연식</b> 순서로 공백 구분 입력 (예: <b>kia soul 2005-2010</b>) → 목록에 자동으로 메이커·차종·연식으로 나뉘어 표시됩니다.</div>'
      +'<label style="margin-top:8px">메모 (시장 판매수량 등)</label><textarea id="rMemo" rows="2">'+esc(r.review_memo||'')+'</textarea>'
      +'<button class="btn sm" style="margin-top:8px" onclick="doReview()">검토완료 저장</button>'
      +'<span class="hint"> SYD·List price 입력 시 검토완료로 표시됩니다.</span>'
      +'</div>';
    // ③ 공장요청
    h+='<div class="seg"><h4>③ 공장 개발요청</h4><div style="display:flex;gap:8px;align-items:flex-end"><div><label>공장 요청일</label><input id="fDate" type="date" value="'+esc(r.factory_requested_at||'')+'"></div><button class="btn sm" onclick="doFactory()">공장요청 기록</button></div></div>';
    // ④ 개발완료
    h+='<div class="seg"><h4>④ 개발완료 (CTR 코드 생성)</h4><div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap"><div><label>생성된 CTR 코드 *</label><input id="cCtr" type="text" placeholder="예: CTR-1003"></div><div><label>완료일</label><input id="cDate" type="date"></div><button class="btn sm" onclick="doDevelop()">개발완료 처리</button></div><div class="hint" style="margin-top:6px">완료 시 경쟁사 코드가 이 제품에 자동 매핑되고, 담당영업·디렉터에게 할 일이 생성됩니다. (CTR 제품이 제품마스터에 먼저 등록돼 있어야 합니다)</div></div>';
    h+='<div style="margin-top:10px"><button class="btn ghost sm" onclick="doCancel()" style="color:var(--expense);border-color:#e7b6af">요청 취소</button></div>';
    h+='<div class="msg" id="mMsg"></div>';
    $('dBody').innerHTML=h;
  }
  async function call(url,body){
    const res=await fetch(session.api+url,{method:'PUT',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body||{})});
    return {ok:res.ok,d:await res.json()};
  }
  function mErr(msg){ const m=$('mMsg'); if(m){m.className='msg err';m.textContent=msg;} }
  function mOk(msg){ const m=$('mMsg'); if(m){m.className='msg ok';m.textContent=msg;} }
  async function doReview(){
    const body={review_syd_code:$('rSyd').value.trim(),review_app:$('rApp').value.trim(),review_list_price:$('rList').value,review_memo:$('rMemo').value.trim(),reviewed_at:$('rDate').value||null};
    if(!body.review_syd_code||body.review_list_price===''){mErr('SYD 코드와 List price는 필수입니다.');return;}
    const {ok,d}=await call('/api/dev-requests/'+cur.id+'/review',body);
    if(!ok||d.error){mErr('저장 실패: '+(d.note||d.error));return;}
    mOk('검토완료 저장됨'); await openModal(cur.id); load(); loadKpi();
  }
  async function doFactory(){
    const {ok,d}=await call('/api/dev-requests/'+cur.id+'/factory',{factory_requested_at:$('fDate').value||null});
    if(!ok||d.error){mErr('실패: '+d.error);return;}
    mOk('공장요청 기록됨'); await openModal(cur.id); load();
  }
  async function doDevelop(){
    const ctr=$('cCtr').value.trim();
    if(!ctr){mErr('CTR 코드를 입력하세요.');return;}
    const {ok,d}=await call('/api/dev-requests/'+cur.id+'/develop',{result_ctr_code:ctr,developed_at:$('cDate').value||null});
    if(!ok||d.error){mErr('실패: '+(d.note||d.error));return;}
    mOk('개발완료! '+d.mapped_to+' 매핑, 할 일 '+d.todos_created+'건 생성'); await openModal(cur.id); load(); loadKpi();
  }
  async function doCancel(){
    const {ok,d}=await call('/api/dev-requests/'+cur.id+'/cancel',{});
    if(!ok||d.error){mErr('실패: '+d.error);return;}
    closeModal(); load(); loadKpi();
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
