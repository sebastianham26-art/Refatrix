<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 수입원가 정산차액</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;
    --brand:#143D34;--brand-soft:#1E5247;--gold:#B8893B;--radius:12px;--radius-sm:8px;
    --shadow:0 1px 2px rgba(28,27,25,.04),0 8px 24px rgba(28,27,25,.06);}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1000px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px;box-shadow:var(--shadow)}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .card-h .src{font-size:11px;color:var(--muted);font-weight:500}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600}
  input,select{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:9px 16px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .msg{margin-top:12px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense);border:1px solid #f0c5bf}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .noteBox{background:#fdf8ec;border:1px solid #ecd9a0;border-radius:8px;padding:10px 12px;font-size:12.5px;color:#8a6512;margin-top:4px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px}
  .stat .k{font-size:11px;color:var(--muted);margin-bottom:5px}
  .stat .v{font-size:20px;font-weight:800;color:var(--brand)}
  .stat.tot .v{color:var(--gold)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  th,td{padding:8px 9px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11.5px;color:var(--muted);background:#faf8f3;font-weight:700}
  tfoot td{font-weight:800;background:#faf8f3;border-top:2px solid var(--line)}
  .badge{font-size:10.5px;font-weight:700;padding:1px 8px;border-radius:999px}
  .b-edit{background:#e6f1fb;color:#0c447c}.b-del{background:var(--expense-bg);color:var(--expense)}.b-imp{background:#fdf8ec;color:#8a6512}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:6px 12px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--brand);color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">수입원가 정산차액</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="card-h">정산차액 집계 <span class="src">비현금 손익 조정 · 현금흐름과 분리</span>
        <span style="margin-left:auto"><span class="seg" id="yearSeg"></span></span>
      </div>
      <div class="noteBox" id="note">정산차액은 비현금 손익(원가) 조정입니다. 통장 잔액·현금흐름에는 반영되지 않으며, 발생한 달의 손익에 인식됩니다.</div>
      <div class="stats" id="statBoxes"></div>
    </div>

    <div class="card">
      <div class="card-h">월별 정산차액 (원천별)</div>
      <div id="monthBody"><div class="hint">불러오는 중…</div></div>
    </div>

    <div class="card">
      <div class="card-h">상세 내역</div>
      <div id="itemBody"><div class="hint">불러오는 중…</div></div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  let year=String(new Date().getFullYear());
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:0});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }

  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+(d.user?.name||login_id)+'</b><br>'+(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      renderYearSeg();load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  function renderYearSeg(){
    const cur=new Date().getFullYear();
    const years=[cur-1,cur];
    $('yearSeg').innerHTML=years.map(y=>'<button class="'+(String(y)===year?'on':'')+'" onclick="pickYear(\''+y+'\')">'+y+'</button>').join('')
      +'<button class="'+(year===''?'on':'')+'" onclick="pickYear(\'\')">전체</button>';
  }
  function pickYear(y){ year=String(y);renderYearSeg();load(); }

  const SRC_BADGE={sales_edit:'b-edit',sales_delete:'b-del',import_cost:'b-imp'};

  async function load(){
    try{
      const q=year?('?year='+year):'';
      const d=await fetch(session.api+'/api/settlement/variances'+q,{headers:auth()}).then(r=>r.json());
      render(d);
    }catch(e){$('monthBody').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  function render(d){
    $('note').textContent=d.note||'';
    // 요약 박스: 총합 + 원천별
    const srcMap={}; (d.bySource||[]).forEach(s=>srcMap[s.source]=s);
    const box=(k,label)=>'<div class="stat"><div class="k">'+label+'</div><div class="v">MX$'+fmt(srcMap[k]?srcMap[k].amount:0)+'</div></div>';
    $('statBoxes').innerHTML=
      '<div class="stat tot"><div class="k">정산차액 합계 ('+(year||'전체')+')</div><div class="v">MX$'+fmt(d.total)+'</div></div>'
      +box('sales_edit','매출 수정')+box('sales_delete','매출 삭제')+box('import_cost','수입 부대비용');
    // 월별
    const mrows=(d.byMonth||[]);
    if(!mrows.length){ $('monthBody').innerHTML='<div class="hint">정산차액이 없습니다. (마감월에 매출 수정·삭제나 수입 부대비용이 발생하면 여기에 집계됩니다.)</div>'; }
    else $('monthBody').innerHTML='<table><thead><tr><th>월</th><th>매출 수정</th><th>매출 삭제</th><th>수입 부대비용</th><th>합계</th></tr></thead><tbody>'
      +mrows.map(m=>'<tr><td>'+m.ym+'</td><td>'+fmt(m.sales_edit)+'</td><td>'+fmt(m.sales_delete)+'</td><td>'+fmt(m.import_cost)+'</td><td><b>'+fmt(m.total)+'</b></td></tr>').join('')
      +'</tbody><tfoot><tr><td>합계</td><td>'+fmt(sum(mrows,'sales_edit'))+'</td><td>'+fmt(sum(mrows,'sales_delete'))+'</td><td>'+fmt(sum(mrows,'import_cost'))+'</td><td>'+fmt(d.total)+'</td></tr></tfoot></table>';
    // 상세
    const items=(d.items||[]);
    if(!items.length){ $('itemBody').innerHTML='<div class="hint">상세 내역이 없습니다.</div>'; }
    else $('itemBody').innerHTML='<table><thead><tr><th>인식일</th><th style="text-align:left">원천</th><th style="text-align:left">참조</th><th style="text-align:left">고객/제품</th><th>금액</th></tr></thead><tbody>'
      +items.map(it=>'<tr><td>'+it.booked_date+'</td>'
        +'<td style="text-align:left"><span class="badge '+(SRC_BADGE[it.source]||'')+'">'+it.source_label+'</span></td>'
        +'<td style="text-align:left">'+(it.ref||'—')+'</td>'
        +'<td style="text-align:left">'+([it.customer,it.product].filter(Boolean).join(' · ')||'—')+'</td>'
        +'<td><b>'+fmt(it.amount)+'</b></td></tr>').join('')
      +'</tbody></table>';
  }
  function sum(arr,k){ return arr.reduce((s,x)=>s+(Number(x[k])||0),0); }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
<script src="refatrix-nav.js?v=20260615e"></script>
</body>
</html>
