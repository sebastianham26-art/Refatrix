<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 부족분 집계</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1000px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.sm{padding:5px 10px;font-size:12px}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  th,td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.r,th.r{text-align:right}
  .short{font-weight:800;color:var(--expense)}
  tr.detail td{background:#faf8f3;font-size:11.5px;color:var(--muted)}
  .sb{flex:1;min-width:130px;background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:11px 14px}
  .sb .v{font-size:22px;font-weight:800;color:var(--brand)}.sb .l{font-size:11px;color:var(--muted);margin-top:2px}
  .mrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .mrow .ml{font-size:12px;color:#6f6a60;font-weight:600;margin-right:4px}
  .mbtn{min-width:38px;padding:6px 9px;border:1px solid var(--line,#e0dccb);background:#fff;border-radius:8px;font-size:12px;font-weight:700;color:#8a8676;cursor:pointer}
  .mbtn.on{background:var(--brand,#143D34);color:#fff;border-color:var(--brand,#143D34)}
</style>
<link rel="stylesheet" href="refatrix-i18n.css?v=20260621j">
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">부족분 SKU별 집계 (발주 근거)</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="card-h">미해소 부족분 (open) — SKU별 합계
        <button class="btn ghost sm" style="float:right" onclick="exportExcel()">엑셀 다운로드</button>
        <button class="btn ghost sm" style="float:right;margin-right:6px" onclick="load()">새로고침</button>
      </div>
      <div class="hint">매출 전환·등록 시 재고가 부족했던 수량이 SKU별로 모입니다. 발주(공장 주문)의 근거 자료입니다. 행을 누르면 누가 요청했는지 보입니다.</div>
      <div class="mrow" id="months" style="margin:8px 0 4px"></div>
      <div id="listWrap"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let session={token:null,user:null,api:''};
  let rows=[], openDetail={}, summary=null;
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const fmtq=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:3});
  const fmtm=(n)=> '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      renderMonths(); load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  let shMonths=[], SH_FYEAR=new Date().getFullYear();
  function renderMonths(){
    const btns=Array.from({length:12},(_,i)=>{const mm=String(i+1).padStart(2,'0');const ym=SH_FYEAR+'-'+mm;
      return '<button class="mbtn '+(shMonths.includes(ym)?'on':'')+'" onclick="toggleMonth(\''+ym+'\')">'+(i+1)+'월</button>';}).join(' ');
    $('months').innerHTML='<span class="ml">발생 월 ('+SH_FYEAR+', 복수 선택 · 전체는 모두 해제)</span>'+btns;
  }
  function toggleMonth(ym){ const i=shMonths.indexOf(ym); if(i>=0)shMonths.splice(i,1); else shMonths.push(ym); renderMonths(); load(); }

  async function load(){
    const qs=shMonths.length?('?months='+encodeURIComponent(shMonths.join(','))):'';
    try{ const d=await fetch(session.api+'/api/shortages/by-sku'+qs,{headers:auth()}).then(r=>r.json()); rows=d.items||[]; summary=d.summary||null; openDetail={}; render(); }
    catch(e){ $('listWrap').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }
  function render(){
    let head='';
    if(summary){
      head='<div style="display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 6px">'
        +'<div class="sb"><div class="v">'+(rows.length)+'</div><div class="l">부족 SKU 종류</div></div>'
        +'<div class="sb"><div class="v" style="color:var(--expense)">'+fmtq(summary.open_qty)+'</div><div class="l">미발주 부족분 합계</div></div>'
        +'<div class="sb"><div class="v" style="color:var(--income)">'+fmtq(summary.ordered_qty)+'</div><div class="l">발주 발행 수량(해소됨)</div></div>'
        +'</div>';
    }
    if(!rows.length){ $('listWrap').innerHTML=head+'<div class="hint" style="margin-top:10px">미해소 부족분이 없습니다.</div>'; return; }
    let html=head+'<table><thead><tr><th>CTR 코드</th><th>제품명</th><th class="r">현재고</th><th class="r">부족분 합계</th><th class="r">매출 불가 금액</th><th class="r">건수</th><th>최근 발생</th></tr></thead><tbody>';
    rows.forEach((r,i)=>{
      html+='<tr style="cursor:pointer" onclick="toggle('+i+','+r.product_id+')">'
        +'<td><b>'+esc(r.ctr_code||'')+'</b></td>'
        +'<td>'+esc(r.product_name||'')+'</td>'
        +'<td class="r">'+fmtq(r.stock_qty)+'</td>'
        +'<td class="r short">'+fmtq(r.total_shortage)+'</td>'
        +'<td class="r" style="color:var(--expense);font-weight:700">'+fmtm(r.total_amount_mxn)+'</td>'
        +'<td class="r">'+r.cnt+'</td>'
        +'<td>'+esc(r.last_at||'')+'</td>'
        +'</tr>';
      if(openDetail[r.product_id]){
        const dets=openDetail[r.product_id];
        html+='<tr class="detail"><td colspan="7">'+(dets.length?dets.map(x=>esc(x.customer_name||'(고객미상)')+' — 요청 '+fmtq(x.requested_qty)+', 출고 '+fmtq(x.fulfilled_qty)+', 부족 '+fmtq(x.shortage_qty)+' ('+esc(x.occurred_at||'')+')').join('<br>'):'세부 내역 불러오는 중…')+'</td></tr>';
      }
    });
    html+='</tbody></table>';
    const total=rows.reduce((a,b)=>a+Number(b.total_shortage),0);
    const totalAmt=rows.reduce((a,b)=>a+Number(b.total_amount_mxn||0),0);
    html+='<div class="hint" style="margin-top:8px">SKU '+rows.length+'종 · 총 부족 '+fmtq(total)+'개 · 매출 불가 금액 합계 '+fmtm(totalAmt)+'. 행 클릭 시 요청 고객 내역 표시.</div>';
    $('listWrap').innerHTML=html;
  }
  async function toggle(i,pid){
    if(openDetail[pid]){ delete openDetail[pid]; render(); return; }
    openDetail[pid]=[]; render();
    try{ const d=await fetch(session.api+'/api/shortages?status=open',{headers:auth()}).then(r=>r.json());
      openDetail[pid]=(d.items||[]).filter(x=>x.product_id===pid||x.code===rows[i].ctr_code); render();
    }catch(e){ openDetail[pid]=[]; render(); }
  }
  function exportExcel(){
    if(!rows.length)return;
    const aoa=[['Refatrix — 부족분 집계(발주 근거)'],[],['CTR Code','Producto','Existencia','Faltante','Casos','Ultima fecha']];
    rows.forEach(r=>aoa.push([r.ctr_code,r.product_name,r.stock_qty,r.total_shortage,r.cnt,r.last_at||'']));
    const ws=XLSX.utils.aoa_to_sheet(aoa); ws['!cols']=[{wch:14},{wch:28},{wch:10},{wch:10},{wch:8},{wch:12}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Faltantes');
    XLSX.writeFile(wb,'faltantes_por_sku.xlsx');
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
<script src="refatrix-nav.js?v=20260702sc"></script>
</body>
</html>
