<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 업무 프로세스 KPI</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--brand:#143D34;--brand-soft:#1E5247;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--expense:#B23A2E;--gold:#B8893B;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;max-width:460px;margin:40px auto;box-shadow:0 8px 24px rgba(28,27,25,.06)}
  .card h1{font-size:18px;margin:0 0 14px;color:var(--brand)}
  label{font-size:12px;color:var(--muted)}
  input,select,button{font-family:inherit}
  input[type=text],input[type=password],input[type=date],input[type=number]{font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .row{display:flex;gap:8px;margin-top:8px}
  .btn{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid var(--brand);background:var(--brand);color:#fff;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand)}
  .msg{font-size:12px;margin-top:8px;color:var(--expense);min-height:16px}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}
  .wrap{max-width:1080px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .top h1{font-size:20px;margin:0;color:var(--brand)}
  .who{font-size:12px;color:var(--muted)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(28,27,25,.04)}
  .ctrls{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;margin-bottom:12px}
  .ctrls .sep{width:1px;height:22px;background:var(--line)}
  .mbtn{font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer}
  .mbtn.on{background:#E4F0EB;color:var(--income);border-color:#cfe4db}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:6px;font-size:12px;color:var(--muted)}
  .chartbox{position:relative;width:100%;height:320px}
  .kpibar{display:grid;grid-template-columns:46px repeat(4,1fr);align-items:stretch;margin-top:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .kpibar .khead{grid-column:1 / span 5;display:flex;align-items:center;gap:6px;padding:7px 12px;background:#FAF8F3;font-size:12px;color:var(--muted)}
  .kpibar .kspace{}
  .kcell{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 6px;border-left:1px solid var(--line)}
  .kcell input{width:66px;text-align:center}
  .ku{font-size:11px;color:var(--muted)}
  .kfix{font-size:11px;color:var(--muted);text-align:center;line-height:1.3}
  table.lst{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px}
  table.lst th{font-size:11px;color:var(--muted);font-weight:600;text-align:right;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:#FCFBF7}
  table.lst th.l{text-align:left}
  table.lst th.srt{cursor:pointer;user-select:none}
  table.lst th.srt:hover{color:var(--brand)}
  table.lst th.chk,table.lst td.chk{text-align:center;width:34px;padding-left:6px;padding-right:6px}
  table.lst td.chk input,table.lst th.chk input{cursor:pointer}
  table.lst td{text-align:right;padding:8px 10px;border-bottom:1px solid #F1ECE2;white-space:nowrap}
  table.lst td.l{text-align:left}
  .ok{color:var(--income);font-weight:600}.no{color:var(--expense);font-weight:600}.pend{color:var(--muted)}
  .wip{color:#BA7517;font-weight:600}
  .tag{font-size:10px;padding:1px 5px;border-radius:8px;background:#FAEEDA;color:#854F0B;margin-left:2px}
  .custbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;max-height:88px;overflow:auto;padding:2px 0}
  .custbar .cblabel{font-size:11px;color:var(--muted);margin-right:2px}
  .chip{font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;user-select:none}
  .chip.on{background:#E4F0EB;color:var(--income);border-color:#cfe4db}
  .chip .cn{font-size:10px;opacity:.7;margin-left:3px}
  .chipbtn{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--brand);cursor:pointer}
  .scrollx{overflow-x:auto}
  .secttl{font-size:14px;font-weight:600;margin:0 0 6px}
</style>
</head>
<body>
  <div class="card" id="loginCard">
    <h1>업무 프로세스 KPI</h1>
    <div><label>로그인 아이디</label><div class="row"><input id="lid" type="text" style="flex:1" placeholder="director"></div></div>
    <div style="margin-top:8px"><label>PIN</label><div class="row"><input id="pin" type="password" style="flex:1" placeholder="••••"><button class="btn" id="go">로그인</button></div></div>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden wrap" id="app">
    <div class="top">
      <h1>업무 프로세스 KPI</h1>
      <div class="who" id="who"></div>
    </div>

    <div class="panel">
      <div class="ctrls">
        <span style="font-size:13px;color:var(--muted)">기간</span>
        <input type="date" id="d1"><span style="color:var(--muted)">~</span><input type="date" id="d2">
        <button class="mbtn" id="reload">조회</button>
        <span class="sep"></span>
        <div id="modes" style="display:inline-flex;gap:6px">
          <button class="mbtn on" data-m="week">주간</button>
          <button class="mbtn" data-m="month">월</button>
          <button class="mbtn" data-m="customer">고객</button>
        </div>
        <span id="status" style="font-size:12px;color:var(--muted);margin-left:auto"></span>
      </div>
      <div class="legend" id="legend"></div>
      <div id="custbar" class="custbar" style="display:none"></div>
      <div class="chartbox"><canvas id="kc" role="img" aria-label="4단계 KPI 대비 달성 퍼센트 다중 선 그래프"></canvas></div>
      <div class="kpibar">
        <div class="khead"><span>KPI factor · 단계별 기준시간 직접 입력 (변경·저장 시 그래프·SLA 카드에 반영)</span></div>
        <div class="kspace"></div>
        <div class="kcell"><input type="number" id="k_order" min="1" step="0.5"><span class="ku">시간</span></div>
        <div class="kcell"><input type="number" id="k_packing" min="1" step="0.5"><span class="ku">업무시간</span></div>
        <div class="kcell"><input type="number" id="k_sat" min="1" step="0.5"><span class="ku">시간</span></div>
        <div class="kcell"><span class="kfix">고객별<br>외상기일 준수</span></div>
      </div>
      <div style="margin-top:8px;text-align:right"><button class="btn" id="saveKpi">KPI 저장 후 반영</button></div>
    </div>

    <div class="panel">
      <div class="secttl">오더 단계별 소요시간 <span style="color:var(--muted);font-weight:400">· 선택 기간 · 견적입력일 기준</span></div>
      <div class="scrollx">
        <table class="lst">
          <thead id="lhead"></thead>
          <tbody id="lbody"><tr><td colspan="8" class="l pend" style="padding:14px">조회를 눌러 데이터를 불러오세요.</td></tr></tbody>
        </table>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">제목을 클릭하면 정렬됩니다 · 좌측 체크 해제 시 해당 오더는 그래프 집계에서 제외됩니다.</div>
      </div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  let session={token:null,user:null,api:''};
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function portalSession(){
    try{
      const raw=sessionStorage.getItem('refatrix_session');
      if(raw){const o=JSON.parse(raw); if(o&&o.token) return {token:o.token,api:o.api||'',user:o.user||{}};}
      const p=new URLSearchParams(location.search); const token=p.get('token');
      if(token){const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')};
        try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o;}
    }catch(e){} return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.textContent='';
    try{
      let d; const ps=portalSession();
      if(ps&&ps.token){ d=ps; if(ps.api)session.api=ps.api; }
      else{ const res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});
        d=await res.json(); if(!res.ok||d.error){m.textContent='로그인 실패: '+(d.error||res.status);return;} }
      session={token:d.token,user:d.user||{},api:session.api||api};
      $('who').innerHTML='<b>'+esc(session.user.name||login_id||'사용자')+'</b>';
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      initDates(); await loadKpi(); await loadAnalytics();
    }catch(e){m.textContent='연결 오류: '+e;}
  }

  function initDates(){
    const t=new Date(); const to=t.toISOString().slice(0,10);
    const f=new Date(t.getTime()-27*86400000).toISOString().slice(0,10);
    if(!$('d1').value)$('d1').value=f; if(!$('d2').value)$('d2').value=to;
  }

  let curMode='week', chart=null, lastKpi={order_hours:48,packing_hours:6,sat_hours:3};
  let allOrders=[], sortState={key:'created_at',dir:-1}, custFilter=null;
  const COLS=[
    {k:'_sel',chk:true},
    {k:'quote_no',t:'오더번호',l:true},
    {k:'customer',t:'고객명',l:true},
    {k:'created_at',t:'견적입력일'},
    {k:'order_h',t:'오더확정'},
    {k:'packing_h',t:'피킹/포장'},
    {k:'sat_h',t:'SAT 발행'},
    {k:'collect_days',t:'수금(일)'}
  ];
  const PAL=['#378ADD','#1D9E75','#EF9F27','#D85A30','#7F77DD','#D4537E','#185FA5','#0F6E56'];
  const DASH=[[],[6,4],[2,3],[9,3,2,3],[12,4],[4,2,1,2]];

  async function loadKpi(){
    try{ const d=await fetch(session.api+'/api/process/kpi',{headers:auth()}).then(r=>r.json());
      if(d&&!d.error){ lastKpi=d; $('k_order').value=d.order_hours; $('k_packing').value=d.packing_hours; $('k_sat').value=d.sat_hours; }
    }catch(e){}
  }
  async function saveKpi(){
    const body={order_hours:+$('k_order').value,packing_hours:+$('k_packing').value,sat_hours:+$('k_sat').value};
    for(const k in body){ if(!isFinite(body[k])||body[k]<=0){ $('status').textContent='KPI 값이 올바르지 않습니다.'; return; } }
    $('status').textContent='저장 중…';
    try{ const r=await fetch(session.api+'/api/process/kpi',{method:'PUT',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)}).then(x=>x.json());
      if(r&&r.ok){ lastKpi=body; $('status').textContent='KPI 저장됨 · 반영'; await loadAnalytics(); }
      else $('status').textContent='저장 실패: '+(r&&r.error||'');
    }catch(e){ $('status').textContent='저장 오류'; }
  }

  function ensureChart(){
    if(chart) return chart;
    chart=new Chart($('kc').getContext('2d'),{type:'line',data:{labels:['오더확정','피킹/포장','SAT 발행','수금'],datasets:[]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},spanGaps:true,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y==null?'—':Math.round(c.parsed.y)+'%')}}},
        scales:{y:{min:0,suggestedMax:210,title:{display:true,text:'달성 % (KPI 대비 · 그래프 200% 상한)'},ticks:{callback:v=>v+'%'},
          grid:{color:c=>c.tick.value===100?'#A32D2D':'rgba(0,0,0,.06)'}},x:{grid:{display:false},ticks:{font:{weight:'bold',size:13},color:'#1C1B19'}}}}});
    return chart;
  }
  function renderChart(lines){
    const ch=ensureChart();
    const ds=lines.map((ln,i)=>({label:ln.label,data:ln.points,borderColor:PAL[i%PAL.length],backgroundColor:PAL[i%PAL.length],
      borderDash:DASH[i%DASH.length],borderWidth:2,tension:.25,pointRadius:3,pointHoverRadius:5,fill:false,spanGaps:true}));
    ds.push({label:'KPI 100%',data:[100,100,100,100],borderColor:'#A32D2D',borderDash:[3,3],borderWidth:1.5,pointRadius:0,fill:false,order:99});
    ch.data.datasets=ds; ch.update();
    $('legend').innerHTML=lines.map((ln,i)=>'<span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:0;border-top:2px '+(DASH[i%DASH.length].length?'dashed':'solid')+' '+PAL[i%PAL.length]+'"></span>'+esc(ln.label)+'</span>').join('')
      +'<span style="display:flex;align-items:center;gap:5px;color:#A32D2D"><span style="width:14px;height:0;border-top:1.5px dashed #A32D2D"></span>KPI 100%</span>';
  }
  function durCell(st,unit){
    if(!st||st.state==='none') return '<span class="pend">—</span>';
    if(st.state==='expired') return '<span class="pend">만료</span>';
    if(st.state==='abandoned') return '<span class="pend" title="30일 초과 미확정 — 포기">포기'+(st.value!=null?' · '+Math.round(st.value/24)+'일':'')+'</span>';
    if(st.value==null) return '<span class="pend">—</span>';
    if(st.state==='wip') return '<span class="'+(st.over?'no':'wip')+'">'+st.value+unit+' <span class="tag">진행</span></span>';
    return '<span class="'+(st.over?'no':'ok')+'">'+st.value+unit+'</span>';
  }
  function packingCell(o){
    let base=durCell({value:o.packing_h,state:o.packing_state,over:o.packing_over},'업무h');
    if(o.packing_wall_h!=null && (o.packing_state==='wip' || Math.abs((o.packing_wall_h||0)-(o.packing_h||0))>=1))
      base+=' <span class="pend" style="font-size:11px">· 실 '+o.packing_wall_h+'h</span>';
    return base;
  }
  function collectCell(o){
    const cd=(o.credit_days!=null?o.credit_days:'-');
    if(o.collect_state==='none'||o.collect_days==null) return '<span class="pend">—</span>';
    if(o.collect_state==='wip') return '<span class="'+(o.collect_over?'no':'wip')+'">'+o.collect_days+'일 경과 <span class="tag">진행</span></span> <span class="pend">/ 기일 '+cd+'</span>';
    return '<span class="'+(o.collect_over?'no':'ok')+'">'+o.collect_days+'일</span> <span class="pend">/ 기일 '+cd+'</span>';
  }
  function fromMs(){ const v=$('d1').value; return v?new Date(v+'T00:00:00Z').getTime():0; }
  function groupOf(o){
    if(curMode==='customer'){ const c=o.customer||'(미지정)'; return [c,c]; }
    const d=new Date(o.created_at);
    if(curMode==='month'){ return [d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0'),(d.getUTCMonth()+1)+'월']; }
    const wi=Math.floor((d.getTime()-fromMs())/(7*86400000)); return ['w'+wi,(wi+1)+'주'];
  }
  const GRAPH_PCT_CAP=200; // 그래프(평균)만 적용. 리스트 개별 달성%는 실제값 표시.
  function buildLines(){
    const g=new Map();
    allOrders.filter(o=>o._sel).filter(o=>!(curMode==='customer'&&custFilter&&!custFilter.has(o.customer||'(미지정)'))).forEach(o=>{
      const [key,label]=groupOf(o);
      if(!g.has(key)) g.set(key,{label,sum:[0,0,0,0],cnt:[0,0,0,0]});
      const e=g.get(key);
      [o.order_pct,o.packing_pct,o.sat_pct,o.collect_pct].forEach((v,i)=>{ if(v!=null){ e.sum[i]+=Math.min(v,GRAPH_PCT_CAP); e.cnt[i]+=1; } }); // 그래프 평균은 200% 상한(극단 왜곡 방지). 리스트는 원본값.
    });
    return [...g.values()].map(e=>({label:e.label,points:e.sum.map((s,i)=>e.cnt[i]?Math.round(s/e.cnt[i]*10)/10:null)}))
      .sort((a,b)=>String(a.label).localeCompare(String(b.label),'ko',{numeric:true}));
  }
  function sortedOrders(){
    const arr=[...allOrders]; const k=sortState.key, dir=sortState.dir;
    if(k && k!=='_sel') arr.sort((a,b)=>{
      let x=a[k],y=b[k]; const an=(x==null||x===''),bn=(y==null||y==='');
      if(an&&bn)return 0; if(an)return 1; if(bn)return -1;
      if(typeof x==='string'||typeof y==='string') return dir*String(x).localeCompare(String(y),'ko',{numeric:true});
      return dir*((x>y?1:x<y?-1:0));
    });
    return arr;
  }
  function renderList(){
    const allSel=allOrders.length>0 && allOrders.every(o=>o._sel);
    $('lhead').innerHTML='<tr>'+COLS.map(c=>{
      if(c.chk) return '<th class="chk"><input type="checkbox" id="selAll" '+(allSel?'checked':'')+' title="전체 선택/해제"></th>';
      const arrow=sortState.key===c.k?(sortState.dir>0?' ▲':' ▼'):'';
      return '<th class="srt'+(c.l?' l':'')+'" data-k="'+c.k+'">'+c.t+arrow+'</th>';
    }).join('')+'</tr>';
    const arr=sortedOrders();
    if(!arr.length){ $('lbody').innerHTML='<tr><td colspan="8" class="l pend" style="padding:14px">해당 기간 오더가 없습니다.</td></tr>'; return; }
    $('lbody').innerHTML=arr.map(o=>{
      const i=allOrders.indexOf(o);
      return '<tr><td class="chk"><input type="checkbox" class="osel" data-i="'+i+'" '+(o._sel?'checked':'')+'></td>'
        +'<td class="l" style="font-weight:600">'+esc(o.quote_no)+'</td><td class="l">'+esc(o.customer)+'</td>'
        +'<td>'+String(o.created_at).slice(0,10)+'</td>'
        +'<td>'+durCell({value:o.order_h,state:o.order_state,over:o.order_over},'h')+'</td>'
        +'<td>'+packingCell(o)+'</td>'
        +'<td>'+durCell({value:o.sat_h,state:o.sat_state,over:o.sat_over},'h')+'</td>'
        +'<td>'+collectCell(o)+'</td></tr>';
    }).join('');
  }
  function distinctCustomers(){
    const m=new Map();
    allOrders.forEach(o=>{const c=o.customer||'(미지정)'; m.set(c,(m.get(c)||0)+1);});
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  }
  function renderCustBar(){
    const bar=$('custbar');
    if(curMode!=='customer'||!allOrders.length){ bar.style.display='none'; return; }
    bar.style.display='flex';
    const cs=distinctCustomers();
    bar.innerHTML='<span class="cblabel">고객 선택</span>'
      +'<button class="chipbtn" data-act="all">전체</button><button class="chipbtn" data-act="none">해제</button>'
      +cs.map(([c,n])=>'<span class="chip'+((custFilter&&custFilter.has(c))?' on':'')+'" data-c="'+esc(c)+'">'+esc(c)+'<span class="cn">'+n+'</span></span>').join('');
  }
  function rebuild(){ renderCustBar(); renderChart(buildLines()); renderList(); }
  async function loadAnalytics(){
    const from=$('d1').value, to=$('d2').value;
    if(!from||!to){ $('status').textContent='기간을 선택하세요.'; return; }
    $('status').textContent='불러오는 중…';
    try{
      const url=session.api+'/api/process/analytics?from='+from+'&to='+to+'&group='+curMode;
      const d=await fetch(url,{headers:auth()}).then(r=>r.json());
      if(d.error){ $('status').textContent='조회 실패: '+d.error; return; }
      if(d.kpi){ $('k_order').value=d.kpi.order_hours; $('k_packing').value=d.kpi.packing_hours; $('k_sat').value=d.kpi.sat_hours; }
      allOrders=(d.orders||[]).map(o=>({...o,_sel:true}));
      const cs=distinctCustomers();
      custFilter=new Set(cs.length>10? cs.slice(0,10).map(x=>x[0]) : cs.map(x=>x[0]));
      rebuild();
      $('status').textContent=allOrders.length+'건';
    }catch(e){ $('status').textContent='조회 오류'; }
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  $('reload').addEventListener('click',loadAnalytics);
  $('saveKpi').addEventListener('click',saveKpi);
  $('modes').addEventListener('click',e=>{const b=e.target.closest('.mbtn');if(!b)return;
    [].forEach.call(document.querySelectorAll('#modes .mbtn'),x=>x.classList.remove('on'));b.classList.add('on');curMode=b.dataset.m;rebuild();});
  $('lhead').addEventListener('click',e=>{
    const all=e.target.closest('#selAll'); if(all){ const v=all.checked; allOrders.forEach(o=>o._sel=v); rebuild(); return; }
    const th=e.target.closest('th.srt'); if(!th)return; const k=th.dataset.k;
    if(sortState.key===k) sortState.dir=-sortState.dir; else { sortState.key=k; sortState.dir=(k==='quote_no'||k==='customer'||k==='created_at')?1:-1; }
    renderList();
  });
  $('lbody').addEventListener('change',e=>{
    const cb=e.target.closest('.osel'); if(!cb)return; const i=+cb.dataset.i;
    if(allOrders[i]){ allOrders[i]._sel=cb.checked; renderChart(buildLines());
      const sa=$('selAll'); if(sa) sa.checked=allOrders.length>0&&allOrders.every(o=>o._sel); }
  });
  $('custbar').addEventListener('click',e=>{
    const b=e.target.closest('.chipbtn');
    if(b){ const cs=distinctCustomers().map(x=>x[0]); custFilter=b.dataset.act==='all'?new Set(cs):new Set(); renderCustBar(); renderChart(buildLines()); return; }
    const chip=e.target.closest('.chip'); if(!chip)return; const c=chip.dataset.c;
    if(!custFilter) custFilter=new Set(distinctCustomers().map(x=>x[0]));
    if(custFilter.has(c)) custFilter.delete(c); else custFilter.add(c);
    renderCustBar(); renderChart(buildLines());
  });
  (function(){ const ps=portalSession(); if(ps&&ps.token){ if(ps.api)$('api').value=ps.api; $('lid').value='-'; $('pin').value='-'; setTimeout(()=>login(),30);} })();
</script>
