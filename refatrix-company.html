<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 회사설정</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:760px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:12px}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  input,textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{padding:9px 16px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.danger{background:#fff;color:var(--expense);border:1px solid #e7b6af}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:12px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}.msg.ok{display:block;background:var(--income-bg);color:var(--income)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .imgbox{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
  .preview{width:160px;height:110px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:#faf8f3;overflow:hidden}
  .preview img{max-width:100%;max-height:100%}
  .preview.qr{width:120px;height:120px}
  .imgctrl{display:flex;flex-direction:column;gap:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">회사설정</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app" style="width:100%"></div>
  </div>

  <div class="hidden" id="app">
    <!-- 회사 정보 -->
    <div class="card">
      <div class="card-h">회사 정보 <span class="hint" style="font-weight:500">— 견적서에 인쇄됩니다</span></div>
      <label>회사이름 (Emisor)</label><input id="emisor" type="text">
      <label>주소 (Domicilio)</label><textarea id="domicilio" rows="2"></textarea>
      <div class="row2">
        <div><label>홈페이지</label><input id="homepage" type="text"></div>
        <div><label>전화번호</label><input id="phone" type="text"></div>
      </div>
    </div>

    <!-- 은행 계좌 -->
    <div class="card">
      <div class="card-h">수취 은행 계좌</div>
      <div class="row2">
        <div><label>Banco</label><input id="bank_name" type="text"></div>
        <div><label>Cuenta</label><input id="bank_account" type="text"></div>
        <div><label>CLABE</label><input id="bank_clabe" type="text"></div>
        <div><label>Beneficiario</label><input id="bank_holder" type="text"></div>
      </div>
    </div>

    <!-- 로고 -->
    <div class="card">
      <div class="card-h">회사 로고 <span class="hint" style="font-weight:500">— PNG/JPG, 1MB 이하 권장</span></div>
      <div class="imgbox">
        <div class="preview" id="logoPrev"><span class="hint">로고 없음</span></div>
        <div class="imgctrl">
          <input type="file" id="logoFile" accept="image/*" style="font-size:12px">
          <div style="display:flex;gap:8px"><button class="btn sm" onclick="uploadImg('logo')">로고 업로드</button><button class="btn danger sm" onclick="delImg('logo')">삭제</button></div>
          <div class="hint">업로드하면 모든 견적서에 자동 표시됩니다.</div>
        </div>
      </div>
      <div class="msg" id="logoMsg"></div>
    </div>

    <!-- WhatsApp QR -->
    <div class="card">
      <div class="card-h">WhatsApp QR 코드 <span class="hint" style="font-weight:500">— QR 이미지 파일 업로드</span></div>
      <div class="imgbox">
        <div class="preview qr" id="qrPrev"><span class="hint">QR 없음</span></div>
        <div class="imgctrl">
          <input type="file" id="qrFile" accept="image/*" style="font-size:12px">
          <div style="display:flex;gap:8px"><button class="btn sm" onclick="uploadImg('whatsapp')">QR 업로드</button><button class="btn danger sm" onclick="delImg('whatsapp')">삭제</button></div>
        </div>
      </div>
      <div class="msg" id="qrMsg"></div>
    </div>

    <div style="display:flex;gap:8px;margin-top:16px;align-items:center">
      <button class="btn" id="saveBtn" onclick="saveCompany()">회사 정보 저장</button>
      <span id="saveMsg" class="msg" style="margin:0"></span>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }

  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      loadCompany();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  async function loadCompany(){
    try{
      const c=await fetch(session.api+'/api/company',{headers:auth()}).then(r=>r.json());
      $('emisor').value=c.emisor||''; $('domicilio').value=c.domicilio||'';
      $('homepage').value=c.homepage||''; $('phone').value=c.phone||'';
      $('bank_name').value=c.bank_name||''; $('bank_account').value=c.bank_account||'';
      $('bank_clabe').value=c.bank_clabe||''; $('bank_holder').value=c.bank_holder||'';
      if(c.logo_data){ $('logoPrev').innerHTML='<img src="'+c.logo_data+'">'; }
      if(c.whatsapp_qr){ $('qrPrev').innerHTML='<img src="'+c.whatsapp_qr+'">'; }
    }catch(e){}
  }

  async function saveCompany(){
    const m=$('saveMsg');m.className='msg';$('saveBtn').disabled=true;
    try{
      const body={emisor:$('emisor').value,domicilio:$('domicilio').value,homepage:$('homepage').value,phone:$('phone').value,
        bank_name:$('bank_name').value,bank_account:$('bank_account').value,bank_clabe:$('bank_clabe').value,bank_holder:$('bank_holder').value};
      const res=await fetch(session.api+'/api/company',{method:'PUT',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)});
      const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.textContent='저장 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.textContent='저장되었습니다.';
    }catch(e){m.className='msg err';m.textContent='서버 연결 실패';}
    finally{$('saveBtn').disabled=false;}
  }

  function fileToDataUrl(file){ return new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=reject; r.readAsDataURL(file); }); }

  async function uploadImg(kind){
    const isLogo=kind==='logo';
    const file=$(isLogo?'logoFile':'qrFile').files[0];
    const m=$(isLogo?'logoMsg':'qrMsg');m.className='msg';
    if(!file){m.className='msg err';m.textContent='이미지 파일을 선택하세요.';return;}
    if(file.size>1400000){m.className='msg err';m.textContent='파일이 너무 큽니다. 1MB 이하로 줄여 주세요.';return;}
    try{
      const data=await fileToDataUrl(file);
      const url=session.api+'/api/company/'+(isLogo?'logo':'whatsapp');
      const res=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({image:data})});
      const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.textContent='업로드 실패: '+(d.error||d.note||res.status);return;}
      $(isLogo?'logoPrev':'qrPrev').innerHTML='<img src="'+data+'">';
      m.className='msg ok';m.textContent='업로드되었습니다.';
    }catch(e){m.className='msg err';m.textContent='업로드 실패';}
  }

  async function delImg(kind){
    const isLogo=kind==='logo';
    const m=$(isLogo?'logoMsg':'qrMsg');m.className='msg';
    try{
      const url=session.api+'/api/company/'+(isLogo?'logo':'whatsapp');
      await fetch(url,{method:'DELETE',headers:auth()});
      $(isLogo?'logoPrev':'qrPrev').innerHTML='<span class="hint">'+(isLogo?'로고':'QR')+' 없음</span>';
      m.className='msg ok';m.textContent='삭제되었습니다.';
    }catch(e){m.className='msg err';m.textContent='삭제 실패';}
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
<script src="refatrix-nav.js"></script>
</body>
</html>
