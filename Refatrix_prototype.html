<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현금흐름 관리 — UX 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F4F1EA; --card:#FFFFFF; --ink:#1C1B19; --muted:#6F6A60;
    --line:#E6E1D6; --line-2:#D8D2C4;
    --income:#0F6E56; --income-bg:#E4F0EB;
    --expense:#B23A2E; --expense-bg:#F6E7E4;
    --brand:#143D34; --brand-soft:#1E5247; --cream:#F4F1EA;
    --gold:#B8893B;
    --radius:12px; --radius-sm:8px;
    --shadow:0 1px 2px rgba(28,27,25,.04),0 8px 24px rgba(28,27,25,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'IBM Plex Sans KR',sans-serif;
    background:var(--paper); color:var(--ink);
    line-height:1.55; -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .mono{font-family:'IBM Plex Mono',monospace;font-feature-settings:"tnum"}
  /* ---------- top bar ---------- */
  header{
    background:var(--brand); color:var(--cream);
    padding:14px 26px; display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:14px; position:sticky; top:0; z-index:20;
    border-bottom:1px solid #0d2b25;
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:18px;font-weight:600;letter-spacing:-.01em}
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);align-self:center}
  .brand span{font-size:12px;color:#9DBBB1;font-weight:400}
  /* ---------- prototype preview harness (NOT part of product) ---------- */
  #preview-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:8px 26px;
    background:#ECE7DA;border-bottom:1px dashed var(--line-2)}
  .pv-label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;letter-spacing:.01em}
  .pv-label .pv-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .switcher{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .user-pill{
    background:#fff;border:1px solid var(--line-2);color:var(--muted);
    padding:6px 13px;border-radius:999px;font-family:inherit;font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:all .18s ease;
  }
  .user-pill:hover{border-color:var(--brand);color:var(--brand)}
  .user-pill.active{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:500}
  .user-pill .role{font-size:10.5px;opacity:.7}
  .user-pill.active .role{opacity:.6}
  /* ---------- layout ---------- */
  main{max-width:1180px;margin:26px auto;padding:0 26px;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .who{
    display:flex;align-items:center;gap:12px;margin-bottom:18px;
  }
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--brand);color:var(--cream);
    display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
  .who h2{font-size:17px;font-weight:600}
  .who p{font-size:13px;color:var(--muted)}
  .tag{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500;letter-spacing:.02em}
  .tag.input{background:#EAF0F4;color:#2C5470}
  .tag.admin{background:var(--income-bg);color:var(--income)}
  .tag.role-director{background:#143D34;color:#fff}
  .tag.role-treasury{background:var(--income-bg);color:var(--income)}
  .tag.role-marketing{background:#F3EAF7;color:#7A3C90}
  .tag.role-import{background:#EAF0F4;color:#2C5470}
  .tag.role-viewer{background:#EFEDE6;color:var(--muted)}
  .tag.role-sales{background:#FBEFE0;color:#9A5B16}
  .tag.role-salesops{background:#EAF3E9;color:#3B6E45}
  .okpill{font-size:10px;padding:1px 8px;border-radius:999px;background:var(--income-bg);color:var(--income);font-weight:600}
  .pendpill{font-size:10px;padding:1px 8px;border-radius:999px;background:#FBF4E4;color:#854F0B;font-weight:600}
  .role-mini{font-size:10px;color:var(--muted);margin-left:4px}
  .team-chip{font-size:11px;padding:2px 9px;border-radius:999px;background:#EFEDE6;color:var(--ink);font-weight:500;margin-left:4px}
  .grp-row td{font-weight:600;font-size:11px;letter-spacing:.03em;padding:5px 12px !important;border-bottom:1px solid var(--line)}
  .stage-pill{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600;white-space:nowrap}
  .hold-chip{font-size:11px;padding:1px 7px;border-radius:999px;border:1px solid;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
  .row-sel{background:#EDF3F0 !important}
  .plf-wrap{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:4px 2px 2px}
  .plf-col{flex:1;min-width:130px;display:flex;flex-direction:column}
  .plf-arrow{display:flex;align-items:center;color:var(--line-2);font-size:20px;padding:0 3px;align-self:flex-start;margin-top:24px}
  .plf-head{border-radius:8px 8px 0 0;padding:9px 10px;text-align:center}
  .plf-sname{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;opacity:.9}
  .plf-cnt{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:700;line-height:1.1;margin-top:2px}
  .plf-body{background:#FAF8F2;border:1px solid var(--line);border-top:none;border-radius:0 0 8px 8px;padding:7px;display:flex;flex-direction:column;gap:6px;min-height:48px;flex:1}
  .plf-card{background:#fff;border:1px solid var(--line);border-radius:7px;padding:7px 9px;cursor:pointer;transition:box-shadow .12s}
  .plf-card:hover{box-shadow:0 2px 9px rgba(20,61,52,.13)}
  .plf-mkt{display:inline-flex;align-items:center;gap:2px;background:#FBE7C8;color:#8A6D12;border-radius:999px;padding:1px 7px;font-size:10px;font-weight:700;cursor:pointer;margin-left:4px}
  .plf-mkt:hover{background:#F6D99B}
  .plf-cardtop{display:flex;justify-content:space-between;align-items:center;gap:6px}
  .plf-cname{font-size:12.5px;font-weight:700;color:var(--ink)}
  .plf-days{font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;white-space:nowrap}
  .plf-sub{font-size:10.5px;color:var(--muted);margin-top:3px}
  .plf-empty{color:var(--line-2);text-align:center;font-size:13px;padding:8px 0}
  .plf-legend{display:flex;gap:16px;justify-content:flex-end;margin-top:10px;font-size:11px;color:var(--muted)}
  .plf-legend .lg{display:inline-flex;align-items:center;gap:5px}
  .plf-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .pl-flow-collapsed{padding:14px;text-align:center;color:var(--muted);font-size:12.5px;background:#FAF8F2;border:1px dashed var(--line-2);border-radius:8px}
  .pipe-row{display:flex;gap:32px;margin-bottom:14px}
  .seg{display:inline-flex;border:1px solid var(--line-2);border-radius:7px;overflow:hidden}
  .seg .segbtn{border:none;background:#fff;padding:6px 13px;font-family:inherit;font-size:12.5px;cursor:pointer;color:var(--muted)}
  .seg .segbtn.on{background:var(--brand);color:#fff;font-weight:600}
  .funnel{display:flex;flex-direction:column;gap:2px;padding:4px 0}
  .fn-stage{display:flex;flex-direction:column}
  .fn-barwrap{display:flex}
  .fn-bar{background:linear-gradient(90deg,var(--brand),#1f6b58);color:#fff;border-radius:6px;padding:7px 11px;display:flex;justify-content:space-between;align-items:center;min-width:90px;transition:width .3s}
  .fn-name{font-size:12.5px;font-weight:600}
  .fn-cnt{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px}
  .fn-conv{font-size:11px;color:var(--muted);padding:2px 0 2px 6px}
  .fn-arrow{color:var(--line-2)}
  .dwell{display:flex;flex-direction:column;gap:7px;padding:4px 0}
  .dw-row{display:flex;align-items:center;gap:10px}
  .dw-lab{width:74px;font-size:12px;color:var(--ink);text-align:right;flex-shrink:0}
  .dw-track{flex:1;background:#EFEDE6;border-radius:5px;height:16px;overflow:hidden}
  .dw-fill{height:100%;border-radius:5px;transition:width .3s}
  .dw-val{width:74px;font-size:11.5px;flex-shrink:0}
  .hp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
  @media(max-width:760px){.hp-grid{grid-template-columns:1fr}}
  .hp-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
  .hp-t{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .hp-go{border:1px solid var(--line-2);background:#fff;color:var(--brand);border-radius:6px;padding:3px 9px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
  .hp-go:hover{background:var(--income-bg)}
  .hp-big{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
  .hp-sub{font-size:11.5px;color:var(--muted);margin:6px 0 8px}
  .hp-track{height:9px;background:#EFEDE6;border-radius:5px;overflow:hidden}
  .hp-fill{height:100%;border-radius:5px;transition:width .4s}
  .hp-note{font-size:11px;color:var(--muted);margin-top:8px}
  .hp-band{display:flex;gap:8px;margin-top:10px}
  .hp-band .hb-col{flex:1;background:#FAF8F2;border:1px solid var(--line);border-radius:7px;padding:7px 4px;text-align:center}
  .hp-band .hb-n{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;color:var(--brand)}
  .hp-band .hb-l{font-size:10.5px;color:var(--muted);margin-top:2px}
  .hp-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .hp-growth{font-size:12px;margin:4px 0 2px}
  .month-pick{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .month-pick .mbtns{display:flex;gap:5px;flex-wrap:wrap}
  .chk-btns{display:flex;gap:10px;flex-wrap:wrap}
  .chk-btn{flex:1;min-width:180px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;border:1px solid var(--line-2);border-radius:9px;padding:11px 14px;background:#fff;cursor:pointer;font-family:inherit;text-align:left}
  .chk-btn .cb-name{font-size:13px;font-weight:700;color:var(--ink)}
  .chk-btn .cb-win{font-size:10.5px;font-weight:400;color:var(--muted)}
  .chk-btn .cb-state{font-size:12px;color:var(--muted)}
  .chk-btn.cb-open{border-color:var(--brand);background:var(--income-bg)}
  .chk-btn.cb-open .cb-state{color:var(--brand);font-weight:600}
  .chk-btn.cb-done{border-color:var(--income);background:#EAF3EF}
  .chk-btn.cb-done .cb-state{color:var(--income);font-weight:700}
  .chk-btn.cb-locked,.chk-btn.cb-closed{opacity:.6;cursor:not-allowed;background:#FAF8F2}
  .chk-yes{color:var(--income);font-weight:700}
  .chk-no{color:var(--line-2)}
  .chk-sess{display:flex;gap:6px;align-items:center;margin-bottom:6px}
  .chk-sess input[type=text]{width:84px}
  .chk-sess input{padding:5px 8px;border:1px solid var(--line-2);border-radius:6px;font-family:inherit;font-size:12.5px}
  .pop-overlay{position:fixed;inset:0;background:rgba(18,32,28,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto}
  .pop-grid{display:grid;gap:16px;max-width:780px;width:100%}
  .pop-card{background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.3);padding:20px 22px 18px;position:relative;display:flex;flex-direction:column}
  .pop-x{position:absolute;top:10px;right:12px;border:none;background:transparent;font-size:20px;color:var(--muted);cursor:pointer;line-height:1}
  .pop-h{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--brand);text-transform:uppercase;margin-bottom:8px}
  .pop-body{font-size:13.5px;color:var(--ink);line-height:1.55;margin-bottom:16px;white-space:pre-wrap}
  .pop-ok{align-self:flex-end}
  .av-row{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:10px;background:#FAF8F2}
  .av-top{display:flex;align-items:center;margin-bottom:7px}
  .av-on{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px}
  .av-row textarea{width:100%;border:1px solid var(--line-2);border-radius:7px;padding:8px 10px;font-family:inherit;font-size:13px;resize:vertical;box-sizing:border-box}
  .av-targets{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
  .av-chip{font-size:11.5px;display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  .be-chart{display:flex;gap:10px;overflow-x:auto;align-items:flex-end;padding:8px 2px 4px;min-height:120px}
  .be-col{flex:1;min-width:78px;display:flex;flex-direction:column;align-items:center;gap:3px}
  .be-bars{display:flex;align-items:flex-end;gap:3px;height:96px}
  .be-bar{width:13px;border-radius:3px 3px 0 0}
  .be-bar.plan{background:#D9D3C3}
  .be-bar.act{background:#0F6E56}
  .be-bar.over{background:#B23A2E}
  .be-clab{font-size:10px;color:var(--muted);text-align:center;line-height:1.2}
  .be-cpct{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .be-legend{display:flex;gap:16px;justify-content:center;margin:4px 0 12px;font-size:11px;color:var(--muted)}
  .be-legend .lg{display:inline-flex;align-items:center;gap:5px}
  .be-legend i{width:11px;height:11px;border-radius:2px;display:inline-block}
  .be-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px}
  .be-pill.in{background:var(--income-bg);color:var(--income)}
  .be-pill.over{background:#F6DEDA;color:var(--expense)}
  .be-memo{width:100%;min-width:120px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:12px;box-sizing:border-box}
  .be-summary{margin-top:12px}
  .be-summary textarea{width:100%;border:1px solid var(--line-2);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;resize:vertical;box-sizing:border-box}
  .be-actadd{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:10px;background:var(--income-bg);border-radius:8px}
  .be-actadd input,.be-actadd select{padding:6px 9px;border:1px solid var(--line-2);border-radius:6px;font-family:inherit;font-size:12.5px}
  .be-num{width:90px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right}
  .be-tgt{margin-top:10px;background:var(--income-bg);border-radius:9px;padding:10px 13px}
  .be-tgt-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:2px 0}
  .be-tgt-bar{height:8px;background:#E4E0D6;border-radius:5px;margin:6px 0;overflow:hidden}
  .be-tgt-fill{height:100%;border-radius:5px}
  .intro-flow{display:flex;align-items:stretch;gap:6px;overflow-x:auto;padding:6px 2px}
  .proc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;padding:6px 0}
  @media(max-width:560px){.proc-grid{grid-template-columns:1fr 1fr}}
  .intro-step-n{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;background:var(--brand);color:#fff;font-size:10px;font-weight:800;flex:none}
  .intro-arrow{display:flex;align-items:center;color:var(--line-2);font-size:20px;flex:none}
  .intro-step{display:flex;flex-direction:column;height:100%;box-sizing:border-box;min-width:150px;text-align:left;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;transition:.15s}
  .intro-step:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(20,61,52,.12)}
  .intro-step-h{font-weight:700;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .intro-step-d{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.4}
  .intro-new{background:#0F6E56;color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:999px;letter-spacing:.04em}
  .intro-pend{display:inline-flex;align-items:center;gap:3px;background:#B23A2E;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .intro-step-pend{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:8px}
  .intro-pendlist{display:flex;flex-direction:column;gap:6px}
  .intro-pendrow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;font-size:13px;text-align:left;width:100%}
  .intro-pendrow:hover{border-color:var(--brand)}
  .intro-link{margin-left:auto;color:var(--brand);font-weight:600;font-size:12px}
  .usr-pin{font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.08em;background:var(--income-bg);color:var(--income);padding:2px 8px;border-radius:6px}
  .tgt-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:4px 0}
  .tgt-total{display:flex;justify-content:space-between;align-items:center;background:var(--brand);color:#fff;border-radius:9px;padding:12px 16px;margin-bottom:12px}
  .tgt-total .tt-label{font-size:13px;font-weight:600;opacity:.92}
  .tgt-total .tt-amt{font-size:22px;font-weight:700;letter-spacing:-.01em}
  @media(max-width:760px){.tgt-grid{grid-template-columns:repeat(3,1fr)}}
  .tgt-cell{display:flex;flex-direction:column;gap:3px}
  .tgt-cell label{font-size:11px;color:var(--muted);font-weight:600}
  .tgt-cell input{padding:6px 8px;border:1px solid var(--line-2);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right}
  .sg-grid{display:flex;gap:6px;align-items:flex-end}
  .sg-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;border-radius:7px}
  .sg-cell.cur{background:var(--income-bg)}
  .sg-m{font-size:10px;color:var(--muted)}
  .sg-bar{width:60%;height:54px;background:#EFEDE6;border-radius:4px;display:flex;align-items:flex-end;overflow:hidden}
  .sg-fill{width:100%;border-radius:4px 4px 0 0;transition:height .3s}
  .sg-pct{font-size:10.5px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .uw-cell{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .uw-cell input[type=time]{width:104px;padding:5px 7px;border:1px solid var(--line-2);border-radius:6px;font-family:inherit;font-size:12.5px;box-sizing:border-box}
  .uw-sep{color:var(--muted)}
  .uw-tag{font-size:10.5px;min-width:30px;text-align:center;padding:1px 7px;border-radius:999px;background:#EFEDE6;color:var(--muted)}
  .uw-tag.set{background:var(--income-bg);color:var(--income);font-weight:600}
  .mbtn{border:1px solid var(--line-2);background:#fff;color:var(--ink);border-radius:7px;padding:6px 12px;font-family:inherit;font-size:12.5px;cursor:pointer;position:relative}
  .mbtn:hover{border-color:var(--brand)}
  .mbtn.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600}
  .mbtn.cur::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
  .cal-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .cal-nav{display:flex;align-items:center;gap:6px}
  .cal-lab{font-weight:600;font-size:14px;margin-left:6px}
  .cal-grid{display:grid;gap:1px;background:var(--line)}
  .cal-head .cal-dow{background:#FAF8F2;text-align:center;padding:6px 0;font-size:11.5px;font-weight:600;color:var(--muted)}
  .cal-dow.sun{color:var(--expense)} .cal-dow.sat{color:#2C5470}

  .tk-meta{font-size:10.5px;color:var(--muted);margin-top:2px}

  .tk-badge.prog{background:#FBF0D9;color:#9A7B16}
  .tk-badge.late{background:#F6DEDA;color:var(--expense)}

  .tk-memos{margin-top:6px}

  .tk-del{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;flex-shrink:0}
  .tk-empty{font-size:11.5px;color:var(--line-2);padding:4px 2px}

  .stage-change{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;padding:12px;background:var(--income-bg);border-radius:var(--radius-sm)}

  .banner{
    background:#FBF8F0;border:1px solid var(--line);border-left:3px solid var(--gold);

  }

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  .dow-sm{font-size:10px;color:var(--muted);margin-left:2px}
  .wsub.pos{color:var(--income)} .wsub.neg{color:var(--expense)}

function regenPlans(){
  txns = txns.filter(t=> !(t.status==='plan' && t.ruleId && t.auto===true));
  const horizon = addMonths(TODAY,12).slice(0,7);
  const pad=n=>String(n).padStart(2,'0');
  const fmtD=dt=>`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
  const pushOcc=(r,dd,period)=>{
    if(!txns.some(t=>t.ruleId===r.id && t.rulePeriod===period && t.auto!==true))
      txns.push({id:nextId++, user:r.user, acc:r.acc, date:dd, dir:r.dir, amt:r.amt, memo:r.memo, cat:r.cat, status:'plan', approved:true, ruleId:r.id, rulePeriod:period, auto:true});
  };
  recurs.forEach(r=>{
    const toStr = r.to || horizon;
    if(r.freq==='week'){
      // 주 단위: from 월 1일부터 to 월 말일까지 해당 요일마다 반복
      const wd=(r.wday==null?1:r.wday);
      const [ey,em]=toStr.split('-').map(Number);
      const endDate=`${ey}-${pad(em)}-${pad(new Date(ey,em,0).getDate())}`;
      let d=new Date(+r.from.split('-')[0], +r.from.split('-')[1]-1, 1);
      while(d.getDay()!==wd) d.setDate(d.getDate()+1);
      let guard=0;
      while(guard++<420){
        const dd=fmtD(d);
        if(dd>endDate) break;
        pushOcc(r, dd, dd);   // 주 단위는 회차 식별을 날짜로
        d.setDate(d.getDate()+7);
      }
    } else {
      // 월 단위
      let [y,m]=r.from.split('-').map(Number);
      const [ty,tm]=toStr.split('-').map(Number);
      let guard=0;
      while((y<ty || (y===ty&&m<=tm)) && guard++<60){
        const last=new Date(y,m,0).getDate(), d=Math.min(r.day,last);
        const dd=`${y}-${pad(m)}-${pad(d)}`;
        pushOcc(r, dd, dd.slice(0,7));
        m++; if(m>12){m=1;y++;}
      }
    }
  });
}

  const list=pendingPopups(u); if(!list.length) return '';
  const n=list.length; const colN = n===1?1:2;   // 1개 단일, 그 외 2열(4개면 2x2)
  return `<div class="pop-overlay" id="pop-ov">
    <div class="pop-grid" style="grid-template-columns:repeat(${colN},minmax(260px,360px))">
      ${list.map(a=>`<div class="pop-card">
        <button class="pop-x" data-avclose="${a.id}" title="확인">×</button>
        <div class="pop-h">공지</div>
        <div class="pop-body">${String(a.text).replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
        <button class="btn pop-ok" data-avclose="${a.id}">확인</button>
      </div>`).join('')}
    </div></div>`;
}
function wirePopups(u){
  document.querySelectorAll('[data-avclose]').forEach(b=>b.onclick=()=>{ closedPopups.add(+b.dataset.avclose); if(pendingPopups(u).length===0) popupPreview=false; render(); });
}

function render(){
  renderSwitcher();
  const u = currentUser();
  if(!pageAllowed(nav,u)) nav = pagesFor(u)[0].id;
  if(!seesAccounts(u)) mode='total';   // 계좌 분리 열람 없는 사용자는 통합 보기 고정
  if(period==='pnl' && !seesMargin(u)) period='month';   // 손익은 디렉터만
  renderNav(u);
  const app = document.getElementById('app');
  if(nav==='home'){ if(u.role==='director'){ app.innerHTML = homePage(u); wireHome(u); } else { app.innerHTML = introPage(u); wireHome(u); wireIntro(u); } }
  else if(nav==='flow'){ app.innerHTML = flowPage(u) + budgetExecCard(u); buildView(); wireFlow(u); wireBudgetExec(u); }
  else if(nav==='record'){ app.innerHTML = recordPage(u); wireTxForm(u,'actual'); wireMigration(u); }
  else if(nav==='plan'){ app.innerHTML = planPage(u); wireTxForm(u,'plan'); }
  else if(nav==='sales'){ app.innerHTML = salesPage(u); wireSalesForm(u); }
  else if(nav==='invoice'){ app.innerHTML = invoicePage(u); wireInvoiceForm(u); }
  else if(nav==='collect'){ app.innerHTML = collectPage(u); }
  else if(nav==='confirm'){ app.innerHTML = confirmPage(u); wireConfirm(u); }
  else if(nav==='approve'){ app.innerHTML = approvePage(u); wireApprove(u); }
  else if(nav==='rules'){ app.innerHTML = rulesPage(u); wireRules(); }
  else if(nav==='products'){ app.innerHTML = productsPage(u); wireProducts(u); }
  else if(nav==='customers'){ app.innerHTML = customersPage(u); wireCustomers(u); }
  else if(nav==='pipeline'){ app.innerHTML = pipelinePage(u); wirePipeline(u); }
  else if(nav==='calendar'){ app.innerHTML = calendarPage(u); wireCalendar(u); }
  else if(nav==='tareas'){ app.innerHTML = tareasPage(u); wireTareas(u); }
  else if(nav==='inventory'){ app.innerHTML = inventoryPage(u); wireInventory(u); }
  else if(nav==='settings'){ app.innerHTML = settingsPage(u); wireSettings(u); }
  const ov=popupOverlay(u); if(ov){ app.innerHTML += ov; wirePopups(u); }
}

function wireMigration(u){
  const COLS=['Date','Type','Customer','Account','Amount_MXN','Notes','Category'];
  const tm=document.getElementById('mig-tmpl'); if(tm) tm.onclick=()=>{
    const sample=[COLS,
      ['2026-01-09','수입','Cliente XYZ','Revenue',1850000,'1월 매출','Revenue'],
      ['2026-01-15','지출','','Payroll',620000,'1월 급여','Opex'],
      ['2026-01-20','지출','Proveedor MX','Product Purchase',940000,'원자재 매입','COGS'],
      ['2026-02-03','지출','','Import Logistics',130000,'수입 통관·운송','COGS'],
      ['2026-02-28','투자','','Capex',500000,'설비 취득','Financing'],
      ['2026-03-05','차입','Banco','Loan Inflow',2000000,'운전자금 차입','Financing']];
    const ws=XLSX.utils.aoa_to_sheet(sample);
    // 안내 시트: 허용 값 + 자동 분류
    const guide=[['Account','자동 과목','방향','권장 Type','권장 Category']];
    Object.entries(MIG_MAP).forEach(([k,v])=>guide.push([k, catName(v.cat)+' ('+v.cat+')', v.dir==='in'?'유입(수입)':'유출(지출)', v.type, v.cmap]));
    const gws=XLSX.utils.aoa_to_sheet(guide);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'실적이관');
    XLSX.utils.book_append_sheet(wb,gws,'안내(허용값)');
    XLSX.writeFile(wb,'실적이관_양식.xlsx');
  };
  const imp=document.getElementById('mig-import'); if(imp) imp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        if(!rows.length){ alert('빈 파일입니다.'); return; }
        const hdr=rows[0].map(h=>String(h||'').trim().toLowerCase());
        const ix=n=>hdr.indexOf(n.toLowerCase());
        const di=ix('Date'), ty=ix('Type'), cu=ix('Customer'), ai=ix('Account'), mi=ix('Amount_MXN'), ni=ix('Notes'), ca=ix('Category');
        if(di<0||ty<0||ai<0||mi<0){ alert('헤더(Date / Type / Account / Amount_MXN)가 필요합니다. 양식을 사용하세요.'); return; }
        const fmtDate=v=>{ if(v instanceof Date){const p=n=>String(n).padStart(2,'0');return `${v.getFullYear()}-${p(v.getMonth()+1)}-${p(v.getDate())}`;} const s=String(v||'').trim(); const m=s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/); return m?`${m[1]}-${String(+m[2]).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`:''; };
        const accKey=s=>{ s=String(s||'').trim().toLowerCase(); return Object.keys(MIG_MAP).find(k=>k.toLowerCase()===s); };
        let ok=0, skip=0; const warns=[]; const skips=[];
        rows.slice(1).forEach((row,idx)=>{
          const rn=idx+2;
          const date=fmtDate(row[di]);
          const key=accKey(row[ai]); const map=key?MIG_MAP[key]:null;
          const amt=+String(row[mi]??'').replace(/[^0-9.\-]/g,'');
          if(!date||!map||!amt){ skip++; skips.push(`행 ${rn}: ${!date?'날짜오류':!map?'Account 미인식':'금액오류'}`); return; }
          // Type / Category 검증 (Account 기준이 정답)
          const tIn=String(row[ty]||'').trim();
          const cIn=ca>=0?String(row[ca]||'').trim().toLowerCase():'';
          if(tIn && tIn!==map.type) warns.push(`행 ${rn}: Type '${tIn}' → 권장 '${map.type}'(${key})`);
          if(cIn && cIn!==map.cmap) warns.push(`행 ${rn}: Category '${row[ca]}' → 권장 '${map.cmap}'(${key})`);
          txns.push({id:nextId++, user:curUser, acc:MIG_ACC, date, dir:map.dir, amt, memo:(ni>=0?String(row[ni]||'').trim():''), cat:map.cat, status:'actual',
            customer:(cu>=0?String(row[cu]||'').trim():'')||undefined, source:'migration'});
          ok++;
        });
        uploadLog.push({ts:nowStamp(), user:curUser, kind:'실적이관', file:file.name, rows:ok});
        let msg=`실적 이관 완료: 등록 ${ok}건 · 건너뜀 ${skip}건`;
        if(skips.length) msg+='\n\n[건너뜀]\n'+skips.slice(0,8).join('\n')+(skips.length>8?`\n…외 ${skips.length-8}건`:'');
        if(warns.length) msg+=`\n\n[검증 경고 ${warns.length}건] (Account 기준으로 반영됨)\n`+warns.slice(0,8).join('\n')+(warns.length>8?`\n…외 ${warns.length-8}건`:'');
        alert(msg);
        render();
      }catch(err){ alert('업로드 실패: '+err.message); }
    };
    r.readAsArrayBuffer(file);
  };
}

       <div class="stat"><div class="k">승인 대기 계획</div><div class="v mono" style="color:${pend.length?'#854F0B':'var(--muted)'}">${pend.length}건</div></div>

     </div>
   <div class="banner">${immediate?'작성한 계획은 <b>즉시 반영</b>됩니다. 매월 반복 항목은 "고정비 규칙", 한 번뿐인 지출/수입은 여기서 편성하세요.':'작성한 계획은 <b>승인 대기</b>로 등록되고, 디렉터가 승인하면 현금흐름·월 달력에 반영됩니다. 아래 목록에서 본인 계획 전체와 승인 여부를 확인할 수 있습니다.'}</div>
   <div class="grid-2">
     ${txFormCard(u,'plan')}
     <div class="card">
       <div class="card-h">내 계획 전체 <span class="src">${mine.length}건 · 승인 ${app.length} / 대기 ${pend.length}</span></div>
       ${mine.length? txEditTable(mine,'plan',!seesAccounts(u)) : '<div class="empty">편성한 계획이 없습니다.</div>'}
     </div>
   </div>`;
}
// 편집 가능한 내역/계획 테이블
function txEditTable(list, kind, hideAcc){
  return `<table><thead><tr><th>날짜</th>${hideAcc?'':'<th>계좌</th>'}<th>메모 / 계정</th><th style="text-align:right">금액</th>${kind==='plan'?'<th>상태</th>':''}<th></th></tr></thead><tbody>
    ${list.map(t=>`<tr class="row ${t.dir==='in'?'row-in':'row-out'}">

function wireInvoiceForm(u){
  const eid=invEditId;

  const custEl=document.getElementById('i-cust');
  const curCust=()=>custByName((custEl.value||'').trim());
  const calcTotal=()=>{ const t=(+qty.value||0)*(+price.value||0)*(1+(+iva.value||0)/100); totalEl.textContent=fmtCur(Math.round(t),'MXN'); return Math.round(t); };
  const calcColl=()=>{ const d=dateEl.value,n=+daysEl.value||0; if(d) collEl.textContent=addDays(d,n)+`  (${n}일 후)`; };
  const calcMargin=()=>{
    const p=prodByCtr((skuEl.value||'').trim()); const q=+qty.value||0;
    if(!p){ marginEl.textContent='제품 미선택 — 원가 미반영'; return; }

    marginEl.innerHTML=`매출원가 ${fmtCur(cogs,'MXN')} · 마진 <b style="color:${m>=0?'var(--income)':'var(--expense)'}">${fmtCur(m,'MXN')}</b> (${rev?((m/rev)*100).toFixed(1):0}%)`;
  };
  const onSku=()=>{ const p=prodByCtr((skuEl.value||'').trim()); const c=curCust();
    if(p){ price.value=discountedUnit(p,c); iva.value=p.iva;
      skuInfo.innerHTML=`${p.app||''} · 정가 ${fmtCur(p.list,'MXN')} → 단가 ${fmtCur(discountedUnit(p,c),'MXN')}${c?` <span class="role-mini">(${c.name} 할인 ${c.discount}%)</span>`:' <span class="role-mini">(고객 선택 시 할인 적용)</span>'} · 원가 ${fmtCur(unitCost(p),'MXN')} · 재고 ${p.stock}`; }

    document.getElementById('i-memo').value=t.memo||'';
    document.getElementById('i-cancel').onclick=()=>{ invEditId=null; render(); };
  }
  calcTotal(); calcColl(); onSku();
  skuEl.oninput=onSku;
  custEl.oninput=onSku;
  [qty,price,iva].forEach(el=>el.oninput=()=>{calcTotal();calcMargin();});

function uploadLogTable(kind){

  </tbody></table>`;
}
function wireProducts(u){
  const s=document.getElementById('pSearch');
  if(s) s.oninput=()=>{ prodSearch=s.value; const v=s.value; render(); const ns=document.getElementById('pSearch'); if(ns){ns.focus(); ns.value=v; ns.setSelectionRange(v.length,v.length);} };
  document.querySelectorAll('[data-pedit]').forEach(b=>b.onclick=()=>{ prodEditCtr=b.dataset.pedit; render(); });
  document.querySelectorAll('[data-pdel]').forEach(b=>b.onclick=()=>{ if(confirm('이 SKU를 삭제할까요?')){ products=products.filter(p=>p.ctr!==b.dataset.pdel); render(); } });
  const cx=document.getElementById('p-cancel'); if(cx) cx.onclick=()=>{ prodEditCtr=null; render(); };
  const save=document.getElementById('p-save'); if(save) save.onclick=()=>{
    const cost=seesCost(u), hasCatalog=(u.role==='director'||u.role==='salesops');
    const g=k=>{ const el=document.getElementById('pf-'+k); return el?el.value.trim():''; };
    if(hasCatalog){
      const ctr=g('ctr'); if(!ctr){ alert('CTR Code는 필수입니다.'); return; }
      const catalog={ctr, scode:g('scode'), app:g('app'), list:+g('list')||0, disc:+g('disc')||0, iva:+g('iva')||16, rack:g('rack'), ean:g('ean')};
      const costPart = cost?{buy:+g('buy')||0, other:+g('other')||0}:{};
      if(prodEditCtr){ Object.assign(prodByCtr(prodEditCtr), catalog, costPart); prodEditCtr=null; }
      else if(prodByCtr(ctr)){ if(confirm('같은 CTR Code가 있습니다. 덮어쓸까요?')) Object.assign(prodByCtr(ctr),catalog,costPart); else return; }
      else products.push({...catalog, stock:0, buy:cost?(+g('buy')||0):0, other:cost?(+g('other')||0):0});
    } else if(cost && prodEditCtr){   // 수입담당: 원가만 갱신
      Object.assign(prodByCtr(prodEditCtr), {buy:+g('buy')||0, other:+g('other')||0}); prodEditCtr=null;
    }
    render();
  };
  const expCols = seesCost(u) ? PROD_COLS : PROD_COLS.filter(c=>!['buy','other'].includes(c.k));
  const tm=document.getElementById('p-tmpl'); if(tm) tm.onclick=()=>{
    const ws=XLSX.utils.aoa_to_sheet([expCols.map(c=>c.t)]);
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'제품마스터');
    XLSX.writeFile(wb,'제품마스터_양식.xlsx');
  };
  const xx=document.getElementById('p-xlsx'); if(xx) xx.onclick=()=>{
    const rows=[expCols.map(c=>c.t), ...products.map(p=>expCols.map(c=>p[c.k]))];
    const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'제품마스터'); XLSX.writeFile(wb,'제품마스터.xlsx');
  };
  const imp=document.getElementById('p-import'); if(imp) imp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        if(!rows.length){ alert('빈 파일입니다.'); return; }
        const hdr=rows[0].map(h=>String(h||'').trim());
        const idx={}; PROD_COLS.forEach(c=>{ idx[c.k]=hdr.indexOf(c.t); });
        if(idx.ctr<0){ alert('헤더에 \"CTR Code\" 열이 필요합니다. 양식 다운로드를 사용하세요.'); return; }
        const cost=seesCost(u);
        let added=0, upd=0;
        rows.slice(1).forEach(row=>{
          const ctr=String(row[idx.ctr]??'').trim(); if(!ctr) return;
          const get=(k,num)=>{ const i=idx[k]; let v=i>=0?row[i]:''; return num?(+String(v).replace(/[^0-9.\-]/g,'')||0):String(v??'').trim(); };
          const rec={ctr, scode:get('scode'), app:get('app'), list:get('list',1), disc:get('disc',1), iva:get('iva',1)||16, rack:get('rack'), ean:get('ean'), stock:get('stock',1)};
          if(cost){ rec.buy=get('buy',1); rec.other=get('other',1); }   // 원가는 권한자만 반영
          const ex=prodByCtr(ctr); if(ex){ Object.assign(ex,rec); upd++; } else { products.push({buy:0,other:0,...rec}); added++; }
        });
        alert(`가져오기 완료: 신규 ${added}개 · 갱신 ${upd}개`);
        uploadLog.push({ts:nowStamp(), user:curUser, kind:'제품마스터', file:file.name, rows:added+upd});
        render();
      }catch(err){ alert('가져오기 실패: '+err.message); }
    };
    r.readAsArrayBuffer(file);
  };
}

/* ============ 영업 현황 대시보드 (퍼널·병목·정체) ============ */
let pipeUnit = 'week';
let pipeWeek = null;
let pipeMonth = null;
let pipeBasis = 'cumulative';   // 'cumulative' | 'period'
let pipeRep = 'all';            // 'all' | userId
let progCmp = 'period';         // 진전 비교 축: 'period'(이번 vs 직전) | 'rep'(영업사원 나란히)
function stageAsOf(custNo, date){
  const ls=stageLog.filter(l=>l.custNo===custNo && l.date<=date).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  return ls.length?ls[ls.length-1].stage:null;
}
function movesIn(start,end){
  const e=stageLog.filter(l=>l.date>=start && l.date<=end);
  return {up:e.filter(x=>x.dir==='up').length, down:e.filter(x=>x.dir==='down').length, init:e.filter(x=>x.dir==='init').length, list:e};
}
function pipePeriod(){
  if(pipeUnit==='week'){
    const start=pipeWeek||weekStart(TODAY), end=addDays(start,6);
    const pStart=addDays(start,-7), pEnd=addDays(start,-1);
    const L=s=>`${parseD(s).getMonth()+1}/${parseD(s).getDate()}`;
    return {start,end,pStart,pEnd,lab:`${L(start)}~${L(end)}`,pLab:`${L(pStart)}~${L(pEnd)}`};
  }
  const ym=pipeMonth||TODAY.slice(0,7);
  const pYm=addMonths(ym+'-01',-1).slice(0,7);
  return {start:ym+'-01',end:monthEndStr(ym),pStart:pYm+'-01',pEnd:monthEndStr(pYm),lab:ym,pLab:pYm};
}
function repCustomers(){ return pipeRep==='all'?customers:customers.filter(c=>c.owner===+pipeRep); }
function ownerOf(custNo){ const c=custByNo(custNo); return c?c.owner:null; }
function maxReachedIdx(custNo){ let mx=-1; stageLog.filter(l=>l.custNo===custNo).forEach(l=>{ const i=stageIdx(l.stage); if(i>mx)mx=i; }); return mx; }
// 구간(단계)별 체류 표본 수집: [{stageIdx, days, custNo, endDate, owner}]
function dwellSamples(){
  const out=[];
  customers.forEach(c=>{
    const ls=stageLog.filter(l=>l.custNo===c.no).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
    for(let i=0;i<ls.length-1;i++){ out.push({stageIdx:stageIdx(ls[i].stage), days:daysBetween(ls[i].date, ls[i+1].date), custNo:c.no, endDate:ls[i+1].date, owner:c.owner, fwd:stageIdx(ls[i+1].stage)>stageIdx(ls[i].stage)}); }
  });
  return out;
}
function pipelinePage(u){

    // 기간 내 각 단계 '진입' 건수 (해당 단계로 들어온 이동, 담당 필터)
    const ev=stageLog.filter(l=>l.date>=P.start && l.date<=P.end && (pipeRep==='all'||ownerOf(l.custNo)===+pipeRep));

  const dwellByStage=stages.map((s,i)=>{ const ss=samples.filter(x=>x.stageIdx===i); const avg=ss.length?Math.round(ss.reduce((a,b)=>a+b.days,0)/ss.length):null; return {s, avg, n:ss.length}; });
  const dMax=Math.max(1,...dwellByStage.map(d=>d.avg||0));

      <div class="dw-val mono">${d.avg!=null?d.avg+'일':'-'}<span class="role-mini"> n=${d.n}</span></div>
    </div>`).join('')}</div>`;
  // ---- 정체 고객 (현재 기준) ----
  const stalled=custs.filter(c=>c.stage).map(c=>({c,d:holdingDays(c),lv:holdLevel(holdingDays(c))})).filter(x=>x.lv!=='ok').sort((a,b)=>b.d-a.d);
  // ---- 기간 이동 요약 ----

  // ---- 단계별 상위 진전 비교 (이번 vs 직전 기간) — 스냅샷이 아닌 '진전 발생' 건수 ----
  const progAtR=(i,st,en,rep)=>stageLog.filter(l=>l.date>=st && l.date<=en && l.prev && stageIdx(l.prev)===i && stageIdx(l.stage)>i && (rep==null||ownerOf(l.custNo)===rep)).length;
  const endNow = P.end>TODAY?TODAY:P.end;
  const repFilterId = pipeRep==='all'?null:+pipeRep;
  const cmpToggle = `<span class="seg"><button class="segbtn ${progCmp==='period'?'on':''}" id="pc-period">기간 비교</button><button class="segbtn ${progCmp==='rep'?'on':''}" id="pc-rep">영업사원 비교</button></span>`;
  let progHtml;

/* ============ 폼 와이어링 (실적/계획 공용) ============ */
function wireTxForm(u, kind){
  let dir='out';
  const eid = kind==='plan'? planEditId : editId;
  const hasAcc = kind==='actual' || u.role==='director' || u.role==='treasury';   // 계획도 디렉터·자금담당은 계좌 직접 지정
  const segIn=document.getElementById('seg-in'), segOut=document.getElementById('seg-out');
  const accSel=document.getElementById('f-acc');
  const catSel=document.getElementById('f-cat');
  const evField=document.getElementById('ev-field');
  const fillCats=keep=>{ catSel.innerHTML=catsForDir(dir).map(c=>`<option value="${c.id}">${c.name} · ${c.group}</option>`).join(''); if(keep)catSel.value=keep; };
  const isCash=()=>{const a=accSel?accounts.find(x=>x.id===+accSel.value):null;return a&&a.type==='현금';};
  const syncEv=()=>{ if(evField) evField.style.display=(dir==='out'&&isCash())?'block':'none'; };
  const setDir=d=>{dir=d; segIn.className=d==='in'?'on-in':''; segOut.className=d==='out'?'on-out':''; fillCats(); syncEv();};
  if(eid!=null){
    const t=txns.find(x=>x.id===eid);
    document.getElementById('f-date').value=t.date; if(accSel&&t.acc) accSel.value=t.acc;
    document.getElementById('f-amt').value=t.amt; document.getElementById('f-memo').value=t.memo;
    if(evField) document.getElementById('f-ev').value=t.ev||'';
    setDir(t.dir); fillCats(t.cat);
    document.getElementById('f-cancel').onclick=()=>{ if(kind==='plan')planEditId=null; else editId=null; render(); };
  } else {
    setDir('out');
    if(kind==='plan'){ const def=u.role==='import'?'5010':u.role==='marketing'?'6070':null; if(def)catSel.value=def; }
  }
  segIn.onclick=()=>setDir('in'); segOut.onclick=()=>setDir('out');
  if(accSel) accSel.onchange=syncEv;
  document.getElementById('f-save').onclick=()=>{
    const date=document.getElementById('f-date').value, amt=+document.getElementById('f-amt').value;
    const acc = hasAcc && accSel ? +accSel.value : null;
    const memo=document.getElementById('f-memo').value.trim(), cat=catSel.value;
    const ev=evField?document.getElementById('f-ev').value.trim():'';
    if(!date||!amt||amt<=0){alert('날짜와 0보다 큰 금액을 입력해주세요.');return;}
    if(kind==='actual'){
      const cashOut = dir==='out' && accCur(acc) && accounts.find(a=>a.id===acc).type==='현금';
      if(cashOut && !ev){alert('현금 지출은 증빙번호(영수증)가 필수입니다.');return;}
      if(eid!=null){ Object.assign(txns.find(x=>x.id===eid),{date,acc,amt,memo,cat,dir,ev:cashOut?ev:undefined}); editId=null; }
      else txns.push({id:nextId++,user:curUser,acc,date,dir,amt,memo,cat,status:'actual',ev:cashOut?ev:undefined});
    } else {
      const appr = u.role==='director' || u.role==='treasury';   // 디렉터·자금담당 계획은 즉시 반영, 마케팅·수입은 승인 대기
      if(eid!=null){ const t=txns.find(x=>x.id===eid); Object.assign(t,{date,amt,memo,cat,dir,approved:appr}); if(hasAcc)t.acc=acc; planEditId=null; }
      else txns.push({id:nextId++,user:curUser,acc:hasAcc?acc:null,date,dir,amt,memo,cat,status:'plan',approved:appr});
    }
    render();
  };
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{ if(kind==='plan')planEditId=+b.dataset.edit; else editId=+b.dataset.edit; render(); });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ if(confirm('삭제할까요?')){txns=txns.filter(x=>x.id!==+b.dataset.del);render();} });
}

    const sel=document.querySelector('[data-apacc="'+t.id+'"]');

  document.querySelectorAll('[data-page]').forEach(c=>c.onchange=()=>{ const [uid,pid]=c.dataset.page.split(':'); const us=users.find(x=>x.id===+uid); if(!us)return; const ps=userPages(us); if(c.checked){ if(!ps.includes(pid)) ps.push(pid); } else { us.pages=ps.filter(x=>x!==pid); } render(); });

  document.querySelectorAll('[data-acc]').forEach(c=>c.onchange=()=>{ const [uid,aid]=c.dataset.acc.split(':').map(Number); const us=users.find(x=>x.id===uid); if(c.checked){ if(!us.accs.includes(aid))us.accs.push(aid);} else us.accs=us.accs.filter(x=>x!==aid); });

/* ============ 관리자 화면 ============ */
// 사용자별 통화 범위 상한(curScope)이 있으면 그 통화로 고정
function effCurView(){ const u=currentUser(); const cs=u.curScope||'all'; return cs==='all'?curView:cs; }
// 표시 통화: 계좌별이면 그 계좌 통화, 아니면 통화 보기(USD 또는 MXN 환산)
function viewCur(){ if(mode==='account') return accCur(selAcc); return effCurView()==='USD'?'USD':'MXN'; }
// 현재 스코프에 포함되는 계좌 (통화 범위 상한 반영)
function includedAccts(){
  if(mode==='account') return [selAcc];
  const cv=effCurView();
  if(cv==='MXN') return accounts.filter(a=>a.cur==='MXN').map(a=>a.id);
  if(cv==='USD') return accounts.filter(a=>a.cur==='USD').map(a=>a.id);
  return accounts.map(a=>a.id);
}
// 데이터 범위: 본인(scope='own')이면 본인 작성분만, 전체(scope='all')면 모두
const dataAll = u => u.role==='director' || u.scope==='all';
// 특수 레코드(매출/수금 계획·인보이스) 가시성 — scope 원칙 위에 덧씌움
function canSeeRecord(t,u){
  if(u.role==='director') return true;
  if(t.kind==='sales')   return t.user===u.id || ['treasury','marketing','sales'].includes(u.role);   // 매출·수금 계획: 자금·마케팅·영업
  if(t.kind==='invoice') return t.user===u.id || ['treasury','salesops'].includes(u.role);            // 인보이스: 자금·영업지원 (마케팅·수입 제외)
  return dataAll(u) || t.user===u.id;
}
// 계좌 매칭 (미지정 계좌 = MXN 가정, 통합·MXN/전체 보기에서만 노출)
function acctOK(t){
  if(t.acc==null){ const cv=effCurView(); return mode!=='account' && (cv==='all'||cv==='MXN'); }
  return includedAccts().includes(t.acc);
}
function inScope(t){ const u=currentUser(); return acctOK(t) && canSeeRecord(t,u); }
// 잔액 열람: 원칙상 자금관리자(자금담당)·디렉터, 또는 별도 허용된 사용자만
const seesBalance = u => u.role==='director' || u.role==='treasury' || u.seeBalance===true;
// 표시 통화 기준 환산값 (MXN 보기에서 USD 계좌는 환율 적용)
function val(t){ return (viewCur()==='MXN' && accCur(t.acc)==='USD') ? t.amt*fxRate : t.amt; }
function openingOf(accId){ const a=accounts.find(x=>x.id===accId); return (viewCur()==='MXN'&&a.cur==='USD')?a.open*fxRate:a.open; }
function scopeOpening(){ return includedAccts().reduce((s,id)=>s+openingOf(id),0); }
// 화면에 보이는 거래: 실적 + (예측 표시 시 예측)
// 현금흐름에 반영되는 예측 = 승인된 계획만 (미승인 = 승인 대기, 반영 안 됨)
function planLive(t){ return t.status==='plan' && t.approved; }
function viewTxns(){ return txns.filter(t=> inScope(t) && (t.status==='actual' || (showPlan && planLive(t))) ); }

function balanceThrough(dateStr){
  let bal=scopeOpening();
  viewTxns().filter(t=>t.date<=dateStr).forEach(t=>bal+=t.dir==='in'?val(t):-val(t));
  return bal;
}
// 특정 통화 계좌들만의 마감 잔액 (해당 통화 원본 기준, 현재 스코프 내)
function balByCur(dateStr, cur){
  const ids=includedAccts().filter(id=>accCur(id)===cur);
  let b=ids.reduce((s,id)=>s+accounts.find(a=>a.id===id).open,0);
  txns.filter(t=>ids.includes(t.acc)&&(t.status==='actual'||(showPlan&&planLive(t)))&&t.date<=dateStr)
      .forEach(t=>b+=t.dir==='in'?t.amt:-t.amt);
  return b;
}
function actualBalThrough(dateStr){
  let bal=scopeOpening();
  txns.filter(t=>inScope(t)&&t.status==='actual'&&t.date<=dateStr).forEach(t=>bal+=t.dir==='in'?val(t):-val(t));
  return bal;
}
function projBalThrough(dateStr){
  let bal=scopeOpening();
  txns.filter(t=>inScope(t)&&t.date<=dateStr&&(t.status==='actual'||planLive(t))).forEach(t=>bal+=t.dir==='in'?val(t):-val(t));
  return bal;
}
function netOnDay(dateStr){
  let n=0; viewTxns().filter(t=>t.date===dateStr).forEach(t=>n+=t.dir==='in'?val(t):-val(t)); return n;
}
function dayHasPlan(dateStr){ return showPlan && txns.some(t=>inScope(t)&&planLive(t)&&t.date===dateStr); }
function dayTxns(dateStr){ return viewTxns().filter(t=>t.date===dateStr).sort((a,b)=>val(b)-val(a)); }
// 계좌별 잔액은 그 계좌의 고유 통화로 (환산 없음)
function accBalThrough(accId,dateStr){
  let b=accounts.find(a=>a.id===accId).open;
  txns.filter(t=>t.acc===accId&&t.date<=dateStr&&(t.status==='actual'||(showPlan&&planLive(t)))).forEach(t=>b+=t.dir==='in'?t.amt:-t.amt);
  return b;
}
// 증빙 규칙: 현금 계좌에서의 지출은 영수증(증빙번호) 필수
function isCashOut(t){ const a=accounts.find(x=>x.id===t.acc); return !!a && a.type==='현금' && t.dir==='out'; }
// 도래한 미확인 예측 = 확인(확정) 의무 — 승인된 계획만
function maturedPlans(forUser){
  return txns.filter(t=>planLive(t) && t.date<=TODAY && (forUser?t.user===forUser:true))
             .sort((a,b)=>a.date.localeCompare(b.date));
}
// 실적 반영 권한: 디렉터는 전체, 자금담당은 본인 작성분 + 수금계획·인보이스(자금 유입)
function canConfirm(t,u){ return u.role==='director' || (u.role==='treasury' && (t.user===u.id || t.kind==='sales' || t.kind==='invoice')); }
// 이번 달(focus 월) 전체 계획 + 지난 연체 계획 — 승인된 계획 중 권한 있는 것만
function planMgrList(u){
  const fm=confirmMonth;
  return txns.filter(t=>planLive(t)
      && (t.date.slice(0,7)===fm || t.date<TODAY)
      && canConfirm(t,u))
    .sort((a,b)=>a.date.localeCompare(b.date));

// 실현되어 예측과 차이가 난 실적 (예산 대비)
function realizedVariances(){
  return txns.filter(t=>t.status==='actual'&&t.variance!==undefined&&t.variance!==0&&inScope(t))
             .sort((a,b)=>b.date.localeCompare(a.date));

/* ----- 계획 확정: 실현 / 변동 / 이월 / 취소 ----- */
let confirmId=null, confirmMode=null;   // 인라인 편집 중인 계획
// 실현: 예측대로 확정 (현금 지출이면 증빙 입력 필요 → 편집창)
function realizeNow(id){

}

/* ============ 잔액 대시보드 (월별 실적/예상 잔액 라인 + 매출/수금 바) ============ */
function dashMonths(u){
  const ms=new Set();
  txns.forEach(t=>{ if(!canSeeRecord(t,u)) return;
    const live = t.status==='actual'||planLive(t)||((t.kind==='sales'||t.kind==='invoice')&&(t.approved||t.status==='actual'));
    if(!live) return;
    ms.add((t.invDate||t.date).slice(0,7)); ms.add(t.date.slice(0,7));
  });
  ms.add(TODAY.slice(0,7));
  let arr=[...ms].filter(Boolean).sort();
  if(!arr.length) arr=[TODAY.slice(0,7)];
  // 연속 월로 채우기 (min~max)
  const out=[]; let cur=arr[0]+'-01'; const end=arr[arr.length-1]+'-01';
  let guard=0;
  while(cur.slice(0,7)<=end.slice(0,7) && guard++<36){ out.push(cur.slice(0,7)); cur=addMonths(cur,1); }
  return out.slice(-15);   // 최대 15개월
}
function monthEndStr(ym){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m,0).getDate(); return `${ym}-${String(d).padStart(2,'0')}`; }
function balanceDashboard(u){
  const conv = t => (viewCur()==='MXN'&&accCur(t.acc)==='USD') ? (+t.amt||0)*fxRate : (+t.amt||0);
  const months = dashMonths(u);
  const curM = TODAY.slice(0,7);
  const rows = months.map(ym=>{
    const me = monthEndStr(ym);
    const actual = ym<=curM ? actualBalThrough(me) : null;
    const proj   = projBalThrough(me);
    let sales=0, collect=0;
    txns.forEach(t=>{
      if(!canSeeRecord(t,u)) return;
      if(t.kind==='invoice' && (t.invDate||t.date).slice(0,7)===ym){ sales += (+t.qty||0)*(+t.unitPrice||0) * (accCur(t.acc)==='USD'&&viewCur()==='MXN'?fxRate:1); }
      if((t.kind==='sales'||t.kind==='invoice') && (t.approved||t.status==='actual') && t.date.slice(0,7)===ym){ collect += conv(t); }
    });
    return {ym, actual, proj, sales, collect};
  });
  // 스케일
  const balVals = rows.flatMap(r=>[r.actual, r.proj].filter(v=>v!=null));
  const bMax = Math.max(1, ...balVals), bMin = Math.min(0, ...balVals);
  const rMax = Math.max(1, ...rows.map(r=>Math.max(r.sales, r.collect)));
  // 레이아웃
  const W=760, H=300, padL=66, padR=58, padT=14, padB=40;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=rows.length, band=plotW/Math.max(n,1);
  const yB = v => padT + plotH*(1-(v-bMin)/((bMax-bMin)||1));      // 잔액(좌)
  const yR = v => padT + plotH*(1-(v)/(rMax||1));                  // 바(우)
  const xC = i => padL + band*(i+0.5);
  const cur=viewCur(), sym=CUR_SYM[cur];
  const fmtC = v => { const a=Math.abs(v); return (v<0?'-':'')+(a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?(a/1e3).toFixed(0)+'k':Math.round(a)); };
  // 좌측 잔액 눈금 4단계
  let grid='', ticksL='', ticksR='';
  for(let k=0;k<=4;k++){ const v=bMin+(bMax-bMin)*k/4, y=yB(v);
    grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    ticksL+=`<text x="${padL-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">${fmtC(v)}</text>`;

      return `<div class="accbar"><div class="nm">${a.name} <span class="ty">${a.cur}</span></div><div class="bl mono">${fmtCur(b,a.cur)}</div><div class="adiff" style="color:var(--muted)">${a.type}</div></div>`;
    }).join('')}
  </div>`:''}`;
}

function wireRules(){
  const add=document.getElementById('rule-add'); if(add) add.onclick=()=>{ruleEditId=null;ruleFormOpen=true;render();};
  document.querySelectorAll('[data-redit]').forEach(b=>b.onclick=()=>{ruleEditId=b.dataset.redit;ruleFormOpen=true;render();});
  document.querySelectorAll('[data-rdel]').forEach(b=>b.onclick=()=>{
    if(confirm('이 규칙을 삭제할까요? (미실현 예측이 함께 제거됩니다)')){
      recurs=recurs.filter(x=>x.id!==b.dataset.rdel); regenPlans(); render();
    }
  });
  const ong=document.getElementById('r-ongoing'), toI=document.getElementById('r-to');
  if(ong&&toI) ong.onchange=()=>{ toI.disabled=ong.checked; if(ong.checked) toI.value=''; };

    document.getElementById('r-dayfield').style.display=wk?'none':'';
    document.getElementById('r-wdayfield').style.display=wk?'':'none'; };
  const cancel=document.getElementById('r-cancel'); if(cancel) cancel.onclick=()=>{ruleFormOpen=false;ruleEditId=null;render();};
  const save=document.getElementById('r-save'); if(save) save.onclick=()=>{
    const memo=document.getElementById('r-memo').value.trim();
    const user=+document.getElementById('r-user').value;
    const acc=+document.getElementById('r-acc').value;
    const dir=document.getElementById('r-dir').value;
    const amt=+document.getElementById('r-amt').value;
    const freq=document.getElementById('r-freq').value;
    const day=+document.getElementById('r-day').value;
    const wday=+document.getElementById('r-wday').value;
    const from=document.getElementById('r-from').value;
    const ongoing=document.getElementById('r-ongoing').checked;
    const to=ongoing?'':document.getElementById('r-to').value;

    if(!memo||!amt||amt<=0||!from){alert('비용명·금액·시작월을 확인해주세요.');return;}
    if(freq==='month' && (!day||day<1||day>31)){alert('매월 결제일(1~31)을 확인해주세요.');return;}
    if(!ongoing && to && to<from){alert('최종일자가 최초일자보다 빠릅니다.');return;}
    const rec=(freq==='week')?{memo,user,acc,dir,amt,freq,wday,from,to,cat}:{memo,user,acc,dir,amt,freq,day,from,to,cat};
    if(ruleEditId){
      const ex=recurs.find(x=>x.id===ruleEditId); delete ex.day; delete ex.wday; Object.assign(ex,rec);
    } else {

    }

  };
}
/* 예산 대비 (실현 차이) 패널 */
function varianceHtml(list){
  if(!list.length) return '';
  const rows=list.map(t=>{

    const label = t.dir==='out' ? (t.variance>0?'추가지출':'절감') : (t.variance>0?'추가수입':'미달');
    return `<tr class="row">
      <td class="mono">${t.date.slice(5)}</td>

      <td class="mono ${over?'amt-out':'amt-in'}" style="text-align:right">${t.variance>0?'+':'−'}${fmtCur(Math.abs(t.variance),accCur(t.acc))} <span class="varpill">${label}</span></td>

  return `<div class="queue card" style="border-color:var(--line)">

}

/* ----- 손익(P&L): 계정과목별 예산(예측) 대비 실적 — 항상 MXN 기준 ----- */
function buildPnl(){
  const fm=focus.slice(0,7);
  const mxn=(amt,acc)=> accCur(acc)==='USD'? amt*fxRate : amt;
  const data={}; cats.forEach(c=>data[c.id]={a:0,b:0});
  txns.filter(t=>t.date.slice(0,7)===fm && t.cat && data[t.cat] && t.status!=='void').forEach(t=>{
    if(t.status==='actual'){ data[t.cat].a+=mxn(t.amt,t.acc); if(t.planAmt!==undefined) data[t.cat].b+=mxn(t.planAmt,t.acc); }
    else if(t.status==='plan' && t.approved){ data[t.cat].b+=mxn(t.amt,t.acc); }
  });
  const F = n => 'MX$'+Math.round(n).toLocaleString('en-US');
  const groupSum = g => cats.filter(c=>c.group===g).reduce((o,c)=>({a:o.a+data[c.id].a,b:o.b+data[c.id].b}),{a:0,b:0});
  const dcell = (b,a,exp) => { const d=a-b; const cls = d===0?'':(exp?(d>0?'amt-out':'amt-in'):(d>0?'amt-in':'amt-out'));
    return `<td class="pl-num">${b?F(b):'·'}</td><td class="pl-num">${a?F(a):'·'}</td><td class="pl-num ${cls}">${d?(d>0?'+':'−')+F(Math.abs(d)):'·'}</td>`; };
  const catLines = (g,exp) => cats.filter(c=>c.group===g && (data[c.id].a||data[c.id].b))
    .map(c=>`<tr><td class="pl-item sub">${c.id} ${c.name}</td>${dcell(data[c.id].b,data[c.id].a,exp)}</tr>`).join('');
  const groupBlock = (g,exp) => { const s=groupSum(g); return catLines(g,exp)+`<tr class="pl-sub"><td class="pl-item">${g} 계</td>${dcell(s.b,s.a,exp)}</tr>`; };
  const marginRow = (label,b,a) => `<tr class="pl-margin"><td class="pl-item">${label}</td>${dcell(b,a,false)}</tr>`;

  const rev=groupSum('수익'), cogs=groupSum('매출원가'), sga=groupSum('판관비'), nrev=groupSum('영업외수익'), nexp=groupSum('영업외비용');
  const gp={b:rev.b-cogs.b, a:rev.a-cogs.a};               // 매출총이익
  const op={b:gp.b-sga.b, a:gp.a-sga.a};                    // 영업이익
  const ni={b:op.b+nrev.b-nexp.b, a:op.a+nrev.a-nexp.a};    // 당기순이익

  // ----- 제품 수익성 (인보이스 기준, 발생주의 마진) -----
  const invs = txns.filter(t=>t.kind==='invoice' && (t.invDate||t.date).slice(0,7)===fm);
  const bySku = {};
  invs.forEach(t=>{ const p=t.skuCtr?prodByCtr(t.skuCtr):null;
    const rev=(t.qty||0)*(t.unitPrice||0);
    const cogsv=(t.cogs!=null)?t.cogs:(t.qty||0)*(p?unitCost(p):0);
    const key=t.skuCtr||'(미지정)';
    if(!bySku[key]) bySku[key]={ctr:key, app:p?p.app:'', qty:0, rev:0, cogs:0};
    bySku[key].qty+=(t.qty||0); bySku[key].rev+=rev; bySku[key].cogs+=cogsv;
  });
  const skuRows=Object.values(bySku).sort((a,b)=>(b.rev-b.cogs)-(a.rev-a.cogs));
  const tRev=skuRows.reduce((s,r)=>s+r.rev,0), tCogs=skuRows.reduce((s,r)=>s+r.cogs,0), tGp=tRev-tCogs;
  const marginCard = `<div class="card pnl" style="margin-top:14px">
      <div class="card-h">${fm} 제품 수익성 <span class="src">매출내역 ${invs.length}건 · ex-IVA · 매출−매출원가(구매단가+수입부대비용) = 마진</span></div>
      ${skuRows.length?`<table class="pltable">
        <thead><tr><th class="pl-item">CTR Code / 적용</th><th class="pl-num">수량</th><th class="pl-num">매출(ex-IVA)</th><th class="pl-num">매출원가</th><th class="pl-num">마진</th><th class="pl-num">마진율</th></tr></thead>
        <tbody>
          ${skuRows.map(r=>{const m=r.rev-r.cogs;return `<tr><td class="pl-item sub">${r.ctr}${r.app?` <span class="role-mini">${r.app}</span>`:''}</td><td class="pl-num">${r.qty.toLocaleString('ko-KR')}</td><td class="pl-num">${F(r.rev)}</td><td class="pl-num">${F(r.cogs)}</td><td class="pl-num ${m>=0?'amt-in':'amt-out'}">${F(m)}</td><td class="pl-num">${r.rev?((m/r.rev)*100).toFixed(1):0}%</td></tr>`;}).join('')}
          <tr class="pl-margin"><td class="pl-item">합계</td><td class="pl-num">${skuRows.reduce((s,r)=>s+r.qty,0).toLocaleString('ko-KR')}</td><td class="pl-num">${F(tRev)}</td><td class="pl-num">${F(tCogs)}</td><td class="pl-num ${tGp>=0?'amt-in':'amt-out'}">${F(tGp)}</td><td class="pl-num">${tRev?((tGp/tRev)*100).toFixed(1):0}%</td></tr>
        </tbody>
      </table>`:'<div class="empty">이 달 등록된 매출내역이 없습니다. 영업지원이 매출내역을 등록하면 제품 마진이 집계됩니다.</div>'}
    </div>`;

  document.getElementById('viewport').innerHTML=`
    <div class="card pnl">
      <div class="card-h">${fm} 손익계산서 (예산 대비 실적) <span class="src">MXN 기준 · 현금주의 · USD는 오늘 환율 환산 · 비손익(계좌대체·차입 등) 제외</span></div>
      <table class="pltable">
        <thead><tr><th class="pl-item">계정과목</th><th class="pl-num">예산(예측)</th><th class="pl-num">실적</th><th class="pl-num">차이</th></tr></thead>
        <tbody>
          <tr class="pl-grp"><td colspan="4">매출액</td></tr>
          ${groupBlock('수익',false)}
          <tr class="pl-grp"><td colspan="4">매출원가</td></tr>
          ${groupBlock('매출원가',true)}
          ${marginRow('매출총이익',gp.b,gp.a)}
          <tr class="pl-grp"><td colspan="4">판매비와관리비</td></tr>
          ${groupBlock('판관비',true)}
          ${marginRow('영업이익',op.b,op.a)}
          <tr class="pl-grp"><td colspan="4">영업외 손익</td></tr>
          ${catLines('영업외수익',false)}${catLines('영업외비용',true)}
          ${marginRow('당기순이익',ni.b,ni.a)}
        </tbody>
      </table>
    </div>
    ${seesMargin(currentUser())?marginCard:''}
    <div class="legend"><span>위 손익계산서 = 현금주의(실제 입출금)${seesMargin(currentUser())?' · 아래 제품 수익성 = 발생주의(매출내역 SAT 발행 시점, 제품 원가 반영)':''}.</span></div>`;
}

/* ----- 월 단위: 한눈에 보는 흐름 ----- */
function buildMonth(){
  const u=currentUser(); const bal=seesBalance(u);
  const d=parseD(focus), y=d.getFullYear(), m=d.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++) cells+='<div class="cell blank"></div>';
  for(let day=1;day<=days;day++){
    const ds=`${y}-${pad(m+1)}-${pad(day)}`;
    const net=netOnDay(ds), hp=dayHasPlan(ds);
    const cls=['cell']; if(ds===TODAY)cls.push('today'); if(ds===focus)cls.push('sel'); if(hp)cls.push('hasplan');
    cells+=`<div class="${cls.join(' ')}" data-date="${ds}">
      <div class="dnum">${day}${hp?'<span class="pdot"></span>':''}</div>
      ${net!==0?`<div class="net ${net>0?'pos':'neg'} mono">${sgn(net)}</div>`:'<div class="net">&nbsp;</div>'}
      ${bal?`<div class="bal mono">잔액 <b>${balanceThrough(ds).toLocaleString('ko-KR')}</b></div>`:'<div class="bal mono plan-lbl">계획</div>'}
    </div>`;
  }
  document.getElementById('viewport').innerHTML=`
    <div class="cal">
      <div class="cal-head"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
      <div class="cal-grid" id="grid">${cells}</div>
    </div>
    <div class="legend">
      <span><span class="sw" style="background:var(--income)"></span>수입(순증)</span>
      <span><span class="sw" style="background:var(--expense)"></span>지출(순감)</span>
      <span><span class="pdot" style="position:static;display:inline-block;margin:0 2px"></span>예측 포함 (${showPlan?'표시 중':'숨김'})</span>
      ${bal?`<span>잔액은 ${showPlan?'예측 포함 <b style="color:var(--brand)">예상 잔액</b>':'<b style="color:var(--ink)">실적 잔액</b>'}</span>`:'<span>날짜별 금액 = '+(dataAll(u)?'승인된 계획·실적 합계':'내 승인된 계획 금액')+'</span>'}
    </div>
    <div class="detail card" id="detail"></div>`;
  document.querySelectorAll('#grid .cell:not(.blank)').forEach(c=>c.onclick=()=>{focus=c.dataset.date;render();});
  monthDetail();
}

/* ----- 주 단위: 계좌별 자금 유입·유출(은행/현금) + 세부 내역 ----- */
function buildWeek(){
  const start=weekStart(focus);
  const days=[]; for(let i=0;i<7;i++) days.push(addDays(start,i));
  const lo=days[0], hi=days[6];
  const week = viewTxns().filter(t=>t.date>=lo && t.date<=hi).sort((a,b)=>a.date.localeCompare(b.date)||val(b)-val(a));
  // 계좌별 주간 유입/유출 (움직임이 있는 계좌만)
  const flow = includedAccts().map(id=>{
    const a=accounts.find(x=>x.id===id);
    const wk=week.filter(t=>t.acc===id);
    const inS=wk.filter(t=>t.dir==='in').reduce((s,t)=>s+t.amt,0);
    const outS=wk.filter(t=>t.dir==='out').reduce((s,t)=>s+t.amt,0);
    return {a, inS, outS, net:inS-outS, close:accBalThrough(id,hi), n:wk.length};
  }).filter(r=>r.n>0);
  const ORDER=['은행','현금'];
  const CLASSES=[...ORDER.filter(t=>accounts.some(a=>a.type===t)), ...[...new Set(accounts.map(a=>a.type))].filter(t=>!ORDER.includes(t))];
  const dayNet=(id,ds)=>{ const s=week.filter(t=>t.acc===id&&t.date===ds); return s.length? s.reduce((a,t)=>a+(t.dir==='in'?t.amt:-t.amt),0) : null; };
  const colN = 1+7+1;
  const dayTh = days.map(ds=>{const dt=parseD(ds);return `<th class="wf-num wf-day${ds===TODAY?' today':''}"><div>${WD[dt.getDay()]}</div><div class="wf-dnum">${dt.getMonth()+1}/${dt.getDate()}</div></th>`;}).join('');
  const classBlock = cls => {
    const rs=flow.filter(r=>r.a.type===cls);
    if(!rs.length) return '';
    return `<tr class="wf-grp"><td colspan="${colN}">${cls}</td></tr>` + rs.map(r=>`<tr>
      <td class="wf-acc">${r.a.name} <span class="ty">${r.a.cur}</span></td>
      ${days.map(ds=>{const n=dayNet(r.a.id,ds);
        return `<td class="wf-num wf-cell${ds===TODAY?' today':''}">${n===null?'<span class="wf-zero">·</span>':`<span class="${n>0?'amt-in':n<0?'amt-out':''}">${n>0?'+':'−'}${fmtCur(Math.abs(n),r.a.cur)}</span>`}</td>`;}).join('')}
      <td class="wf-num ${r.net>0?'amt-in':r.net<0?'amt-out':''}">${r.net?(r.net>0?'+':'−')+fmtCur(Math.abs(r.net),r.a.cur):'·'}</td>
    </tr>`).join('');
  };
  const netTotRow = `<tr class="wf-tot"><td class="wf-acc">전체 순증감 (MXN)</td>
    ${days.map(ds=>{const n=netOnDay(ds);return `<td class="wf-num${ds===TODAY?' today':''}"><span class="${n>0?'amt-in':n<0?'amt-out':''}">${n?sgn(n):'·'}</span></td>`;}).join('')}
    <td class="wf-num"><b>${sgn(days.reduce((s,ds)=>s+netOnDay(ds),0))}</b></td></tr>`;
  const hasMXN=includedAccts().some(id=>accCur(id)==='MXN');
  const hasUSD=includedAccts().some(id=>accCur(id)==='USD');
  const balLine=(label,fn,extra='')=>`<tr class="wf-bal-row ${extra}"><td class="wf-acc">${label}</td>${days.map(ds=>`<td class="wf-num${ds===TODAY?' today':''}"><b>${fn(ds)}</b></td>`).join('')}<td class="wf-num">—</td></tr>`;
  let balRows='';
  if(seesBalance(currentUser())){
    if(hasMXN) balRows+=balLine('마감 잔액 · MX$', ds=>fmtCur(balByCur(ds,'MXN'),'MXN'));
    if(hasUSD) balRows+=balLine('마감 잔액 · US$', ds=>fmtCur(balByCur(ds,'USD'),'USD'));
    if(hasMXN&&hasUSD) balRows+=balLine('합산 · MX$ (US$ 환산 포함)', ds=>fmtCur(balByCur(ds,'MXN')+balByCur(ds,'USD')*fxRate,'MXN'),'wf-bal-sum');
  }
  const seesAcc = seesAccounts(currentUser());
  const seesDet = seesDetail(currentUser());
  const flowTable = `<table class="wflow">
    <thead><tr><th class="wf-acc">${seesAcc?'계좌':'구분'}</th>${dayTh}<th class="wf-num wf-sum">주 순증감</th></tr></thead>
    <tbody>${seesAcc?CLASSES.map(classBlock).join(''):''}</tbody>
    <tfoot>${netTotRow}${balRows}</tfoot>
  </table>`;
  const detail = (week.length && seesDet) ? txTable(week, true, true, !seesAcc) : '';
  const detailCard = seesDet ? `<div class="card" style="margin-top:14px">
      <div class="card-h">세부 내역 <span class="src">주간 거래 ${week.length}건 · 날짜순</span></div>
      ${week.length?detail:'<div class="empty">이번 주 세부 내역이 없습니다.</div>'}
    </div>` : '';

  document.getElementById('viewport').innerHTML=`
    <div class="card">
      <div class="card-h">${seesAcc?'이번 주 계좌별 자금 이동':'이번 주 자금 흐름 (합계)'} <span class="src">${parseD(lo).getMonth()+1}.${parseD(lo).getDate()} ~ ${parseD(hi).getMonth()+1}.${parseD(hi).getDate()}${seesAcc?' · 계좌 칸=당일 순증감':' · 당일 순증감'}, 맨 아래=당일 마감 잔액${showPlan?' · 예측 포함':''}</span></div>
      <div class="card-b weekwrap" style="padding-top:6px">${flowTable}</div>
    </div>
    ${detailCard}
    <div class="legend"><span>월 = 큰 흐름 · 주 = ${seesAcc?'어느 계좌에서 언제 돈이 움직였는지':'주간 자금 흐름 합계'}${seesDet?' + 세부 내역':''} · 일 = 전체 상세</span></div>`;
}

/* ----- 일 단위: 그날 전체 상세 ----- */
function buildDay(){
  const u=currentUser();
  const ds=focus, list=dayTxns(ds);
  const seesAcc = seesAccounts(u);
  const seesDet = seesDetail(u);
  const inS=list.filter(t=>t.dir==='in').reduce((s,t)=>s+t.amt,0);
  const outS=list.filter(t=>t.dir==='out').reduce((s,t)=>s+t.amt,0);
  const accBlock=!(seesAcc&&seesBalance(u))?'':accounts.map(a=>{
    if(mode==='account'&&a.id!==selAcc) return '';
    if(mode!=='account'&&!includedAccts().includes(a.id)) return '';
    const before=accBalThrough(a.id,addDays(ds,-1)), after=accBalThrough(a.id,ds);
    const diff=after-before;
    return `<div class="accbar"><div class="nm">${a.name} <span class="ty">${a.cur}</span></div>
      <div class="bl mono">${fmtCur(after,a.cur)}</div>
      <div class="adiff mono ${diff>0?'amt-in':diff<0?'amt-out':''}">${diff===0?'변동 없음':(diff>0?'+':'−')+fmtCur(Math.abs(diff),a.cur)}</div></div>`;
  }).join('');
  const balStat = seesBalance(u) ? `<div class="stat"><div class="k">마감 잔액 (${mode==='total'?'통합':accName(selAcc)})</div><div class="v mono">${won(balanceThrough(ds))}</div></div>` : '';
  const sumTrio = !seesBalance(u) ? '' : `
      <div class="stat"><div class="k">수입 소계</div><div class="v mono" style="color:var(--income)">+${inS.toLocaleString('ko-KR')}</div></div>
      <div class="stat"><div class="k">지출 소계</div><div class="v mono" style="color:var(--expense)">−${outS.toLocaleString('ko-KR')}</div></div>
      <div class="stat"><div class="k">순증감</div><div class="v mono">${sgn(inS-outS)}</div></div>`;
  const daySumInner = sumTrio + balStat;
  document.getElementById('viewport').innerHTML=`
    ${daySumInner?`<div class="day-sum">${daySumInner}</div>`:''}
    ${seesDet?`<div class="card">
      <div class="card-h">${parseD(ds).getMonth()+1}월 ${parseD(ds).getDate()}일 (${WD[parseD(ds).getDay()]}) 전체 내역 <span class="src">${list.length}건</span></div>
      ${list.length?txTable(list,true,false,!seesAcc):'<div class="empty">이 날짜에는 거래 내역이 없습니다.</div>'}
    </div>`:''}
    ${(seesAcc&&seesBalance(u))?`<div class="day-acc-h">계좌별 그날 마감 잔액</div><div class="accbars">${accBlock}</div>`:''}`;
}

/* 공용 거래 테이블 (full=구분 컬럼 포함) */
function txTable(list, full, showDate, hideAcc){
  const sorted=[...list].sort((a,b)=> catRank(a.cat)-catRank(b.cat) || a.date.localeCompare(b.date));
  let body='', lastG=null;
  sorted.forEach(t=>{
    const g=catGroup(t.cat)||'기타', col=catColor(t.cat);
    if(g!==lastG){ lastG=g; body+=`<tr class="grp-row"><td colspan="8" style="background:${col.bg};color:${col.fg}">${g}</td></tr>`; }
    body+=`<tr class="row ${t.dir==='in'?'row-in':'row-out'}" style="border-left:3px solid ${col.fg}">
      ${showDate?`<td class="mono">${t.date.slice(5)} <span class="dow-sm">${WD[parseD(t.date).getDay()]}</span></td>`:''}
      <td>${userName(t.user)}</td>
      ${hideAcc?'':`<td><span class="pill-acc">${accName(t.acc)}</span></td>`}
      <td><span class="catpill" style="background:${col.bg};color:${col.fg}">${catName(t.cat)}</span></td>
      ${full?`<td>${t.dir==='in'?'수입':'지출'}</td>`:''}
      <td>${t.memo||'-'}${t.status==='plan'?' <span class="planpill">예측</span>':''}${t.variance!==undefined&&t.variance!==0?` <span class="varpill">차이 ${t.variance>0?'+':'−'}${fmtCur(Math.abs(t.variance),accCur(t.acc))}</span>`:''}${(!hideAcc&&isCashOut(t))?(t.ev?` <span class="evpill">증빙 ${t.ev}</span>`:' <span class="evpill miss">증빙 없음</span>'):''}</td>
      <td class="mono ${t.dir==='in'?'amt-in':'amt-out'}" style="text-align:right">${t.dir==='in'?'+':'−'}${fmtCur(t.amt,accCur(t.acc))}</td>
    </tr>`;
  });
  return `<table><thead><tr>${showDate?'<th>날짜</th>':''}<th>입력자</th>${hideAcc?'':'<th>계좌</th>'}<th>계정과목</th>${full?'<th>구분</th>':''}<th>메모 / 증빙</th><th style="text-align:right">금액</th></tr></thead><tbody>
    ${body}
  </tbody></table>`;
}

function wireFlow(u){
  const step=n=>{ focus = period==='month'?addMonths(focus,n) : period==='week'?addDays(focus,7*n) : addDays(focus,n); render(); };
  document.getElementById('prev').onclick=()=>step(-1);
  document.getElementById('next').onclick=()=>step(1);
  document.getElementById('today').onclick=()=>{focus=TODAY;render();};
  document.getElementById('p-day').onclick=()=>{period='day';render();};
  document.getElementById('p-week').onclick=()=>{period='week';render();};
  document.getElementById('p-month').onclick=()=>{period='month';render();};
  const pp=document.getElementById('p-pnl'); if(pp) pp.onclick=()=>{period='pnl';render();};
  const mt=document.getElementById('m-total'); if(mt) mt.onclick=()=>{mode='total';render();};
  const ma=document.getElementById('m-acc'); if(ma) ma.onclick=()=>{mode='account';render();};
  const sel=document.getElementById('accSel'); if(sel) sel.onchange=()=>{selAcc=+sel.value;render();};
  const pt=document.getElementById('planToggle'); if(pt) pt.onclick=()=>{showPlan=!showPlan;render();};
  const ca=document.getElementById('c-all'), cm=document.getElementById('c-mxn'), cu=document.getElementById('c-usd');
  if(ca) ca.onclick=()=>{curView='all';render();};
  if(cm) cm.onclick=()=>{curView='MXN';render();};
  if(cu) cu.onclick=()=>{curView='USD';render();};
  const fc=document.getElementById('fxchip'); if(fc) fc.onclick=()=>{
    const v=prompt('오늘 환율 수정 (1 USD = ? MXN)', fxRate);
    if(v===null)return; const r=+v; if(r>0){ fxRate=r; fxAuto=false; render(); }
  };
  const xx=document.getElementById('x-xlsx'); if(xx) xx.onclick=downloadXlsx;
  const xc=document.getElementById('x-csv'); if(xc) xc.onclick=downloadCsv;
}

/* ============ raw data 내보내기 (백업) ============ */
function rawRows(){
  return txns.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(t=>({
    날짜:t.date,
    상태:t.status==='plan'?'예측':(t.status==='void'?'취소':'실적'),
    구분:t.dir==='in'?'수입':'지출',
    계정코드:t.cat||'',
    계정과목:catName(t.cat),
    계정그룹:catGroup(t.cat),
    계좌:accName(t.acc),
    통화:accCur(t.acc),
    계좌유형:accounts.find(a=>a.id===t.acc).type,
    금액:t.amt,
    'MXN환산':accCur(t.acc)==='USD'?Math.round(t.amt*fxRate):t.amt,
    예측대비차이:t.variance===undefined?'':t.variance,
    증빙번호:t.ev||'',
    메모:t.memo||'',
    입력자:userName(t.user),
    소속:users.find(u=>u.id===t.user).loc,
  }));
}
function downloadXlsx(){
  if(typeof XLSX==='undefined'){alert('Excel 라이브러리를 불러오지 못했습니다. CSV로 받아주세요.');return;}
  const ws=XLSX.utils.json_to_sheet(rawRows());
  ws['!cols']=[{wch:12},{wch:6},{wch:6},{wch:14},{wch:6},{wch:9},{wch:13},{wch:13},{wch:12},{wch:12},{wch:22},{wch:8},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'현금흐름 내역');
  XLSX.writeFile(wb,`현금흐름_전체내역_${focus.slice(0,7)}.xlsx`);
}
function downloadCsv(){
  const rows=rawRows(); if(!rows.length){alert('내보낼 내역이 없습니다.');return;}
  const head=Object.keys(rows[0]);
  const esc=v=>{const s=String(v).replace(/"/g,'""');return /[",\n]/.test(s)?`"${s}"`:s;};
  const csv=[head.join(',')].concat(rows.map(r=>head.map(h=>esc(r[h])).join(','))).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`현금흐름_전체내역_${focus.slice(0,7)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}

/* 오늘 환율 자동 갱신 (실패 시 기준값 유지) */
function fetchFx(){
  fetch('https://open.er-api.com/v6/latest/USD')
    .then(r=>r.json())
    .then(d=>{ if(d&&d.rates&&d.rates.MXN){ fxRate=+(+d.rates.MXN).toFixed(4); fxAuto=true; if(nav==='flow') render(); } })
    .catch(()=>{});
}

regenPlans();
render();
fetchFx();
</script>
