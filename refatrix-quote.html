<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 견적 (수주관리)</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;
    --brand:#143D34;--brand-soft:#1E5247;--gold:#B8893B;--radius:12px;--radius-sm:8px;
    --shadow:0 1px 2px rgba(28,27,25,.04),0 8px 24px rgba(28,27,25,.06);}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1100px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px;box-shadow:var(--shadow)}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600}
  input,select,textarea{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:9px 16px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.sm{padding:6px 11px;font-size:12px}.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.danger{background:#fff;color:var(--expense);border:1px solid #e7b6af}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}.msg.ok{display:block;background:var(--income-bg);color:var(--income)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:6px;table-layout:fixed}
  th,td{padding:5px 5px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  th:first-child,td:first-child,th.l,td.l{text-align:left}
  th{font-size:10px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.prod{max-width:150px;white-space:normal;line-height:1.25;cursor:pointer}
  td.prod:hover{color:var(--brand);text-decoration:underline}
  td.prod .ap{font-size:9.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  tfoot td{font-weight:800;background:#faf8f3;border-top:2px solid var(--line)}
  .flag{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:999px}
  .flag.ok{background:var(--income-bg);color:var(--income)}
  .flag.low_stock{background:#fdf3e3;color:#9a6512}
  .flag.not_found{background:var(--expense-bg);color:var(--expense)}
  .inrow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
  .inrow>div{display:flex;flex-direction:column}
  .modal{position:fixed;inset:0;background:rgba(20,30,26,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal .box{background:#fff;border-radius:14px;max-width:640px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .modal .hd{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .modal .bd{padding:16px 18px}
  .cand{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:8px;cursor:pointer;display:flex;justify-content:space-between;gap:10px}
  .cand:hover{border-color:var(--brand);background:#faf8f3}
  .delx{color:var(--expense);cursor:pointer;font-weight:800;border:none;background:none;font-size:15px}
  .acbox{position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.14);margin-top:3px;max-height:280px;overflow:auto}
  .acitem{padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}
  .acitem:last-child{border-bottom:none}
  .acitem.sel,.acitem:hover{background:#f0f5f2}
  .acitem .c{font-weight:700;color:var(--brand);font-size:13px}
  .acitem .s{font-size:11px;color:var(--muted)}
  .acitem .lp{font-size:12px;color:var(--ink);white-space:nowrap}
</style>
<link rel="stylesheet" href="refatrix-i18n.css?v=20260621j">
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">견적 (수주관리)</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <!-- 견적 헤더 -->
    <div class="card">
      <div class="card-h">새 견적 작성</div>
      <div class="inrow">
        <div style="flex:1;min-width:200px"><label>고객</label>
          <select id="custSel" onchange="onCustChange()" style="width:100%"></select></div>
        <div id="guestNameWrap" class="hidden"><label>Nombre del cliente (mostrar en cotización)</label><input id="guestName" type="text" placeholder="Ej: Taller López" style="width:180px"></div>
        <div><label>견적일</label><input id="qDate" type="date"></div>
        <div style="min-width:90px"><label>할인율</label><input id="discShow" type="text" readonly style="width:90px;background:#faf8f3" oninput="onDiscInput()"></div>
      </div>
      <div class="hint" style="margin-top:6px" id="custHint">고객을 선택하면 할인율이 자동 적용됩니다. 불특정 고객은 할인율을 직접 입력합니다.</div>
    </div>

    <!-- 품목 입력 -->
    <div class="card">
      <div class="card-h">품목 입력 <span class="hint" style="font-weight:500">— CTR 코드 또는 경쟁사(SYD) 코드 중 하나 + 수량</span></div>
      <div class="inrow">
        <div style="flex:1;min-width:160px;position:relative"><label>코드 (CTR 또는 SYD) — 입력하면 자동완성</label>
          <input id="inCode" type="text" autocomplete="off" placeholder="예: CTR 또는 SYD 일부 입력" oninput="onCodeInput()" onkeydown="codeKey(event)">
          <div id="acBox" class="acbox hidden"></div>
        </div>
        <div style="min-width:90px"><label>수량</label><input id="inQty" type="number" min="0" step="1" value="1" style="width:90px" onkeydown="if(event.key==='Enter')addLine()"></div>
        <div><button class="btn" onclick="addLine()">＋ 추가</button></div>
        <div style="margin-left:auto"><label>엑셀</label>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="btn ghost sm" onclick="downloadTemplate()">양식 다운로드</button>
            <button class="btn ghost sm" onclick="downloadPriceList()">전체 가격표</button>
            <input id="xlsx" type="file" accept=".xlsx,.xls,.csv" onchange="onXlsx(event)" style="font-size:11px">
          </div>
        </div>
      </div>
      <div class="msg" id="lineMsg"></div>

      <div id="linesWrap" style="margin-top:12px;overflow-x:auto"></div>

      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        <button class="btn" id="saveBtn" onclick="saveQuote()">견적 저장</button>
        <button class="btn ghost" onclick="printQuote()">견적서 인쇄</button>
        <button class="btn ghost" onclick="exportExcel()">엑셀 다운로드</button>
        <button class="btn ghost" onclick="clearLines()">전체 비우기</button>
        <button class="btn ghost" onclick="goQuoteList()" title="견적·매출 추적 화면으로 이동">견적 목록 보기</button>
        <span id="saveMsg" class="msg" style="margin:0"></span>
      </div>
    </div>
  </div>
</div>

<!-- SYD 다중매칭 후보 선택 모달 -->
<div class="modal" id="candModal">
  <div class="box">
    <div class="hd"><span style="font-size:15px;font-weight:800;color:var(--brand)">제품 선택 <span class="hint" id="candFor"></span></span><button class="btn ghost sm" style="margin-left:auto" onclick="closeCand()">닫기 ✕</button></div>
    <div class="bd" id="candBody"></div>
  </div>
</div>

<!-- 고객 구매 실적 모달 -->
<div class="modal" id="histModal">
  <div class="box">
    <div class="hd"><span style="font-size:15px;font-weight:800;color:var(--brand)" id="histTitle">구매 실적</span><button class="btn ghost sm" style="margin-left:auto" onclick="document.getElementById('histModal').style.display='none'">닫기 ✕</button></div>
    <div class="bd" id="histBody"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let session={token:null,user:null,api:''};
  let customers=[], curDisc=0, lines=[]; // lines: {code, product_id?, qty, _calc?}
  let lastPreview=null; // 마지막 계산 결과(엑셀 다운로드용)
  let pendingCand=null; // {code, qty, candidates}
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function partyName(){ return isGuest ? ($('guestName').value.trim()||'Cliente no registrado') : (($('custSel').selectedOptions[0]||{}).text||''); }
  // 견적서 발행자(작성자) = 로그인 사용자 이름 (+ 로그인ID). 누가 견적서를 발행했는지 추적용.
  function issuerLabel(){
    const u=(session&&session.user)||{};
    const name=(u.name||'').trim();
    const lid=(u.login_id||'').trim();
    if(name&&lid) return name+' ('+lid+')';
    return name||lid||'-';
  }
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtq=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:3});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }

  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      $('qDate').value=new Date().toISOString().slice(0,10);
      loadCustomers();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  async function loadCustomers(){
    try{
      const d=await fetch(session.api+'/api/customers',{headers:auth()}).then(r=>r.json());
      customers=d.items||[];
      $('custSel').innerHTML='<option value="">— 고객 선택 —</option>'
        +'<option value="__guest__">★ Cliente no registrado (entrada directa)</option>'
        +customers.map(c=>'<option value="'+c.id+'" data-disc="'+(c.discount||0)+'">'+esc(c.name)+'</option>').join('');
    }catch(e){ $('custHint').textContent='고객 목록을 불러오지 못했습니다.'; }
  }
  let isGuest=false;
  function onCustChange(){
    const sel=$('custSel');
    isGuest = sel.value==='__guest__';
    $('guestNameWrap').classList.toggle('hidden',!isGuest);
    if(isGuest){
      $('discShow').removeAttribute('readonly'); $('discShow').style.background='#fff'; $('discShow').placeholder='Ej: 12';
      curDisc=Number(($('discShow').value||'').replace('%',''))||0;
      $('custHint').textContent='Cliente no registrado — escriba el nombre y el descuento (obligatorio). Se registrará automáticamente como cliente.';
    } else {
      $('discShow').setAttribute('readonly','readonly'); $('discShow').style.background='#faf8f3';
      const opt=sel.selectedOptions[0];
      curDisc=opt?Number(opt.getAttribute('data-disc'))||0:0;
      $('discShow').value=sel.value?(curDisc+'%'):'';
      $('custHint').textContent=sel.value?('할인율 '+curDisc+'%가 모든 품목에 자동 적용됩니다.'):'고객을 선택하면 할인율이 자동 적용됩니다. 불특정 고객은 할인율을 직접 입력합니다.';
    }
    if(lines.length) recalc();
  }
  function onDiscInput(){
    if(!isGuest)return;
    curDisc=Number(($('discShow').value||'').replace('%',''))||0;
    if(lines.length) recalc();
  }

  // ===== 자동완성 =====
  let acItems=[], acSel=-1, acTimer=null, pickedProduct=null;
  function onCodeInput(){
    pickedProduct=null; // 직접 타이핑하면 이전 선택 해제
    const q=$('inCode').value.trim();
    clearTimeout(acTimer);
    if(q.length<1){ hideAc(); return; }
    acTimer=setTimeout(async()=>{
      try{
        const d=await fetch(session.api+'/api/quotes/search-code?q='+encodeURIComponent(q),{headers:auth()}).then(r=>r.json());
        acItems=d.items||[]; acSel=-1; renderAc();
      }catch(e){ hideAc(); }
    },180);
  }
  function renderAc(){
    if(!acItems.length){ hideAc(); return; }
    $('acBox').innerHTML=acItems.map((it,i)=>
      '<div class="acitem'+(i===acSel?' sel':'')+'" onmousedown="event.preventDefault()" onclick="pickAc('+i+')">'
      +'<div><span class="c">'+esc(it.ctr_code)+'</span>'
      +(it.syd_codes&&it.syd_codes.length?' <span class="s">· SYD '+esc(it.syd_codes.join(' / '))+'</span>':'')
      +'<div class="s">'+esc(it.name||'')+(it.app?' · '+esc(it.app):'')+'</div></div>'
      +'<div class="lp">List '+fmt(it.list_price)+'</div></div>'
    ).join('');
    $('acBox').classList.remove('hidden');
  }
  function hideAc(){ $('acBox').classList.add('hidden'); acItems=[]; acSel=-1; }
  function pickAc(i){
    const it=acItems[i]; if(!it)return;
    pickedProduct=it;                       // 선택만 해두고 추가는 '추가' 버튼에서
    $('inCode').value=it.ctr_code;
    hideAc();
    $('inQty').focus(); $('inQty').select(); // 바로 수량 입력
  }
  function codeKey(e){
    if($('acBox').classList.contains('hidden')){ if(e.key==='Enter')addLine(); return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); acSel=Math.min(acSel+1,acItems.length-1); renderAc(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); acSel=Math.max(acSel-1,0); renderAc(); }
    else if(e.key==='Enter'){ e.preventDefault(); if(acSel>=0)pickAc(acSel); else addLine(); }
    else if(e.key==='Escape'){ hideAc(); }
  }
  document.addEventListener('click',(e)=>{ if(!e.target.closest('#inCode')&&!e.target.closest('#acBox')) hideAc(); });

  // ===== 견적서 인쇄 =====
  let companyCache=null;
  async function getCompany(){
    if(companyCache)return companyCache;
    try{ companyCache=await fetch(session.api+'/api/company',{headers:auth()}).then(r=>r.json()); }catch(e){ companyCache={}; }
    return companyCache;
  }
  async function printQuote(){
    const m=$('saveMsg');m.className='msg';
    if(!lastPreview||!(lastPreview.lines||[]).length){ m.className='msg err';m.textContent='먼저 품목을 추가하세요.';return; }
    const cid=$('custSel').value;
    if(!cid){ m.className='msg err';m.textContent='고객을 선택하세요.';return; }
    const custName=partyName();
    const date=$('qDate').value||'';
    const co=await getCompany();
    const L=lastPreview.lines.filter(l=>!l.ambiguous);
    const t=lastPreview.totals||{};
    const rowsHtml=L.map(l=>{
      const flag={ok:'',low_stock:'재고부족',not_found:'제품없음'}[l.stock_flag||'ok'];
      return '<tr>'
        +'<td>'+esc(l.ctr_code||'—')+'</td>'
        +'<td>'+esc((l.syd_codes||[]).join(' / ')||'—')+'</td>'
        +'<td class="l">'+esc(l.product_name||'')+(l.app_text?'<br><span class="ap">'+esc(l.app_text)+'</span>':'')+'</td>'
        +'<td class="r">'+fmtq(l.qty)+'</td>'
        +'<td class="r">'+(l.matched?fmt(l.list_price):'—')+'</td>'
        +'<td class="r">'+(l.matched?(l.discount_rate+'%'):'—')+'</td>'
        +'<td class="r">'+(l.matched?fmt(l.final_price):'—')+'</td>'
        +'<td class="r">'+(l.matched?fmt(l.line_iva):'—')+'</td>'
        +'<td class="r">'+(l.matched?fmt(l.line_total):'—')+'</td>'
        +'<td class="r">'+(l.avail_stock==null?'—':fmtq(l.avail_stock))+(flag?' <span class="warn">'+flag+'</span>':'')+'</td>'
        +'</tr>';
    }).join('');
    const bankParts=[];
    if(co.bank_name)bankParts.push('Banco: '+esc(co.bank_name));
    if(co.bank_account)bankParts.push('Cuenta: '+esc(co.bank_account));
    if(co.bank_clabe)bankParts.push('CLABE: '+esc(co.bank_clabe));
    if(co.bank_holder)bankParts.push('Beneficiario: '+esc(co.bank_holder));
    const logo=co.logo_data?'<img src="'+co.logo_data+'" style="max-height:64px;max-width:220px">':'<div class="emisor-name">'+esc(co.emisor||'Refatrix')+'</div>';
    const html='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Cotización</title><style>'
      +'body{font-family:Arial,system-ui,sans-serif;color:#1c1b19;padding:26px;font-size:12px}'
      +'.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #143D34;padding-bottom:12px}'
      +'.emisor-name{font-size:22px;font-weight:800;color:#143D34}'
      +'.co{font-size:11px;color:#444;line-height:1.5;margin-top:6px}'
      +'.title{text-align:right}.title h2{margin:0;color:#143D34;font-size:20px}'
      +'.meta{margin:14px 0;font-size:12px;line-height:1.6}'

  // ===== 전체 SKU 가격표 다운로드 =====
  async function downloadPriceList(){
    const m=$('lineMsg');m.className='msg';
    const guest = isGuest;
    const custName = partyName();              // 불특정=입력 고객명, 등록=선택 고객명
    if(guest && !$('guestName').value.trim()){ m.className='msg err';m.textContent='Escriba primero el nombre del cliente.';return; }
    try{
      m.className='msg ok';m.textContent='가격표를 불러오는 중…';
      const cid=$('custSel').value;
      // 불특정 고객은 기본 가격표를 받아 입력 할인률을 적용. 등록 고객만 customer_id 전달.
      let url=session.api+'/api/quotes/price-list';
      if(!guest && cid && cid!=='__guest__') url+='?customer_id='+encodeURIComponent(cid);
      const d=await fetch(url,{headers:auth()}).then(r=>r.json());
      const items=d.items||[];
      if(!items.length){ m.className='msg err';m.textContent='제품이 없습니다.';return; }
      // 할인률: 불특정=입력값(curDisc), 등록=서버 등록 할인률(null=미등록)
      const disc = guest ? (Number(($('discShow').value||'').replace('%',''))||curDisc||0) : d.discountRate;
      const rows=[];
      rows.push(['Refatrix — Lista de precios / Cotización por sucursal (precios SIN IVA)']);
      rows.push(['Cliente', custName||'(no seleccionado)', '', 'Descuento', disc==null?'a definir':(disc+'%')]);
      rows.push(['Ingrese las cantidades por sucursal (Suc 1–5). El importe por SKU y los totales se calculan automáticamente.']);
      rows.push([]);
      rows.push(['#','CTR Code','SYD Code','Application','Existencia','Precio unit. (sin IVA)','Suc 1','Suc 2','Suc 3','Suc 4','Suc 5','Cant. total','Importe (sin IVA)']);
      const headerRow=rows.length, firstData=headerRow+1;
      items.forEach((it,idx)=>{
        const unit=(disc==null)?(Number(it.list_price)||0):(Math.round((Number(it.list_price)||0)*(1-disc/100)*100)/100);
        rows.push([ idx+1, it.ctr_code||'', it.syd_codes||'', it.app||'',
          it.stock_qty==null?'':Number(it.stock_qty), unit, null,null,null,null,null, null, null ]);
      });
      const lastData=rows.length;
      rows.push([]);
      rows.push(['','','','Cantidad por sucursal →','','',null,null,null,null,null,null,'']); const qtyRow=rows.length;
      rows.push(['','','','Importe por sucursal (sin IVA) →','','',null,null,null,null,null,'',null]); const amtRow=rows.length;
      rows.push([]);
      rows.push(['','','','','','','','','','','','Subtotal (sin IVA)',null]); const subRow=rows.length;
      rows.push(['','','','','','','','','','','','IVA 16%',null]); const ivaRow=rows.length;
      rows.push(['','','','','','','','','','','','Total (con IVA)',null]); const totRow=rows.length;

      const ws=XLSX.utils.aoa_to_sheet(rows);
      // SKU별 수식: 지점 합계(Cant. total) + 금액(Importe = precio × cant)
      for(let r=firstData;r<=lastData;r++){
        ws['L'+r]={t:'n',f:'SUM(G'+r+':K'+r+')'};
        ws['M'+r]={t:'n',z:'#,##0.00',f:'F'+r+'*L'+r};
        if(ws['F'+r]) ws['F'+r].z='#,##0.00';
      }
      // 지점별 수량 합계 + 전체 수량
      ['G','H','I','J','K'].forEach(c=>{ ws[c+qtyRow]={t:'n',f:'SUM('+c+firstData+':'+c+lastData+')'}; });
      ws['L'+qtyRow]={t:'n',f:'SUM(L'+firstData+':L'+lastData+')'};
      // 지점별 금액 합계 = SUMPRODUCT(precio, 지점수량)
      ['G','H','I','J','K'].forEach(c=>{ ws[c+amtRow]={t:'n',z:'#,##0.00',f:'SUMPRODUCT($F$'+firstData+':$F$'+lastData+','+c+firstData+':'+c+lastData+')'}; });
      // 총 금액(소계·IVA·총계)
      ws['M'+subRow]={t:'n',z:'#,##0.00',f:'SUM(M'+firstData+':M'+lastData+')'};
      ws['M'+ivaRow]={t:'n',z:'#,##0.00',f:'M'+subRow+'*0.16'};
      ws['M'+totRow]={t:'n',z:'#,##0.00',f:'M'+subRow+'+M'+ivaRow};

      ws['!cols']=[{wch:5},{wch:14},{wch:18},{wch:28},{wch:11},{wch:18},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12},{wch:16}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'Lista');
      const safe=(custName||'general').replace(/[^\w가-힣]+/g,'_').slice(0,30);
      XLSX.writeFile(wb,'lista_precios_'+safe+'.xlsx');
      m.className='msg ok';m.textContent=items.length+'개 제품 가격표(지점별 수량·자동합계)를 다운로드했습니다 (IVA 미포함).'+(disc==null?' (할인률 미등록 → 정가 기준)':(' · 할인 '+disc+'%'));
      // 견적 목록에 '가용재고 및 견적'으로 기록 (SKU·총수량·금액은 빈칸)
      try{
        const pbody=(!guest && cid && cid!=='__guest__') ? {customer_id:Number(cid)} : {guest_name:$('guestName').value.trim(), discount_rate:(disc==null?0:disc)};
        const pr=await fetch(session.api+'/api/quotes/pricelist',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(pbody)});
        const pd=await pr.json();
        if(pr.ok&&pd.quote_no) m.textContent+=' · 견적목록 기록: '+pd.quote_no+' (가용재고 및 견적)';
      }catch(e){ /* 기록 실패는 다운로드에 영향 주지 않음 */ }
    }catch(e){ m.className='msg err';m.textContent='가격표 다운로드 실패'; }
  }

  async function addLine(){
    const code=$('inCode').value.trim(); const qty=Number($('inQty').value)||0;
    const m=$('lineMsg'); m.className='msg';
    if(!code){m.className='msg err';m.textContent='코드를 입력하세요.';return;}
    if(qty<=0){m.className='msg err';m.textContent='수량을 입력하세요.';return;}
    // 자동완성에서 고른 제품이 있고 코드가 그대로면 그 제품으로 바로 추가
    if(pickedProduct && pickedProduct.ctr_code===code){
      lines.push({code,product_id:pickedProduct.product_id,qty});
      pickedProduct=null;
      $('inCode').value='';$('inQty').value='1';hideAc();$('inCode').focus();
      recalc(); return;
    }
    // 코드 해석: 다중매칭이면 후보 선택
    try{
      const r=await fetch(session.api+'/api/quotes/resolve-code?code='+encodeURIComponent(code),{headers:auth()}).then(x=>x.json());
      const matches=(r&&r.matches)||[];
      if(!matches.length){
        lines.push({code,qty}); // 미매칭(not_found) 줄로 추가됨
      } else if(matches.length===1){
        lines.push({code,product_id:matches[0].product_id,qty});
      } else {
        openCand(code,qty,matches); return; // 후보 선택 후 push
      }
      $('inCode').value='';$('inQty').value='1';$('inCode').focus();
      recalc();
    }catch(e){m.className='msg err';m.textContent='코드 조회 실패';}
  }

      const d=await fetch(session.api+'/api/quotes/preview',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)}).then(r=>r.json());

  async function onXlsx(ev){
    const file=ev.target.files[0]; if(!file)return;
    const m=$('lineMsg');m.className='msg';
    try{
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
      if(!rows.length){ m.className='msg err';m.textContent='빈 파일입니다.';return; }
      // 헤더 행 탐지: '수량' 류 헤더 단어로만 확정(제품코드엔 안 나타남 → 데이터 행 오인 방지)
      const codeRe=/codigo|código|sku|clave|parte|품번|코드|\bcode\b/i;
      const qtyRe=/cant|cantidad|qty|수량|piezas|pzas|unidad/i;
      let codeCol=0, qtyCol=1, headerIdx=-1;
      for(let i=0;i<Math.min(rows.length,6);i++){
        const r=rows[i]||[]; let qc=-1, cc=-1;
        r.forEach((cell,idx)=>{ const s=String(cell==null?'':cell); if(qc<0&&qtyRe.test(s))qc=idx; if(cc<0&&codeRe.test(s))cc=idx; });
        if(qc>=0){ headerIdx=i; qtyCol=qc; if(cc>=0)codeCol=cc; break; }   // 수량 헤더가 있어야 헤더행 확정
      }
      const dataRows = headerIdx>=0 ? rows.slice(headerIdx+1) : rows;
      let added=0, skipped=0, noQty=0;
      if($('saveBtn')) $('saveBtn').disabled=true;   // 처리 중 저장 잠금
      for(const row of dataRows){
        if(!row||!row.length){ continue; }
        const code=String(row[codeCol]==null?'':row[codeCol]).trim();
        if(!code){ skipped++; continue; }   // 빈 코드만 제외(헤더 행은 위에서 이미 제거)
        let qty=Number(String(row[qtyCol]==null?'':row[qtyCol]).replace(/[^\d.\-]/g,''));
        if(!qty||qty<=0){ qty=1; noQty++; }   // 수량 누락 → 1로 (행을 버리지 않음)
        lines.push({code,qty});               // 즉시 추가(코드 해석은 아래 preview에서 일괄 처리)
        added++;
      }
      ev.target.value='';
      await recalc();                          // 한 번의 요청으로 전체 코드 일괄 해석/표시
      if($('saveBtn')) $('saveBtn').disabled=false;
      let msg=added+'개 품목을 추가했습니다 (총 '+lines.length+'줄).';
      if(noQty) msg+=' 수량이 없던 '+noQty+'줄은 1로 넣었습니다.';
      if(skipped) msg+=' 빈/헤더 '+skipped+'줄 제외.';
      m.className='msg ok';m.textContent=msg+' (다중매칭/미매칭 줄은 표에서 확인하세요)';
    }catch(e){ if($('saveBtn')) $('saveBtn').disabled=false; m.className='msg err';m.textContent='엑셀을 읽지 못했습니다. (코드 열 + 수량 열 형식 확인)'; }
  }

  // ===== 고객 구매 실적 (최근 3년) =====
  async function showHistory(productId, ctrCode){
    const cid=$('custSel').value;
    if(!cid){ return; }
    const custName=($('custSel').selectedOptions[0]||{}).text||'';
    $('histTitle').textContent=ctrCode+' — '+custName+' 구매 실적';
    $('histBody').innerHTML='<div class="hint">불러오는 중…</div>';
    $('histModal').style.display='flex';
    try{
      const d=await fetch(session.api+'/api/quotes/customer-sku-history?customer_id='+encodeURIComponent(cid)+'&product_id='+encodeURIComponent(productId),{headers:auth()}).then(r=>r.json());
      const years=d.years||[];
      if(!years.length){ $('histBody').innerHTML='<div class="hint">최근 3년 구매 기록이 없습니다.</div>'; return; }
      let h='<table style="table-layout:auto"><thead><tr><th class="l">연도</th><th>구매 수량</th><th>그 해 비중</th></tr></thead><tbody>';
      years.forEach(y=>{
        h+='<tr><td class="l">'+y.year+'년</td><td>'+fmtq(y.qty)+'</td><td>'+(y.pct==null?'—':y.pct+'%')+'</td></tr>';
      });
      h+='</tbody><tfoot><tr><td class="l">3년 합계</td><td>'+fmtq(d.total3y)+'</td><td>'+(d.totalPct==null?'—':d.totalPct+'%')+'</td></tr></tfoot></table>';
      h+='<div class="hint" style="margin-top:10px">· <b>그 해 비중</b> = 그 해 이 고객 전체 구매 수량 중 이 SKU의 비율<br>· <b>3년 합계 비중</b> = 최근 3년 누적 기준 ('+fmtq(d.total3y)+' / '+fmtq(d.totalAll3y)+')<br>· 확정·등록된 매출 기준(수량)</div>';
      $('histBody').innerHTML=h;
    }catch(e){ $('histBody').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }

  // 견적 목록 보기 → 견적·매출 추적 화면(세션 해시 전달)
  function goQuoteList(){
    try{
      var s=session||{};
      var hash='#token='+encodeURIComponent(s.token||'')+'&api='+encodeURIComponent(s.api||'')+'&user='+encodeURIComponent(JSON.stringify(s.user||{}));
      location.href='refatrix-quotelist.html'+hash;
    }catch(e){ location.href='refatrix-quotelist.html'; }
  }

  async function saveQuote(){
    const m=$('saveMsg');m.className='msg';
    const cid=$('custSel').value;
    if(!cid){m.className='msg err';m.textContent='고객을 선택하세요.';return;}
    if(isGuest){
      if(!$('guestName').value.trim()){m.className='msg err';m.textContent='Escriba el nombre del cliente.';return;}
      if(($('discShow').value||'').trim()===''){m.className='msg err';m.textContent='Escriba el descuento (obligatorio para cliente no registrado).';return;}
    }
    const valid=lines.filter(l=>l.product_id||l.code);
    if(!valid.length){m.className='msg err';m.textContent='품목을 추가하세요.';return;}
    $('saveBtn').disabled=true;
    try{
      const body=isGuest
        ? {guest:true,guest_name:$('guestName').value.trim(),discount_rate:curDisc,quote_date:$('qDate').value||null,lines}
        : {customer_id:Number(cid),quote_date:$('qDate').value||null,lines};
      const res=await fetch(session.api+'/api/quotes',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify(body)});
      const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.textContent='저장 실패: '+(d.error||res.status);return;}
      const LP=(lastPreview&&lastPreview.lines)||[];
      const matched=LP.filter(l=>l.matched).length;
      const unmatched=LP.length-matched;
      m.className='msg ok';
      m.textContent='저장됨: '+d.quote_no+' — 총 '+LP.length+'줄 (매칭 '+matched+(unmatched?(' · 미매칭 '+unmatched+'줄은 제품코드 확인 필요'):'')+')'+(d.auto_customer?(' · '+(d.auto_customer.created?'고객 자동등록':'기존 고객 연결')+': '+esc(d.auto_customer.name)):'');
      if(d.auto_customer){ loadCustomers(); }
    }catch(e){m.className='msg err';m.textContent='서버 연결 실패';}
    finally{$('saveBtn').disabled=false;}
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
