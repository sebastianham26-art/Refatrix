<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개발 프로젝트 관리 · REFATRIX</title>
<style>
:root{--ink:#13171d;--ink2:#39424e;--mut:#6c7682;--faint:#9aa3ad;--paper:#ecedf0;--card:#fff;--line:#dde0e4;--line2:#eef0f2;
--ctr:#0e7c86;--ctr-soft:#d7eef0;--syd:#c67524;--syd-soft:#f7ead7;--go:#1f6feb;--go-soft:#e4eefc;--warn:#c8861e;--warn-soft:#f7ecd6;--late:#b3261e;--done:#0e7c86;--ok:#1f7a44}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;font-family:ui-sans-serif,-apple-system,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
.mono{font-family:ui-monospace,"SF Mono","Roboto Mono",monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:1280px;margin:0 auto;padding:18px 16px 60px}
header.top{display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:16px}
.brand{font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.05em;color:var(--mut);text-transform:uppercase;margin-top:4px}
.spacer{margin-left:auto}
.lnk{font-size:12.5px;font-weight:800;color:var(--ctr);background:var(--ctr-soft);border:1px solid var(--ctr);border-radius:8px;padding:8px 13px;text-decoration:none;white-space:nowrap}
.lnk:hover{background:var(--ctr);color:#fff}
.reflogo{align-self:center;flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.15s}
.reflogo:hover{box-shadow:0 3px 12px rgba(0,0,0,.14);transform:translateY(-1px)}
.reflogo img{height:36px;display:block}
.btn{border:1px solid var(--ctr);background:var(--ctr);color:#fff;font-weight:700;font-size:12px;padding:8px 11px;border-radius:8px;cursor:pointer}
.btn.ghost{background:#fff;color:var(--ctr)}.btn:hover{filter:brightness(1.04)}
.kpis{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px}
.kpi{flex:1 1 120px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 13px}
.kpi .v{font-size:20px;font-weight:800}.kpi .l{font-size:10.5px;color:var(--mut);margin-top:2px}
.kpi.go .v{color:var(--go)}.kpi.late .v{color:var(--late)}.kpi.done .v{color:var(--done)}
.layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}
.plist{display:flex;flex-direction:column;gap:9px}
.lfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.lfilter button{border:1px solid var(--line);background:var(--card);font-size:11.5px;font-weight:700;color:var(--ink2);padding:6px 10px;border-radius:7px;cursor:pointer}
.lfilter button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.psearch{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;margin-bottom:4px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;transition:.12s}
.pcard:hover{border-color:#bcc3cb}.pcard.sel{border-color:var(--ctr);box-shadow:0 0 0 2px var(--ctr-soft)}
.pcard.late{border-left:4px solid var(--late)}.pcard.warn{border-left:4px solid var(--warn)}.pcard.ok{border-left:4px solid var(--ok)}.pcard.done{border-left:4px solid var(--done)}
.pc-t{font-weight:800;font-size:13.5px}.pc-t .mk{color:var(--mut);font-weight:600;font-size:11px}
.pc-cat{font-size:11px;color:var(--mut);margin:2px 0 8px}
.dots{display:flex;gap:4px;margin-bottom:6px}
.dot{flex:1;height:6px;border-radius:3px;background:var(--line2)}.dot.on{background:var(--go)}.dot.done{background:var(--done)}
.pc-meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut)}.pc-meta b{color:var(--ink)}
.tag{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:5px}
.tag.go{background:var(--go-soft);color:var(--go)}.tag.late{background:#f6d2cf;color:var(--late)}.tag.warn{background:var(--warn-soft);color:#9a6510}.tag.done{background:var(--ctr-soft);color:var(--done)}.tag.ok{background:#dff3e6;color:var(--ok)}
.pmain{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;min-height:300px}
.pin{position:sticky;top:0;z-index:3;background:linear-gradient(#fff,#fafbfc);border-bottom:1px solid var(--line);padding:14px 18px}
.pin .h{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 12px}
.pin .veh{font-weight:800;font-size:18px;letter-spacing:-.01em}.pin .veh .mk{color:var(--mut);font-weight:600;font-size:13px}
.pin .yr{font-size:11px;font-weight:700;color:var(--ink2);background:var(--line2);padding:2px 8px;border-radius:5px}
.pin .cat{font-weight:700;color:var(--ctr);font-size:13px}
.pininfo{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:9px;font-size:12px;color:var(--mut)}
.pininfo b{color:var(--ink);font-weight:700}
.pininfo .o1s{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:3px}
.o1s.rule{background:#e4eefc;color:var(--go)}.o1s.xref{background:var(--ctr-soft);color:var(--ctr)}.o1s.web{background:var(--warn-soft);color:#9a6510}
.pbody{padding:16px 18px}
.prog{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.ptrack{flex:1 1 200px;height:9px;background:var(--line2);border-radius:5px;overflow:hidden}.pfill{height:100%;background:var(--go)}
.plab{font-size:12px;color:var(--mut);font-weight:600}.plab b{color:var(--ink)}
.agbig{font-size:12px;font-weight:800;padding:5px 12px;border-radius:8px}
.sec-t{font-size:12px;font-weight:800;color:var(--ink2);margin:6px 0 10px;text-transform:uppercase;letter-spacing:.04em}
.stage{display:grid;grid-template-columns:130px 140px 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line2)}
.stage .sn{font-weight:700;font-size:12.5px}.stage .sn .i{display:inline-block;width:18px;height:18px;border-radius:50%;background:var(--line);color:#fff;font-size:10px;text-align:center;line-height:18px;margin-right:6px;font-weight:800}
.stage.done .sn .i{background:var(--go)}
.stage input[type=date]{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:4px 6px}
.stage input.memo{width:100%;font:inherit;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:5px 8px}
.donebox{margin-top:18px;border:1px solid var(--ctr);border-radius:10px;padding:14px 16px;background:var(--ctr-soft)}
.donebox.is-done{background:#eafaf0;border-color:var(--done)}
.drow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.drow label{font-size:12px;font-weight:800;color:var(--ink2);min-width:78px}
.drow input{font:inherit;font-size:13px;border:1px solid var(--line);border-radius:7px;padding:7px 9px}
.drow input.ctr{font-family:ui-monospace,monospace;font-weight:700;width:160px}
.apps{margin:6px 0 10px}
.app{display:grid;grid-template-columns:1fr 1fr 70px 70px 30px;gap:7px;align-items:center;margin-bottom:6px}
.app input{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:6px 8px}
.app .del{border:1px solid var(--line);background:#fff;color:var(--late);border-radius:6px;cursor:pointer;font-weight:800;padding:6px 0}
.addapp{border:1px dashed var(--ctr);background:#fff;color:var(--ctr);font-weight:700;font-size:11.5px;padding:6px 12px;border-radius:7px;cursor:pointer}
.oneline{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:12.5px;line-height:1.5}
.oneline .mono{font-weight:700;color:var(--ink)}
.copybtn{margin-top:8px;border:1px solid var(--ctr);background:#fff;color:var(--ctr);font-weight:700;font-size:11.5px;padding:6px 12px;border-radius:7px;cursor:pointer}
.empty{padding:60px 20px;text-align:center;color:var(--mut)}
.mx{cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:7px;font-size:11px;padding:5px 10px;font-weight:700}
.hint{font-size:11px;color:var(--mut);margin-top:14px;line-height:1.5}
input[type=file]{display:none}
</style>

  <div class="kpis" id="kpis"></div>
  <div class="layout">
    <div>
      <input class="psearch" id="q" placeholder="차종·부품·코드 검색">
      <div class="lfilter" id="lfilter">
        <button data-f="all" class="on">전체</button>
        <button data-f="go">진행중</button>
        <button data-f="late">지연</button>
        <button data-f="done">완료</button>
      </div>
      <div class="plist" id="plist"></div>
    </div>
    <div class="pmain" id="pmain"></div>
  </div>
  <div class="hint">대시보드에서 "개발" 버튼을 누르면 이 페이지에 프로젝트가 생성됩니다. 각 단계의 날짜·메모를 채우면 진행률과 경과일(정상·주의·지연)이 갱신되고, 완료 시 <b>CTR 코드</b>를 입력하면 application 규칙(<span class="mono">제조사 모델 (yyyy-yyyy) // …</span>)과 경쟁사 list price가 한 줄로 정리됩니다. 데이터는 대시보드와 같은 브라우저에 저장됩니다.</div>
</div>
<script>
const PK='refatrix_projects_v1';
const STAGES=[{k:'plan',n:'기획·검토'},{k:'design',n:'설계·도면'},{k:'proto',n:'시제품·금형'},{k:'test',n:'시험·검증'},{k:'approve',n:'양산승인'},{k:'launch',n:'출시·등록'}];
const WARN=60,LATE=120;
const today=()=>new Date().toISOString().slice(0,10);
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const fmt=n=>Number(n).toLocaleString('en-US');
const esc=x=>String(x==null?'':x).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
let STORE={v:1,projects:{}};
try{const r=localStorage.getItem(PK);if(r)STORE=JSON.parse(r);}catch(_){}
function save(){try{localStorage.setItem(PK,JSON.stringify(STORE));}catch(_){}}
let cur=new URLSearchParams(location.search).get('p')||null;
let filter='all',q='';

function stat(p){
  const st=p.stages||{};
  const done=STAGES.filter(s=>st[s.k]&&st[s.k].date).length;
  const complete=!!(p.ctr&&p.ctr.trim());
  const start=p.start||p.created||today();
  const end=complete?(p.done_date||today()):today();
  const el=daysBetween(start,end);
  const ag=complete?'done':(el>LATE?'late':el>WARN?'warn':'ok');
  return {done,complete,el,ag,start};
}
function kpis(){
  const ps=Object.values(STORE.projects);
  let go=0,late=0,done=0;
  ps.forEach(p=>{const s=stat(p);if(s.complete)done++;else{go++;if(s.ag==='late')late++;}});
  document.getElementById('kpis').innerHTML=[
   {v:fmt(ps.length),l:'전체 개발 프로젝트'},
   {v:fmt(go),l:'진행중',c:'go'},
   {v:fmt(late),l:'지연(>'+LATE+'일)',c:'late'},
   {v:fmt(done),l:'개발완료',c:'done'},
  ].map(k=>`<div class="kpi ${k.c||''}"><div class="v">${k.v}</div><div class="l">${k.l}</div></div>`).join('');
}
function dots(p){const st=p.stages||{};const c=stat(p);
  return '<div class="dots">'+STAGES.map(s=>{const on=st[s.k]&&st[s.k].date;return `<span class="dot ${on?(c.complete?'done':'on'):''}"></span>`;}).join('')+'</div>';}
function renderList(){
  const entries=Object.entries(STORE.projects).map(([k,p])=>({k,p,s:stat(p)}));
  let f=entries.filter(({p,s})=>{
    if(filter==='go'&&s.complete)return false;
    if(filter==='done'&&!s.complete)return false;
    if(filter==='late'&&!(!s.complete&&s.ag==='late'))return false;
    if(q){const t=(p.mk+' '+p.md+' '+p.caten+' '+p.catko+' '+p.spn+' '+(p.oe||'')+' '+(p.oe1||'')+' '+(p.ctr||'')).toLowerCase();if(!t.includes(q))return false;}
    return true;
  });
  f.sort((a,b)=>(a.s.complete?1:0)-(b.s.complete?1:0)||b.s.el-a.s.el);
  const el=document.getElementById('plist');
  if(!f.length){el.innerHTML='<div class="pcard" style="cursor:default;color:var(--mut)">표시할 프로젝트가 없습니다. 대시보드에서 "개발" 버튼으로 추가하세요.</div>';return;}
  el.innerHTML=f.map(({k,p,s})=>{
    const cls=s.complete?'done':s.ag;
    const tag=s.complete?'<span class="tag done">완료</span>':`<span class="tag ${s.ag==='late'?'late':s.ag==='warn'?'warn':'ok'}">${s.ag==='late'?'지연':s.ag==='warn'?'주의':'정상'} · ${s.el}일</span>`;
    return `<div class="pcard ${cls} ${k===cur?'sel':''}" data-k="${esc(k)}">
      <div class="pc-t">${esc(p.md)}<span class="mk"> · ${esc(p.mk)}</span></div>
      <div class="pc-cat">${esc(p.caten)} · ${esc(p.catko)} · SYD ${esc(p.spn||'—')}</div>
      ${dots(p)}
      <div class="pc-meta"><span><b>${s.done}/6</b> 단계${p.ctr?' · CTR '+esc(p.ctr):''}</span>${tag}</div>
    </div>`;}).join('');
}
function appLine(p){
  const segs=(p.apps&&p.apps.length?p.apps:[{mk:p.mk,md:p.md,y1:'',y2:''}]);
  return segs.map(a=>{const yr=a.y1&&a.y2?` (${a.y1}-${a.y2})`:a.y1?` (${a.y1})`:'';return `${a.mk||''} ${a.md||''}${yr}`.trim();}).filter(Boolean).join(' // ');
}
function regLine(p){
  const app=appLine(p);
  const price=p.spr!=null?` | 경쟁사(SYD) list $${fmt(p.spr)}`:'';
  return `${p.ctr||'(CTR 미정)'} | ${app}${price}`;
}
function renderMain(){
  const m=document.getElementById('pmain');
  const p=cur&&STORE.projects[cur];
  if(!p){m.innerHTML='<div class="empty">왼쪽에서 프로젝트를 선택하세요.<br>대시보드의 "개발" 버튼으로 새 프로젝트를 만들 수 있습니다.</div>';return;}
  const s=stat(p),st=p.stages||{};
  const agtxt=s.complete?'개발완료':(s.ag==='late'?'지연':s.ag==='warn'?'주의':'정상');
  const agcol=s.complete?'background:var(--ctr-soft);color:var(--done)':(s.ag==='late'?'background:#f6d2cf;color:var(--late)':s.ag==='warn'?'background:var(--warn-soft);color:#9a6510':'background:#dff3e6;color:var(--ok)');
  const o1b=p.oe1&&p.oe1s?`<span class="o1s ${p.oe1s}">${p.oe1s==='rule'?'규칙':p.oe1s==='xref'?'교차':'웹'}</span>`:'';
  let h=`<div class="pin">
    <div class="h"><span class="veh">${esc(p.md)}<span class="mk"> · ${esc(p.mk)}</span></span>${p.yr?`<span class="yr">${esc(p.yr)}</span>`:''}<span class="cat">${esc(p.caten)} · ${esc(p.catko)}</span></div>
    <div class="pininfo">
      <span>경쟁사 SYD <b>${esc(p.spn||'—')}</b></span>
      <span>OE <b>${p.oe?esc(p.oe):'—'}</b></span>
      <span>OE1 <b>${p.oe1?esc(p.oe1):'—'}</b>${o1b}</span>
      <span>경쟁사 list <b>${p.spr!=null?'$'+fmt(p.spr):'—'}</b></span>
    </div></div>
  <div class="pbody">
    <div class="prog">
      <div class="ptrack"><div class="pfill" style="width:${Math.round(100*s.done/6)}%"></div></div>
      <span class="plab">진행 <b>${s.done}/6</b> · 시작 ${esc(s.start)} · 경과 <b>${s.el}일</b></span>
      <span class="agbig" style="${agcol}">${agtxt}${s.complete?'':' · '+s.el+'일'}</span>
    </div>
    <div class="sec-t">개발 단계</div>`;
  STAGES.forEach((x,i)=>{const sd=st[x.k]||{};const filled=!!sd.date;
    h+=`<div class="stage ${filled?'done':''}"><div class="sn"><span class="i">${filled?'✓':i+1}</span>${x.n}</div>
      <input type="date" data-st="${x.k}" data-f="date" value="${esc(sd.date||'')}">
      <input type="text" class="memo" data-st="${x.k}" data-f="memo" placeholder="메모 (협력사·이슈·결과)" value="${esc(sd.memo||'')}"></div>`;});
  // 완료/CTR
  h+=`<div class="donebox ${s.complete?'is-done':''}">
    <div class="sec-t" style="margin-top:0">개발 완료 기록</div>
    <div class="drow"><label>CTR 코드</label><input class="ctr" id="f_ctr" value="${esc(p.ctr||'')}" placeholder="예: CB0336"><span style="font-size:11.5px;color:var(--mut)">코드를 입력하면 완료로 기록되고 아래 application이 만들어집니다.</span></div>
    <div class="sec-t">적용 차종 (application)</div>
    <div class="apps" id="apps"></div>
    <button class="addapp" id="addapp">+ 적용 차종 추가</button>
    <div class="oneline" id="oneline"></div>
    <button class="copybtn" id="copyline">한 줄 복사</button>
  </div>
  <div style="margin-top:14px;text-align:right"><button class="mx" id="delp">이 프로젝트 삭제</button></div>
  </div>`;
  m.innerHTML=h;
  renderApps();
}
function renderApps(){
  const p=STORE.projects[cur];const wrap=document.getElementById('apps');if(!wrap)return;
  const apps=p.apps&&p.apps.length?p.apps:[{mk:p.mk,md:p.md,y1:'',y2:''}];
  p.apps=apps;
  wrap.innerHTML=apps.map((a,i)=>`<div class="app">
    <input data-i="${i}" data-k="mk" value="${esc(a.mk||'')}" placeholder="제조사">
    <input data-i="${i}" data-k="md" value="${esc(a.md||'')}" placeholder="모델">
    <input data-i="${i}" data-k="y1" value="${esc(a.y1||'')}" placeholder="시작">
    <input data-i="${i}" data-k="y2" value="${esc(a.y2||'')}" placeholder="끝">
    <button class="del" data-del="${i}">×</button></div>`).join('');
  document.getElementById('oneline').innerHTML='<span class="mono">'+esc(regLine(p))+'</span>';
}
// events
document.getElementById('plist').addEventListener('click',e=>{const c=e.target.closest('.pcard');if(!c||!c.dataset.k)return;cur=c.dataset.k;renderList();renderMain();});
document.getElementById('lfilter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;filter=b.dataset.f;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));renderList();});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase().trim();renderList();});
document.getElementById('pmain').addEventListener('change',e=>{
  const p=STORE.projects[cur];if(!p)return;
  const stg=e.target.closest('[data-st]');
  if(stg){p.stages=p.stages||{};const sd=p.stages[stg.dataset.st]=p.stages[stg.dataset.st]||{};sd[stg.dataset.f]=e.target.value;save();renderList();renderMain();return;}
  if(e.target.id==='f_ctr'){const was=p.ctr;p.ctr=e.target.value.trim();
    if(p.ctr&&!was){p.status='done';p.done_date=today();if(!(p.stages&&p.stages.launch&&p.stages.launch.date)){p.stages=p.stages||{};p.stages.launch={date:today(),memo:(p.stages.launch&&p.stages.launch.memo)||'CTR 코드 등록'};}}
    if(!p.ctr){p.status='dev';delete p.done_date;}
    save();renderList();renderMain();return;}
  const ai=e.target.closest('[data-i]');
  if(ai){const i=+ai.dataset.i;p.apps[i][ai.dataset.k]=e.target.value;save();document.getElementById('oneline').innerHTML='<span class="mono">'+esc(regLine(p))+'</span>';renderList();return;}
});
document.getElementById('pmain').addEventListener('click',e=>{
  const p=STORE.projects[cur];if(!p)return;
  if(e.target.id==='addapp'){p.apps=p.apps||[];p.apps.push({mk:p.mk,md:'',y1:'',y2:''});save();renderApps();return;}
  const del=e.target.closest('[data-del]');
  if(del){p.apps.splice(+del.dataset.del,1);if(!p.apps.length)p.apps=[{mk:p.mk,md:p.md,y1:'',y2:''}];save();renderApps();return;}
  if(e.target.id==='copyline'){const t=regLine(p);try{navigator.clipboard.writeText(t);e.target.textContent='복사됨 ✓';setTimeout(()=>e.target.textContent='한 줄 복사',1500);}catch(_){}return;}
  if(e.target.id==='delp'){if(confirm('이 프로젝트를 삭제할까요?')){delete STORE.projects[cur];cur=null;save();renderAll();}return;}
});
document.getElementById('backup').addEventListener('click',()=>{const blob=new Blob([JSON.stringify(STORE,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='refatrix_projects_'+today()+'.json';a.click();});
document.getElementById('restoreBtn').addEventListener('click',()=>document.getElementById('restore').click());
document.getElementById('restore').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>{try{const o=JSON.parse(fr.result);if(o&&o.projects){STORE=o;save();renderAll();alert('불러오기 완료');}else alert('형식이 맞지 않습니다.');}catch(_){alert('읽기 실패');}};fr.readAsText(f);});
function renderAll(){kpis();renderList();renderMain();}
renderAll();
</script>
