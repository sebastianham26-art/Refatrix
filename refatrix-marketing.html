<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 마케팅 메뉴판 · 배분</title>
<style>
  :root{--paper:#F4F1EA;--brand:#143D34;--ink:#1A1A1A;--muted:#6B6B6B;--line:#E2DDD2;
    --income:#0F6E56;--expense:#B23A2E;--gold:#9A7B16;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1300px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:12px}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .who{margin-left:auto;font-size:13px;text-align:right}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px}
  .card h2{margin:0 0 10px;font-size:15px;color:var(--brand)}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600}
  input,select,textarea{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
  .btn{padding:9px 16px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5}.btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.gold{background:var(--gold)}.btn.danger{background:var(--expense)}.btn.sm{padding:6px 11px;font-size:12px}
  .msg{margin-top:12px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:#fbe9e7;color:var(--expense);border:1px solid #f0c5bf}
  .msg.ok{display:block;background:#e7f3ee;color:var(--income);border:1px solid #c2e0d4}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hint{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .hidden{display:none}
  .scroll{overflow-x:auto}
  table.grid{border-collapse:collapse;font-size:12px;white-space:nowrap}
  table.grid th,table.grid td{border:1px solid var(--line);padding:5px 7px;text-align:right}
  table.grid th.lbl,table.grid td.lbl{text-align:left;position:sticky;left:0;background:#faf8f3;z-index:1;min-width:180px}
  table.grid thead th{background:#f0ece2;color:var(--muted);font-weight:700;font-size:11px}
  table.grid input{width:64px;text-align:right;padding:4px 6px;font-size:12px;border:1px solid var(--line);border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-size:11.5px;font-weight:600;background:#faf8f3}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .st-draft{background:#eee;color:#555}.st-submitted{background:#fff4d6;color:#8a6512}.st-approved{background:#e7f3ee;color:var(--income)}.st-rejected{background:#fbe9e7;color:var(--expense)}
  .short{color:var(--expense);font-weight:700}.over{color:var(--expense);font-weight:700}.okrow{color:var(--income)}
  .teampick,.custpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted)}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .note{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:8px}
  .note .meta{font-size:11px;color:var(--muted)}
  .role-director{color:var(--brand);font-weight:700}.role-marketing{color:var(--gold);font-weight:700}.role-sales{color:#2b5a78;font-weight:700}
  .smallnote{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">마케팅 메뉴판 · 고객별 배분 (미래 12개월)</div></div><a href="refatrix-portal.html" id="portalBtn" style="color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto">← 포털</a><div class="who" id="who" style="margin-left:14px"></div></div>

  <div class="card" id="loginCard">
    <h2>로그인</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div><label>아이디</label><input id="lid" type="text" value="admin"></div>
      <div><label>PIN</label><input id="pin" type="password" inputmode="numeric" placeholder="••••"></div>
    </div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <h2 style="margin:0">기간 · 상태</h2>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="margin:0">시작 월</label><input id="startYm" type="month">
          <button class="btn sm ghost" id="reloadBtn">불러오기</button>
          <span id="statusBadge"></span>
        </div>
      </div>
      <div class="hint" style="margin-top:6px">전체 마케팅 예산을 위에 두고, 고객별로 메뉴 활동의 수량만 고르면 비용이 자동 산출되어 배분됩니다. 총예산 대비 잔여·초과를 실시간으로 봅니다.</div>
    </div>

    <!-- ① 전체 예산 + 배분 합 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">① 전체 마케팅 월 예산 vs 배분 <span class="smallnote" id="budgetRole"></span></h2>
        <button class="btn gold sm hidden" id="saveBudgetBtn">전체 예산 저장</button>
      </div>
      <div class="scroll"><div id="budgetGrid"><div class="hint">불러오는 중…</div></div></div>
      <div class="msg" id="budgetMsg"></div>
    </div>

    <!-- 메뉴판(참고 단가표) -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">메뉴판 (활동 · 단가)</h2>
        <button class="btn ghost sm hidden" id="addMenuBtn">+ 메뉴 추가</button>
      </div>
      <div id="menuBox"></div>
    </div>

    <!-- ② 고객 선택 + 활동 수량 배분 -->
    <div class="card">
      <h2 style="margin:0 0 6px">② 고객별 배분 (활동 수량 → 비용 자동)</h2>
      <div class="custpick" id="custPick"></div>
      <div id="allocArea" style="margin-top:10px"></div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap" id="allocActions"></div>
      <div class="msg" id="allocMsg"></div>
    </div>

    <!-- 메모 게시판 -->
    <div class="card">
      <h2 style="margin:0 0 6px">메모 · 피드백 게시판</h2>
      <div class="hint" style="margin-top:0">전체 메모와 선택한 고객의 메모를 주고받습니다. 디렉터·마케팅·영업 모두 작성할 수 있습니다.</div>
      <div style="display:flex;gap:8px;margin-top:6px"><button class="chip on" id="noteScopeAll" onclick="setNoteScope(null)">전체 메모</button><button class="chip" id="noteScopeCust" onclick="setNoteScope('cust')">선택 고객 메모</button></div>
      <div id="notes" style="margin-top:8px"></div>
      <div style="display:flex;gap:8px;margin-top:8px"><textarea id="noteText" rows="2" style="flex:1" placeholder="메모를 입력하세요"></textarea><button class="btn sm" id="noteSend" style="align-self:flex-end">등록</button></div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  let startYm='', months=[], overview=null, menu=[], custData=null, curCust=null, noteScope=null;
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const isDirector=()=> session.user && session.user.role==='director';
  const isMarketing=()=> session.user && (session.user.role==='director'||session.user.role==='marketing');
  const n0=(v)=> (v==null||v==='')?0:Number(v);
  const fmt=(n)=> n==null?'—':Number(n).toLocaleString('es-MX',{maximumFractionDigits:0});
  const ymLabel=(ym)=>{const [y,m]=ym.split('-');return y.slice(2)+'.'+m;};
  const stLabel=(s)=> ({draft:'작성중',submitted:'제출됨',approved:'승인',rejected:'반려'}[s]||s);

  
  // 포털에서 전달된 토큰(자동 로그인)
  function portalSession(){
    try{
      const raw=sessionStorage.getItem('refatrix_session');
      if(raw){ const o=JSON.parse(raw); if(o&&o.token) return {token:o.token, api:o.api||'', user:o.user||{}}; }
    }catch(e){}
    try{
      const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h);
        const token=p.get('token'); if(token){ const o={token, api:p.get('api')||'', user:JSON.parse(p.get('user')||'{}')};
          try{ sessionStorage.setItem('refatrix_session', JSON.stringify(o)); }catch(e){}
          return o; } }
    }catch(e){}
    return null;
  }


  async function applyAccessLock(pageKey){
    try{
      const a=await fetch(session.api+'/api/me/access',{headers:auth()}).then(r=>r.json());
      const lvl=(a.access&&a.access[pageKey])||'edit';
      if(lvl==='view'){
        document.body.classList.add('ro');
        const st=document.createElement('style');
        st.textContent="body.ro input[type=text]:not(#api):not(#lid),body.ro input[type=number],body.ro input[type=month],body.ro input[type=date],body.ro textarea{pointer-events:none;background:#f2f0ea;color:#999}body.ro .btn.gold,body.ro .btn.danger{display:none!important}body.ro button.btn:not(.ghost):not(#go):not(#reloadBtn):not(#portalBtn){display:none!important}";
        document.head.appendChild(st);
        const ban=document.createElement('div');ban.textContent='읽기 전용 — 이 화면은 보기 권한만 있습니다(수정 불가).';
        ban.style.cssText='background:#fff4d6;color:#8a6512;border:1px solid #ecd9a0;border-radius:8px;padding:9px 12px;margin-top:12px;font-size:13px;font-weight:700';
        const ap=document.getElementById('app'); if(ap) ap.insertBefore(ban, ap.firstChild);
      }
    }catch(e){}
  }

  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d, res={ok:true};
      const ps=portalSession();
      if(ps&&ps.token){ d={token:ps.token,user:ps.user}; }
      else { res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});
        d=await res.json(); }
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api};
      $('who').innerHTML='<b>'+(d.user?.name||login_id)+'</b><br>역할: '+(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');applyAccessLock('marketing');
      if(isMarketing()){$('saveBudgetBtn').classList.remove('hidden');$('addMenuBtn').classList.remove('hidden');$('budgetRole').textContent='(마케팅·디렉터 편집)';}
      else $('budgetRole').textContent='(보기 전용)';
      const now=new Date();startYm=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');$('startYm').value=startYm;
      await loadMenu(); loadOverview(); loadCustomers(); loadNotes();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  async function loadMenu(){
    try{menu=(await fetch(session.api+'/api/marketing/menu',{headers:auth()}).then(r=>r.json())).items||[];}catch(e){menu=[];}
    renderMenu();
  }
  function renderMenu(){
    const editable=isMarketing();
    $('menuBox').innerHTML='<table><thead><tr><th>활동</th><th>분류</th><th class="num">단가</th><th>단위</th>'+(editable?'<th></th>':'')+'</tr></thead><tbody>'+
      menu.map(m=>`<tr><td><b>${m.name}</b></td><td>${m.category||'—'}</td><td class="num">${fmt(m.unit_budget)}</td><td>${m.unit||'—'}</td>
        ${editable?`<td><button class="btn ghost sm" onclick="editMenu(${m.id})">수정</button> <button class="btn danger sm" onclick="delMenu(${m.id})">삭제</button></td>`:''}</tr>`).join('')+'</tbody></table>';
  }
  async function addMenu(){
    const name=prompt('활동 이름:');if(!name)return;
    const unit_budget=Number(prompt('단가(숫자):')||'0')||0;
    const category=prompt('분류(온라인/오프라인 등, 선택):')||null;
    const unit=prompt('단위(건/회 등, 선택):')||null;
    try{await fetch(session.api+'/api/marketing/menu',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({name,unit_budget,category,unit})});loadMenu();}catch(e){alert('실패');}
  }
  async function editMenu(id){
    const m=menu.find(x=>x.id===id);
    const unit_budget=Number(prompt('단가:',m.unit_budget)||m.unit_budget)||m.unit_budget;
    try{await fetch(session.api+'/api/marketing/menu/'+id,{method:'PATCH',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({unit_budget})});loadMenu();loadCustomers();if(curCust)selectCust(curCust);}catch(e){alert('실패');}
  }
  async function delMenu(id){
    if(!confirm('이 메뉴를 삭제할까요?'))return;
    try{await fetch(session.api+'/api/marketing/menu/'+id,{method:'DELETE',headers:auth()});loadMenu();}catch(e){alert('실패');}
  }

  async function loadOverview(){
    startYm=$('startYm').value||startYm;
    $('budgetGrid').innerHTML='<div class="hint">불러오는 중…</div>';
    try{
      overview=await fetch(session.api+'/api/marketing/overview?start='+startYm,{headers:auth()}).then(r=>r.json());
      months=overview.months;
      $('statusBadge').innerHTML=`<span class="pill st-${overview.status}">${stLabel(overview.status)}</span>`;
      renderBudget();
    }catch(e){$('budgetGrid').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  function renderBudget(){
    const dir=isMarketing();const bud=overview.budget||{},chk=overview.check||{};
    let head='<tr><th class="lbl">구분</th>'+months.map(m=>`<th>${ymLabel(m)}</th>`).join('')+'<th>합계</th></tr>';
    let bs=0;
    let budRow='<tr><td class="lbl"><b>전체 예산</b></td>'+months.map(m=>{const v=bud[m]||0;bs+=v;
      return dir?`<td><input data-bud="${m}" type="number" value="${v||''}" oninput="onBudInput()" style="width:84px"></td>`:`<td class="num">${fmt(v)}</td>`;}).join('')+`<td class="num"><b id="budSum">${fmt(bs)}</b></td></tr>`;
    let allocSum=overview.alloc_sum||{};let as=0;
    let allocRow='<tr><td class="lbl">배분 합(자동)</td>'+months.map(m=>{const v=allocSum[m]||0;as+=v;return `<td class="num" data-allocsum="${m}">${fmt(v)}</td>`;}).join('')+`<td class="num">${fmt(as)}</td></tr>`;
    let diffRow='<tr><td class="lbl smallnote">예산−배분 (잔여/초과)</td>'+months.map(m=>{const c=chk[m]||{};
      const txt=c.over>0?`<span class="over">초과 ${fmt(c.over)}</span>`:`<span class="okrow">잔여 ${fmt(c.remaining||0)}</span>`;
      return `<td class="num" data-diff="${m}">${txt}</td>`;}).join('')+'<td></td></tr>';
    $('budgetGrid').innerHTML=`<table class="grid"><thead>${head}</thead><tbody>${budRow}${allocRow}${diffRow}</tbody></table>`;
  }
  function onBudInput(){
    let s=0;const bud={};document.querySelectorAll('[data-bud]').forEach(i=>{bud[i.dataset.bud]=n0(i.value);s+=n0(i.value);});
    $('budSum').textContent=fmt(s);
    const allocSum=overview.alloc_sum||{};
    months.forEach(m=>{const diff=(bud[m]||0)-(allocSum[m]||0);const el=document.querySelector(`[data-diff="${m}"]`);
      if(el)el.innerHTML=diff<0?`<span class="over">초과 ${fmt(-diff)}</span>`:`<span class="okrow">잔여 ${fmt(diff)}</span>`;});
  }
  async function saveBudget(){
    const m=$('budgetMsg');m.className='msg';m.style.display='none';
    const arr=[];document.querySelectorAll('[data-bud]').forEach(i=>arr.push({ym:i.dataset.bud,amount:n0(i.value)}));
    try{
      const res=await fetch(session.api+'/api/marketing/budget',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({months:arr})});
      const d=await res.json();if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='저장 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent='전체 예산을 저장했습니다.';loadOverview();
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='서버 연결 실패';}
  }

  async function loadCustomers(){
    try{custData=await fetch(session.api+'/api/marketing/customers?start='+startYm,{headers:auth()}).then(r=>r.json());}catch(e){custData={customers:[]};}
    $('custPick').innerHTML=(custData.customers||[]).map(c=>{
      const total=Object.values(c.month_cost||{}).reduce((s,v)=>s+v,0);
      return `<div class="chip ${curCust===c.id?'on':''}" onclick="selectCust(${c.id})">${c.name}${total?` <span class="smallnote">(${fmt(total)})</span>`:''}</div>`;
    }).join('')||'<div class="hint">고객이 없습니다.</div>';
    if(curCust)selectCust(curCust);
  }

  async function selectCust(id){
    curCust=id;
    document.querySelectorAll('#custPick .chip').forEach(c=>c.classList.remove('on'));
    $('allocArea').innerHTML='<div class="hint">불러오는 중…</div>';
    try{
      const d=await fetch(session.api+'/api/marketing/alloc?customer_id='+id+'&start='+startYm,{headers:auth()}).then(r=>r.json());
      renderAlloc(d);
    }catch(e){$('allocArea').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
    // chip 강조 갱신
    const chips=[...document.querySelectorAll('#custPick .chip')];
    const idx=(custData.customers||[]).findIndex(c=>c.id===id); if(chips[idx])chips[idx].classList.add('on');
    renderAllocActions();
  }
  function renderAlloc(d){
    const editable=d.can_edit;const grid=d.grid||{};
    const cname=(custData.customers||[]).find(c=>c.id===curCust)?.name||'';
    let head='<tr><th class="lbl">활동 (단가)</th>'+months.map(m=>`<th>${ymLabel(m)}</th>`).join('')+'<th>비용</th></tr>';
    let rows=menu.map(mi=>{
      let rowCost=0;
      const cells=months.map(m=>{
        const q=(grid[mi.id]&&grid[mi.id][m])||0;rowCost+=q*mi.unit_budget;
        return editable?`<td><input data-cat="${mi.id}" data-ym="${m}" data-unit="${mi.unit_budget}" type="number" min="0" value="${q||''}" oninput="onAllocInput()"></td>`:`<td class="num">${q||''}</td>`;
      }).join('');
      return `<tr><td class="lbl">${mi.name} <span class="smallnote">${fmt(mi.unit_budget)}</span></td>${cells}<td class="num" data-rowcost="${mi.id}">${fmt(rowCost)}</td></tr>`;
    }).join('');
    // 월 합 행
    let totRow='<tr><td class="lbl"><b>월 비용 합</b></td>'+months.map(m=>`<td class="num" data-monthcost="${m}"><b>0</b></td>`).join('')+'<td class="num" data-grandcost><b>0</b></td></tr>';
    $('allocArea').innerHTML=`<div style="font-weight:700;margin-bottom:6px">${cname}</div><div class="scroll"><table class="grid"><thead>${head}</thead><tbody>${rows}${totRow}</tbody></table></div>`;
    onAllocInput();
  }
  function onAllocInput(){
    const monthTot={};let grand=0;
    // 행별 비용
    menu.forEach(mi=>{
      let rc=0;document.querySelectorAll(`[data-cat="${mi.id}"]`).forEach(i=>{const q=n0(i.value),u=Number(i.dataset.unit);const c=q*u;rc+=c;const m=i.dataset.ym;monthTot[m]=(monthTot[m]||0)+c;});
      const el=document.querySelector(`[data-rowcost="${mi.id}"]`);if(el)el.textContent=fmt(rc);
    });
    months.forEach(m=>{const el=document.querySelector(`[data-monthcost="${m}"]`);if(el)el.innerHTML='<b>'+fmt(monthTot[m]||0)+'</b>';grand+=monthTot[m]||0;});
    const g=document.querySelector('[data-grandcost]');if(g)g.innerHTML='<b>'+fmt(grand)+'</b>';
  }
  function renderAllocActions(){
    const box=$('allocActions');box.innerHTML='';
    if(isMarketing()){
      const save=document.createElement('button');save.className='btn gold sm';save.textContent='이 고객 배분 저장';save.onclick=saveAlloc;box.appendChild(save);
      const sub=document.createElement('button');sub.className='btn sm';sub.textContent='전체 제출(디렉터 승인 요청)';sub.onclick=submitPlan;box.appendChild(sub);
    }
    if(isDirector()){
      const ap=document.createElement('button');ap.className='btn sm';ap.style.background='var(--income)';ap.textContent='승인';ap.onclick=()=>decide(true);box.appendChild(ap);
      const rj=document.createElement('button');rj.className='btn danger sm';rj.textContent='반려';rj.onclick=()=>decide(false);box.appendChild(rj);
    }
  }
  async function saveAlloc(){
    const m=$('allocMsg');m.className='msg';m.style.display='none';
    const items=[];document.querySelectorAll('[data-cat]').forEach(i=>items.push({catalog_id:Number(i.dataset.cat),ym:i.dataset.ym,qty:n0(i.value)}));
    try{
      const res=await fetch(session.api+'/api/marketing/alloc',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({customer_id:curCust,items})});
      const d=await res.json();if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='저장 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent='배분을 저장했습니다. (상태: 작성중 — 제출 필요)';
      loadOverview();loadCustomers();
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='서버 연결 실패';}
  }
  async function submitPlan(){
    const m=$('allocMsg');m.className='msg';m.style.display='none';
    try{const res=await fetch(session.api+'/api/marketing/submit',{method:'POST',headers:auth()});const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='제출 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent='제출했습니다. 디렉터 승인을 기다립니다.';loadOverview();
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='제출 실패';}
  }
  async function decide(approve){
    const m=$('allocMsg');m.className='msg';m.style.display='none';let note=null;if(!approve)note=prompt('반려 사유(선택):')||null;
    try{const res=await fetch(session.api+'/api/marketing/decide',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({approve,note})});const d=await res.json();
      if(!res.ok||d.error){m.className='msg err';m.style.display='block';m.textContent='처리 실패: '+(d.error||res.status);return;}
      m.className='msg ok';m.style.display='block';m.textContent=approve?'승인했습니다.':'반려했습니다.';loadOverview();
    }catch(e){m.className='msg err';m.style.display='block';m.textContent='처리 실패';}
  }

  // 메모 게시판
  function setNoteScope(s){noteScope=s;$('noteScopeAll').classList.toggle('on',s===null);$('noteScopeCust').classList.toggle('on',s==='cust');loadNotes();}
  async function loadNotes(){
    const cust=(noteScope==='cust'&&curCust)?curCust:null;
    if(noteScope==='cust'&&!curCust){$('notes').innerHTML='<div class="hint">먼저 위에서 고객을 선택하세요.</div>';return;}
    $('notes').innerHTML='<div class="hint">불러오는 중…</div>';
    try{
      const d=await fetch(session.api+'/api/marketing/notes'+(cust?('?customer_id='+cust):''),{headers:auth()}).then(r=>r.json());
      const items=d.items||[];
      if(!items.length){$('notes').innerHTML='<div class="hint">메모가 없습니다.</div>';return;}
      $('notes').innerHTML=items.map(n=>`<div class="note"><div class="meta"><span class="role-${n.author_role}">${n.author_name||''} · ${({director:'디렉터',marketing:'마케팅',sales:'영업'}[n.author_role]||n.author_role)}</span> · ${n.created_at}
        ${(isDirector()||true)?` <a href="#" onclick="delNote(${n.id});return false" class="smallnote" style="color:var(--expense)">삭제</a>`:''}</div>
        <div style="margin-top:3px">${n.note}</div></div>`).join('');
    }catch(e){$('notes').innerHTML='<div class="hint">불러오지 못했습니다.</div>';}
  }
  async function sendNote(){
    const t=$('noteText').value.trim();if(!t)return;
    const cust=(noteScope==='cust'&&curCust)?curCust:null;
    try{await fetch(session.api+'/api/marketing/notes',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({note:t,customer_id:cust})});$('noteText').value='';loadNotes();}catch(e){alert('실패');}
  }
  async function delNote(id){
    if(!confirm('이 메모를 삭제할까요?'))return;
    try{const res=await fetch(session.api+'/api/marketing/notes/'+id,{method:'DELETE',headers:auth()});if(!res.ok){alert('본인 메모 또는 디렉터만 삭제할 수 있습니다.');return;}loadNotes();}catch(e){alert('실패');}
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  $('reloadBtn').addEventListener('click',()=>{loadOverview();loadCustomers();});
  $('saveBudgetBtn').addEventListener('click',saveBudget);
  $('addMenuBtn').addEventListener('click',addMenu);
  $('noteSend').addEventListener('click',sendNote);

  // 포털 자동 로그인
  (function(){ const ps=portalSession(); if(ps&&ps.token){ if(ps.api)$('api').value=ps.api; $('lid').value='-'; $('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
</body>
</html>
