<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>

<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;--income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--expense-bg:#F6E7E4;--brand:#143D34;--gold:#B8893B;--purple:#6B4FB0;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1080px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.sm{padding:5px 10px;font-size:12px}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:var(--expense-bg);color:var(--expense)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .mrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.mrow .ml{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px}
  .mbtn{min-width:38px;padding:6px 9px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
  .mbtn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .tab{padding:8px 14px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted)}
  .tab.on{color:#fff}
  .tab.quotes.on{background:var(--brand);border-color:var(--brand)}
  .tab.immediate.on{background:var(--income);border-color:var(--income)}
  .tab.shortage.on{background:var(--gold);border-color:var(--gold)}
  .tab.dev.on{background:var(--purple);border-color:var(--purple)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  th,td{padding:8px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:top}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700}
  td.r,th.r{text-align:right}
  tr.click{cursor:pointer}tr.click:hover{background:#faf8f3}
  tr.sub td{background:#faf8f3;font-size:11.5px}
  .clamp2{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;max-height:2.6em;overflow:hidden;word-break:break-word;overflow-wrap:anywhere;line-height:1.3}
  .inv-scroll{max-height:300px;overflow:auto;border:1px solid var(--line,#e6e1d6);border-radius:8px;background:#fff}
  .inv-scroll thead th{position:sticky;top:0;background:#f4f1ea;z-index:1}
  .inv-scroll td,.inv-scroll th{word-break:break-word;overflow-wrap:anywhere;overflow:hidden}
  .inv-scroll .inv-code{display:block;word-break:break-all}
  .inv-totals{position:sticky;bottom:0;background:#fff;border-top:2px solid var(--brand);padding:8px 6px;display:flex;gap:14px;flex-wrap:wrap;justify-content:flex-end;align-items:center;font-size:12.5px}
  .inv-code{font-weight:700;color:var(--brand)}
  .seg{display:inline-flex;height:14px;border-radius:3px;overflow:hidden;width:110px;vertical-align:middle;border:1px solid var(--line)}
  .seg i{display:block;height:100%}.si{background:var(--income)}.ss{background:var(--gold)}.sd{background:var(--purple)}
  .pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
  .pill.ok{background:var(--income-bg);color:var(--income)}.pill.low{background:#fdf3e3;color:#9a6512}.pill.nf{background:#f1ebf7;color:#6B4FB0}
  .pill.conv{background:var(--income-bg);color:var(--income)}.pill.draft{background:#eef0f2;color:#555}
  .st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
  .st.received{background:#eef0f2;color:#555}.st.reviewed{background:#fdf3e3;color:#9a6512}.st.factory_requested{background:#e8eefb;color:#2f5db2}.st.developed{background:var(--income-bg);color:var(--income)}
  .grp{font-size:13px;font-weight:800;color:var(--brand);margin:14px 0 4px}
  .okv{color:var(--income);font-weight:700}.lowv{color:var(--gold);font-weight:700}.nfv{color:var(--purple);font-weight:700}
  /* 매출 확정 요약(고정 박스) */
  .sumcap{font-size:12px;font-weight:700;color:var(--brand);margin:2px 0 6px}
  .sumcap span{color:var(--muted);font-weight:600}
  .sumbox{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:0 0 16px}
  .sumcell{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px;min-width:0}
  .sumcell .k{font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sumcell .v{font-size:19px;font-weight:800;color:var(--brand);margin-top:3px;line-height:1.15;overflow-wrap:anywhere}
  .sumcell .d{font-size:10.5px;margin-top:5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sumcell .d.up{color:var(--income)} .sumcell .d.dn{color:var(--expense)} .sumcell .d.fl{color:var(--muted)}
  @media(max-width:900px){.sumbox{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.sumbox{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">수주 흐름 — 견적 요청 깔때기 세부</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="mrow" id="months" style="margin-bottom:10px"></div>
      <div class="tabs" style="display:none">
        <div class="tab quotes" id="t-quotes" onclick="setCat('quotes')">견적 요청</div>
        <div class="tab immediate" id="t-immediate" onclick="setCat('immediate')">① 매출 확정 목록</div>
        <div class="tab shortage" id="t-shortage" onclick="setCat('shortage')">② 부족·발주</div>
        <div class="tab dev" id="t-dev" onclick="setCat('dev')">③ 개발 필요</div>
      </div>
      <div id="body" style="margin-top:6px"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
    </div>
  </div>
</div>

<div id="invModal" class="hidden" style="position:fixed;inset:0;background:rgba(20,27,25,.5);z-index:60;align-items:flex-start;justify-content:center;padding:24px;overflow:auto">
  <div style="background:#fff;border-radius:14px;max-width:860px;width:100%;padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <b style="color:var(--brand);font-size:14px">인보이스 출력 (Factura)</b>
      <div style="display:flex;gap:8px">
        <button class="btn" id="invPdfBtn" onclick="downloadInvoicePdf()">PDF 다운로드</button>
        <button class="btn ghost" style="border:1px solid var(--line);background:#fff" onclick="closeInvoiceStatement()">닫기</button>
      </div>
    </div>
    <div id="invStmtBody" style="background:#fff"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  let session={token:null,user:null,api:''};
  let cat='quotes', months=[], FYEAR=new Date().getFullYear();
  let openRows={};
  let invCache={};
  let invFilesCache={};   // 인보이스별 첨부파일 메타 캐시(재렌더 시 복원)
  let invCompany=null, stmtInvId=null;
  let immOwner='', immTeam='';
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nf=(n)=>Number(n||0).toLocaleString('es-MX',{maximumFractionDigits:3});
  const money=(n)=>Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  function parseHash(){
    try{ const p=new URLSearchParams(location.hash.slice(1));
      const c=p.get('cat'); if(c) cat=c;
      const m=p.get('months'); if(m) months=m.split(',').filter(x=>/^\d{4}-\d{2}$/.test(x));
    }catch(e){}
    if(!months.length) months=[new Date().toISOString().slice(0,7)];
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      parseHash(); renderMonths();
      var _ht='quotes'; try{ var _p=new URLSearchParams(location.hash.slice(1)); _ht=_p.get('tab')||'quotes'; }catch(e){}
      if(['quotes','immediate','shortage','dev'].indexOf(_ht)<0)_ht='quotes';
      setCat(_ht,true);
      window.addEventListener('hashchange',function(){ if(!$('app').classList.contains('hidden')){ var t='quotes'; try{var p=new URLSearchParams(location.hash.slice(1));t=p.get('tab')||'quotes';}catch(e){} if(['quotes','immediate','shortage','dev'].indexOf(t)>=0)setCat(t,true);} });
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  function renderMonths(){
    const btns=Array.from({length:12},(_,i)=>{const mm=String(i+1).padStart(2,'0');const ym=FYEAR+'-'+mm;
      return '<button class="mbtn '+(months.includes(ym)?'on':'')+'" onclick="toggleMonth(\''+ym+'\')">'+(i+1)+'월</button>';}).join(' ');
    $('months').innerHTML='<span class="ml">조회 월 ('+FYEAR+')</span>'+btns;
  }
  function toggleMonth(ym){ const i=months.indexOf(ym); if(i>=0){ if(months.length>1) months.splice(i,1); } else months.push(ym); renderMonths(); load(); }
  function setCat(c,skipReset){ cat=c; ['quotes','immediate','shortage','dev'].forEach(k=>$('t-'+k).classList.toggle('on',k===c)); openRows={}; load(); if(window.__rnavRefresh)window.__rnavRefresh(); }
  const mq=()=>encodeURIComponent(months.join(','));

  async function load(){
    $('body').innerHTML='<div class="hint" style="margin-top:10px">불러오는 중…</div>';
    try{
      if(cat==='quotes') return loadQuotes();
      if(cat==='immediate') return loadImmediate();
      if(cat==='shortage') return loadShortage();
      if(cat==='dev') return loadDev();
    }catch(e){ $('body').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }

  // ① 견적 요청 → 견적 목록, 클릭 시 SKU 라인
  async function loadQuotes(){
    const d=await fetch(session.api+'/api/dashboard/funnel/quotes?months='+mq(),{headers:auth()}).then(r=>r.json());
    const items=d.items||[];
    if(!items.length){ $('body').innerHTML='<div class="hint" style="margin-top:10px">해당 기간 견적이 없습니다.</div>'; return; }
    let h='<div class="hint" style="margin-top:8px">견적을 클릭하면 SKU별 세부 내역을 펼칩니다. 구성막대: <span class="okv">■</span>즉시 <span class="lowv">■</span>부족 <span class="nfv">■</span>개발 (수량 비중)</div>';
    h+='<table><thead><tr><th>견적번호</th><th>견적일</th><th>고객</th><th class="r">SKU</th><th class="r">총수량</th><th>구성</th><th class="r">즉시%</th><th>상태</th></tr></thead><tbody>';
    items.forEach(q=>{
      h+='<tr class="click" onclick="toggleQuote('+q.id+')">'
        +'<td><b>'+esc(q.quote_no||'')+'</b></td><td>'+esc(q.qdate||'')+'</td><td>'+esc(q.customer_name||'')+'</td>'
        +'<td class="r">'+q.req_sku+'</td><td class="r">'+nf(q.req_qty)+'</td>'
        +'<td><span class="seg"><i class="si" style="width:'+q.ok_qty_pct+'%"></i><i class="ss" style="width:'+q.short_qty_pct+'%"></i><i class="sd" style="width:'+q.dev_qty_pct+'%"></i></span></td>'
        +'<td class="r okv">'+q.ok_qty_pct+'%</td>'
        +'<td>'+(q.converted?'<span class="pill conv">전환됨</span>':'<span class="pill draft">미전환</span>')+'</td></tr>';
      if(openRows['q'+q.id]) h+='<tr class="sub" id="qsub'+q.id+'"><td colspan="8">'+(openRows['q'+q.id]==='loading'?'불러오는 중…':openRows['q'+q.id])+'</td></tr>';
    });
    h+='</tbody></table>';
    $('body').innerHTML=h;
  }
  async function toggleQuote(id){
    if(openRows['q'+id]){ delete openRows['q'+id]; return loadQuotes(); }
    openRows['q'+id]='loading'; await loadQuotes();
    try{ const d=await fetch(session.api+'/api/dashboard/funnel/quote-lines?quote_id='+id,{headers:auth()}).then(r=>r.json());
      const lines=d.items||[];
      let t='<table style="margin:0"><thead><tr><th>코드</th><th>품명</th><th class="r">수량</th><th class="r">가용재고</th><th>분류</th><th class="r">라인금액</th></tr></thead><tbody>';
      lines.forEach(l=>{ t+='<tr><td>'+esc(l.ctr_code||l.input_code||'')+'</td><td>'+esc(l.product_name||'(미등록)')+'</td><td class="r">'+nf(l.qty)+'</td><td class="r">'+(l.avail_stock==null?'-':nf(l.avail_stock))+'</td><td>'+flagPill(l.stock_flag)+'</td><td class="r">'+money(l.line_total)+'</td></tr>'; });
      t+='</tbody></table>';
      openRows['q'+id]=t; loadQuotes();
    }catch(e){ openRows['q'+id]='불러오지 못했습니다.'; loadQuotes(); }
  }
  function flagPill(f){ return f==='ok'?'<span class="pill ok">즉시</span>':f==='low_stock'?'<span class="pill low">부족</span>':'<span class="pill nf">개발</span>'; }

  // ② 즉시 매출 → 발행가능 / 이미발행
  // 매출 확정 요약 박스: 영역은 고정, 숫자만 변함 + 전월(직전 동기간) 대비 작은 글씨
  function summaryBox(s){
    if(!s||!s.cur) return '';
    const c=s.cur, dl=s.delta||{}, pc=s.pct||{};
    const cell=(label,curv,key,isMoney)=>{
      const delta=Number(dl[key]||0), pct=pc[key];
      const cls=delta>0?'up':(delta<0?'dn':'fl');
      const arrow=delta>0?'▲':(delta<0?'▼':'–');
      const dabs=isMoney?('MX$'+money(Math.abs(delta))):nf(Math.abs(delta));
      const sign=delta>0?'+':(delta<0?'−':'');
      const pctTxt=(pct==null)?(delta>0?'신규':'—'):(sign+Math.abs(pct)+'%');
      return '<div class="sumcell"><div class="k">'+label+'</div><div class="v">'+curv+'</div>'
        +'<div class="d '+cls+'" title="'+esc(s.label)+'">'+arrow+' '+sign+dabs+' · '+pctTxt+'</div></div>';
    };
    return '<div class="sumcap">매출 확정 요약 <span>· '+esc(s.label)+'</span></div>'
      +'<div class="sumbox">'
      + cell('SKU 수', nf(c.sku), 'sku', false)
      + cell('총 수량', nf(c.qty), 'qty', false)
      + cell('총 금액 <span style="font-weight:600;font-size:.8em;color:var(--muted)">(IVA 포함)</span>', 'MX$'+money(c.amount), 'amount', true)
      + cell('인보이스 수', nf(c.invoices)+'건', 'invoices', false)
      + cell('고객 수', nf(c.customers)+'곳', 'customers', false)
      + '</div>';
  }
  async function loadImmediate(){
    const qp='months='+mq()+(immTeam?('&team_id='+immTeam):'')+(immOwner?('&owner_id='+immOwner):'');
    const d=await fetch(session.api+'/api/dashboard/funnel/immediate?'+qp,{headers:auth()}).then(r=>r.json());
    const able=d.able||[], done=d.done||[];
    let h='';
    h+=await creditPendingCard();
    h+=summaryBox(d.summary);
    // 디렉터/상위: 팀·담당자 필터
    if(d.can_filter && d.filters){
      const fo=d.filters;
      let tsel='<select onchange="setImmFilter(\'team\',this.value)" style="font-size:12px;padding:4px 6px"><option value="">전체 팀</option>';
      (fo.teams||[]).forEach(t=>{ tsel+='<option value="'+t.id+'"'+(String(immTeam)===String(t.id)?' selected':'')+'>'+esc(t.name)+'</option>'; });
      tsel+='</select>';
      let osel='<select onchange="setImmFilter(\'owner\',this.value)" style="font-size:12px;padding:4px 6px"><option value="">전체 담당자</option>';
      (fo.owners||[]).forEach(o=>{ osel+='<option value="'+o.id+'"'+(String(immOwner)===String(o.id)?' selected':'')+'>'+esc(o.name)+'</option>'; });
      osel+='</select>';

  async function deleteSaleF(id){
    const inv=(invCache[id]&&invCache[id].invoice)||{};
    const label=inv.sat_no||('#'+id);
    if(!confirm('정말 이 매출을 삭제할까요?\n\nSAT/번호: '+label+'\n총액(IVA 포함): '+money(inv.total_mxn)+'\n\n재고가 복원되고 입금예정(미수금)이 취소되며, 연결된 견적은 미전환으로 돌아갑니다.\n되돌릴 수 없습니다.')) return;
    const msg=document.getElementById('del-msg-'+id);
    if(msg){ msg.textContent='삭제 중…'; msg.style.color='var(--muted)'; }
    try{
      const r=await fetch(session.api+'/api/sales/'+id,{method:'DELETE',headers:auth()});
      const d=await r.json().catch(()=>({}));
      if(!r.ok||d.error){
        let m='삭제 실패';
        if(d.error==='has_payments') m='이미 수금(반제)이 잡힌 매출입니다. 먼저 수금을 취소한 뒤 삭제하세요. (수금액 '+money(d.paid)+')';
        else if(d.error==='commission_paid') m='이미 커미션이 지급된 매출이라 삭제할 수 없습니다.';
        else if(d.error==='not_posted') m='이미 삭제되었거나 게시(posted) 상태가 아닙니다.';
        else if(d.error==='not_found') m='매출을 찾을 수 없습니다.';
        else m='삭제 실패: '+(d.error||r.status);
        if(msg){ msg.textContent=m; msg.style.color='var(--expense)'; } else alert(m);
        return;
      }
      // 성공: 드릴다운 닫고 목록 새로고침
      delete openRows['i'+id]; delete invCache[id];
      loadImmediate();
      if(window.__rnavRefresh)window.__rnavRefresh();
    }catch(e){ if(msg){ msg.textContent='서버 연결 실패'; msg.style.color='var(--expense)'; } else alert('서버 연결 실패'); }

    items.forEach(l=>{ const sub=Number(l.line_amount_mxn)||0; const iva=Math.round(sub*IVA*100)/100, tot=Math.round(sub*(1+IVA)*100)/100;
      aoa.push([l.ctr_code||'', l.syd_codes||'', l.product_name||'', l.app||'', Number(l.qty)||0, Number(l.unit_price)||0, sub, iva, tot]); });

  function paginateRows(rowHs, maxDomPx, fullHeaderH, repHeaderH, theadH, totalsH){
    const pages=[]; let cur=[], used=0;
    const budgetFor=first=>maxDomPx-(first?fullHeaderH:repHeaderH)-theadH;
    let budget=budgetFor(true);
    for(let i=0;i<rowHs.length;i++){
      const rh=rowHs[i]||24;
      if(cur.length && used+rh>budget){ pages.push(cur); cur=[]; used=0; budget=budgetFor(false); }
      cur.push(i); used+=rh;
    }
    if(cur.length) pages.push(cur);
    if(!pages.length) pages.push([]);
    const lastFirst=(pages.length===1);
    const lastBudget=maxDomPx-(lastFirst?fullHeaderH:repHeaderH)-theadH;
    const lastUsed=pages[pages.length-1].reduce((s,i)=>s+(rowHs[i]||24),0);
    return { pages, totalsOnNewPage: (lastUsed+totalsH>lastBudget) };
  }

        +'<button class="btn ghost sm" style="border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 9px;cursor:pointer" onclick="viewInvoiceFile('+f.id+')">보기</button>'
        +'<button class="btn ghost sm" style="border:1px solid #e7b6af;color:var(--expense);background:#fff;border-radius:7px;padding:3px 9px;cursor:pointer" onclick="deleteInvoiceFile('+id+','+f.id+')">삭제</button>'
        +'</div>';
    });
    h+='</div>';
    box.innerHTML=h;
  }
  function renderAllInvFiles(){
    Object.keys(openRows).forEach(k=>{ if(k.charAt(0)==='i'){ const id=Number(k.slice(1)); if(Array.isArray(invFilesCache[id])) renderInvFiles(id); } });
  }
  async function loadInvoiceFiles(id){
    try{
      const d=await fetch(session.api+'/api/sales/'+id+'/files',{headers:auth()}).then(r=>r.json());
      invFilesCache[id]=Array.isArray(d.items)?d.items:[];
    }catch(e){ invFilesCache[id]=[]; }
    renderInvFiles(id);
  }
  function triggerInvoiceFile(id){ const f=document.getElementById('invfile-in-'+id); if(f){ f.value=''; f.click(); } }
  async function onInvoiceFilePicked(id, input){
    const files=Array.from(input.files||[]); if(!files.length) return;
    const msg=document.getElementById('invfile-msg-'+id);
    const MAX=8*1024*1024; let okN=0, errN=0, lastErr='';
    for(const f of files){
      if(f.size>MAX){ errN++; lastErr='“'+f.name+'” 8MB 초과'; continue; }
      if(msg){ msg.style.color=''; msg.textContent='“'+f.name+'” 업로드 중…'; }
      let data;
      try{ data=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read')); r.readAsDataURL(f); }); }
      catch(_){ errN++; lastErr='“'+f.name+'” 읽기 실패'; continue; }
      try{
        const res=await fetch(session.api+'/api/sales/'+id+'/files',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({file_name:f.name,mime_type:f.type||'',data})});
        const dd=await res.json().catch(()=>({}));
        if(!res.ok||dd.error){
          errN++;
          if(res.status===403) lastErr='업로드 권한이 없습니다';
          else if(dd.note==='too_large') lastErr='“'+f.name+'” 파일이 너무 큼';
          else if(dd.note==='bad_mime') lastErr='“'+f.name+'” 지원하지 않는 형식';
          else lastErr='“'+f.name+'” 업로드 실패';
          continue;
        }
        okN++;
      }catch(e){ errN++; lastErr='“'+f.name+'” 서버 연결 실패'; }
    }
    if(msg){
      if(errN===0){ msg.style.color='var(--income)'; msg.textContent='업로드 완료 ('+okN+'건)'; }
      else { msg.style.color='var(--expense)'; msg.textContent=(okN?okN+'건 완료 · ':'')+errN+'건 실패: '+lastErr; }
    }
    await loadInvoiceFiles(id);
  }
  async function viewInvoiceFile(fileId){
    try{
      const d=await fetch(session.api+'/api/sales/files/'+fileId,{headers:auth()}).then(r=>r.json());
      if(!d || !d.file_data){ alert('파일을 찾을 수 없습니다.'); return; }
      const comma=d.file_data.indexOf(','); const meta=d.file_data.slice(0,comma); const b64=d.file_data.slice(comma+1);
      const mime=(meta.match(/data:([^;]+)/)||[])[1] || d.mime_type || 'application/octet-stream';
      const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      const url=URL.createObjectURL(new Blob([arr],{type:mime}));
      const w=window.open(url,'_blank'); if(!w) alert('팝업이 차단되었습니다. 팝업을 허용하세요.');
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }catch(e){ alert('파일을 불러오지 못했습니다.'); }
  }
  async function deleteInvoiceFile(id, fileId){
    if(!confirm('이 첨부파일을 삭제할까요? 되돌릴 수 없습니다.')) return;
    try{
      const res=await fetch(session.api+'/api/sales/files/'+fileId,{method:'DELETE',headers:auth()});
      const dd=await res.json().catch(()=>({}));
      if(!res.ok||dd.error){ alert(res.status===403?'삭제 권한이 없습니다.':'삭제 실패'); return; }
    }catch(e){ alert('서버 연결 실패'); return; }
    await loadInvoiceFiles(id);
  }
  async function creditPendingCard(){
    if(!(session.user && session.user.role==='director')) return '';
    let items=[];
    try{ const d=await fetch(session.api+'/api/sales/credit-days/pending',{headers:auth()}).then(r=>r.json()); items=(d&&d.items)||[]; }catch(e){ return ''; }
    if(!items.length) return '';
    let h='<div class="card" style="margin:0 0 14px;border:1px solid var(--gold,#d4a017);background:#fffaf0">'
      +'<div class="grp" style="margin:0 0 6px">외상일(여신) 변경 승인 대기 ('+items.length+')</div>'
      +'<table><thead><tr><th>고객</th><th>인보이스/SAT</th><th class="r">현재</th><th class="r">요청</th><th class="r">기본</th><th>요청자</th><th>사유</th><th>처리</th></tr></thead><tbody>';
    items.forEach(it=>{
      h+='<tr><td>'+esc(it.customer_name||'')+'</td><td>'+esc(it.sat_no||('#'+it.id))+'</td>'
        +'<td class="r">'+it.credit_days+'일</td><td class="r"><b>'+it.credit_days_req+'일</b></td><td class="r"><span class="hint">'+it.base_credit_days+'일</span></td>'
        +'<td>'+esc(it.req_by_name||'')+'</td><td>'+esc(it.credit_req_memo||'')+'</td>'
        +'<td style="white-space:nowrap"><button class="btn ghost sm" style="border:1px solid var(--income);color:var(--income);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer" onclick="creditApproveF('+it.id+',true)">승인</button> '
        +'<button class="btn ghost sm" style="border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer" onclick="creditApproveF('+it.id+',false)">반려</button>'
        +'<div id="cdap-msg-'+it.id+'" style="font-size:11px"></div></td></tr>';
    });
    h+='</tbody></table></div>';
    return h;
  }
  async function creditReqF(id){
    const el=document.getElementById('cd-in-'+id), memoEl=document.getElementById('cd-memo-'+id), msg=document.getElementById('cd-msg-'+id);
    const days=Number(el?el.value:NaN);
    if(!(days>=0)){ if(msg){msg.style.color='var(--expense)';msg.textContent='올바른 일수를 입력하세요.';} return; }
    if(msg){msg.style.color='var(--muted)';msg.textContent='처리 중…';}
    try{
      const r=await fetch(session.api+'/api/sales/'+id+'/credit-days-request',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({credit_days:days,memo:memoEl?memoEl.value:''})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok||d.error){ if(msg){msg.style.color='var(--expense)';msg.textContent='실패: '+(d.error||r.status);} return; }
      const wasOpen=!!openRows['i'+id]; delete openRows['i'+id]; delete invCache[id];
      await loadImmediate(); if(wasOpen) toggleInvoice(id);
    }catch(e){ if(msg){msg.style.color='var(--expense)';msg.textContent='서버 연결 실패';} }
  }
  async function creditApproveF(id,ok){
    const msg=document.getElementById('cdap-msg-'+id);
    if(msg){msg.style.color='var(--muted)';msg.textContent=ok?'승인 중…':'반려 중…';}
    try{
      const r=await fetch(session.api+'/api/sales/'+id+'/credit-days-approve',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({approve:ok})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok||d.error){ if(msg){msg.style.color='var(--expense)';msg.textContent='실패: '+(d.error||r.status);} return; }
      const wasOpen=!!openRows['i'+id]; delete openRows['i'+id]; delete invCache[id];
      await loadImmediate(); if(wasOpen) toggleInvoice(id);
    }catch(e){ if(msg){msg.style.color='var(--expense)';msg.textContent='서버 연결 실패';} }
  }
  function adjPreview(id){
    const tot=Number((document.getElementById('adj-tot-'+id)||{}).value)||0;
    const iva=Number((document.getElementById('adj-iva-'+id)||{}).value)||0;
    const sub=Math.round((tot-iva)*100)/100;
    const el=document.getElementById('adj-sub-'+id); if(el){ el.textContent=money(sub); el.style.color=sub<0?'var(--expense)':''; }
  }
  async function adjustTotalF(id){
    const msg=document.getElementById('adj-msg-'+id);
    const tot=Math.round((Number((document.getElementById('adj-tot-'+id)||{}).value)||0)*100)/100;
    const iva=Math.round((Number((document.getElementById('adj-iva-'+id)||{}).value)||0)*100)/100;
    if(msg){msg.style.color='';}
    if(iva>tot){ if(msg){msg.style.color='var(--expense)';msg.textContent='IVA가 총액보다 큽니다.';} return; }
    const sub=Math.round((tot-iva)*100)/100;
    if(!confirm('이 인보이스의 매출액을 다음으로 수정합니다.\n\n총계(IVA 미포함): '+money(sub)+'\nIVA: '+money(iva)+'\n총계(IVA 포함): '+money(tot)+'\n\n모든 라인 단가가 비례 재계산되고 입금예정 금액도 함께 수정됩니다. 진행할까요?')) return;
    try{
      const r=await fetch(session.api+'/api/sales/'+id+'/adjust-total',{method:'POST',headers:{'Content-Type':'application/json',...auth()},body:JSON.stringify({total_mxn:tot,iva_mxn:iva})});
      const dd=await r.json();
      if(!r.ok||dd.error){
        const m=dd.note||(dd.error==='not_current_month'?'당월 매출만 수정할 수 있습니다.':(dd.error==='cannot_scale'?'기존 매출액이 0이라 조정할 수 없습니다.':(dd.error==='iva_gt_total'?'IVA가 총액보다 큽니다.':'수정 실패')));
        if(msg){msg.style.color='var(--expense)';msg.textContent=m;} return;
      }
      if(msg){msg.style.color='var(--income)';msg.textContent='수정됨';}
      delete openRows['i'+id]; delete invCache[id]; await loadImmediate(); toggleInvoice(id);
    }catch(e){ if(msg){msg.style.color='var(--expense)';msg.textContent='서버 연결 실패';} }
  }
  async function loadShortage(){
    const d=await fetch(session.api+'/api/dashboard/funnel/shortage?months='+mq(),{headers:auth()}).then(r=>r.json());
    const items=d.items||[];
    if(!items.length){ $('body').innerHTML='<div class="hint" style="margin-top:10px">해당 기간 부족분이 없습니다.</div>'; return; }
    let h='<div class="hint" style="margin-top:8px">SKU를 클릭하면 어느 고객·매출에서 부족이 발생했는지 펼칩니다. (발주=부족분 해소 처리)</div>';
    h+='<table><thead><tr><th>CTR 코드</th><th>제품명</th><th class="r">현재고</th><th class="r">미발주(open)</th><th class="r">발주됨(resolved)</th></tr></thead><tbody>';
    items.forEach(s=>{
      h+='<tr class="click" onclick="toggleShort('+s.product_id+')"><td><b>'+esc(s.ctr_code||'')+'</b></td><td>'+esc(s.product_name||'')+'</td><td class="r">'+(s.stock_qty==null?'-':nf(s.stock_qty))+'</td><td class="r" style="color:var(--expense);font-weight:700">'+nf(s.open_qty)+'</td><td class="r okv">'+nf(s.ordered_qty)+'</td></tr>';
      if(openRows['s'+s.product_id]) h+='<tr class="sub"><td colspan="5">'+(openRows['s'+s.product_id]==='loading'?'불러오는 중…':openRows['s'+s.product_id])+'</td></tr>';
    });
    h+='</tbody></table>';
    $('body').innerHTML=h;
  }
  async function toggleShort(pid){
    if(openRows['s'+pid]){ delete openRows['s'+pid]; return loadShortage(); }
    openRows['s'+pid]='loading'; await loadShortage();
    try{ const d=await fetch(session.api+'/api/dashboard/funnel/shortage-detail?product_id='+pid+'&months='+mq(),{headers:auth()}).then(r=>r.json());
      let t='<table style="margin:0"><thead><tr><th>발생일</th><th>고객</th><th class="r">요청</th><th class="r">출고</th><th class="r">부족</th><th>상태</th></tr></thead><tbody>';
      (d.items||[]).forEach(x=>{ t+='<tr><td>'+esc(x.occurred_at||'')+'</td><td>'+esc(x.customer_name||'(미상)')+'</td><td class="r">'+nf(x.requested_qty)+'</td><td class="r">'+nf(x.fulfilled_qty)+'</td><td class="r" style="color:var(--expense)">'+nf(x.shortage_qty)+'</td><td>'+(x.status==='resolved'?'<span class="pill ok">발주됨</span>':'<span class="pill low">미발주</span>')+'</td></tr>'; });
      t+='</tbody></table>'; openRows['s'+pid]=t; loadShortage();
    }catch(e){ openRows['s'+pid]='불러오지 못했습니다.'; loadShortage(); }
  }

  // ④ 개발 필요 → 개발요청 목록, 클릭 시 단계 상세
  const stLbl={received:'접수',reviewed:'검토완료',factory_requested:'공장요청',developed:'개발완료'};
  function splitApp(app){ const s=String(app||'').trim(); if(!s)return{maker:'',model:'',year:''}; const p=s.split(/\s+/); return {maker:p[0]||'',model:p[1]||'',year:p.slice(2).join(' ')||''}; }
  async function loadDev(){
    const d=await fetch(session.api+'/api/dashboard/funnel/dev?months='+mq(),{headers:auth()}).then(r=>r.json());
    const items=d.items||[];
    if(!items.length){ $('body').innerHTML='<div class="hint" style="margin-top:10px">해당 기간 개발필요 항목이 없습니다.</div>'; return; }
    let h='<div class="hint" style="margin-top:8px">항목을 클릭하면 단계별(접수→검토→공장→완료) 진행과 소요일을 펼칩니다.</div>';
    h+='<table><thead><tr><th>경쟁사코드</th><th>고객</th><th class="r">수량</th><th>상태</th><th>차량(메이커/차종/연식)</th><th>접수일</th><th>완료일</th><th class="r">소요</th></tr></thead><tbody>';
    items.forEach(r=>{ const v=splitApp(r.review_app); const veh=[v.maker,v.model,v.year].filter(Boolean).join(' / ');
      h+='<tr class="click" onclick="toggleDev('+r.id+')"><td><b>'+esc(r.input_code||'')+'</b></td><td>'+esc(r.customer_name||'-')+'</td><td class="r">'+(r.requested_qty==null?'-':nf(r.requested_qty))+'</td><td><span class="st '+r.status+'">'+(stLbl[r.status]||r.status)+'</span></td><td>'+esc(veh||'-')+'</td><td>'+esc(r.requested_at||'')+'</td><td>'+esc(r.developed_at||'-')+'</td><td class="r">'+(r.dur_total==null?'–':r.dur_total+'일')+'</td></tr>';
      if(openRows['d'+r.id]) h+='<tr class="sub"><td colspan="8">'+openRows['d'+r.id]+'</td></tr>';
    });
    h+='</tbody></table>';
    $('body').innerHTML=h;
  }
  function toggleDev(id){
    if(openRows['d'+id]){ delete openRows['d'+id]; return loadDev(); }
    // 데이터는 이미 목록에 있음 — 해당 row 찾아 단계 표시
    fetch(session.api+'/api/dashboard/funnel/dev?months='+mq(),{headers:auth()}).then(r=>r.json()).then(d=>{
      const r=(d.items||[]).find(x=>x.id===id); if(!r){ return; }
      const dd=(n)=> n==null?'–':(n+'일');
      let t='<table style="margin:0"><tbody>'
        +'<tr><td>① 오더 접수일</td><td><b>'+esc(r.requested_at||'-')+'</b></td><td></td></tr>'
        +'<tr><td>② 검토완료일</td><td><b>'+esc(r.reviewed_at||'-')+'</b></td><td class="hint">'+dd(r.dur_review)+'</td></tr>'
        +'<tr><td>③ 공장 개발요청일</td><td><b>'+esc(r.factory_requested_at||'-')+'</b></td><td class="hint">'+dd(r.dur_factory)+'</td></tr>'
        +'<tr><td>④ 개발완료일</td><td><b>'+esc(r.developed_at||'-')+'</b></td><td class="hint">'+dd(r.dur_develop)+'</td></tr>'
        +'<tr><td><b>전체</b></td><td>'+(r.result_ctr_code?('→ <b>'+esc(r.result_ctr_code)+'</b>'):'')+'</td><td class="hint"><b>'+dd(r.dur_total)+'</b></td></tr>'
        +'</tbody></table>';
      openRows['d'+id]=t; loadDev();
    });
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
