<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 수주 흐름 추이</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--gold:#B8893B;--purple:#6B4FB0;--brand:#143D34;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1080px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:4px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.sm{padding:5px 10px;font-size:12px}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:#F6E7E4;color:var(--expense)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .kpibar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .kpibox{background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:150px}
  .kpibox .v{font-size:26px;font-weight:800;color:var(--income)}.kpibox .l{font-size:11px;color:var(--muted);margin-top:2px}
  .delta{font-size:12px;font-weight:700}.delta.up{color:var(--income)}.delta.down{color:var(--expense)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
  th,td{padding:8px 9px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700;position:sticky;top:0}
  .barcell{position:relative;min-width:160px}
  .bar{height:18px;border-radius:4px;background:var(--income);display:inline-block;vertical-align:middle}
  .bartrack{background:#eee;border-radius:4px;height:18px;width:120px;display:inline-block;vertical-align:middle;overflow:hidden;margin-right:8px}
  .okpct{font-weight:800;color:var(--income)}
  .seg{display:inline-flex;height:16px;border-radius:3px;overflow:hidden;width:130px;vertical-align:middle;margin-right:8px;border:1px solid var(--line)}
  .seg i{display:block;height:100%}
  .si{background:var(--income)}.ss{background:var(--gold)}.sd{background:var(--purple)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">수주 흐름 월별 추이 · 즉시매출 비중 KPI</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="card-h">핵심 KPI — 즉시 매출 비중</div>
      <div class="hint">고객이 요청한 것 중 우리가 <b>바로 팔 수 있는 비중</b>입니다. 이 %가 매월 올라가는 것이 목표입니다(부족·미개발 비중↓ = 매출 기회↑).</div>
      <div class="kpibar" id="kpibar"></div>
    </div>

    <div class="card">
      <div class="card-h">월별 추이 <span class="hint" style="font-weight:500">— 최근 12개월 (수량 기준 비중)</span></div>
      <div id="trendWrap"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
      <div class="hint" style="margin-top:10px">막대: <span class="okpct">■</span> 즉시매출 · <span style="color:var(--gold)">■</span> 부족 · <span style="color:var(--purple)">■</span> 개발필요 (수량 비중). SKU·수량과 각 %를 함께 표시합니다.</div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nf=(n)=>Number(n||0).toLocaleString('es-MX');
  const pct=(a,b)=> b>0 ? (Math.round((a/b)*1000)/10) : 0;

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  async function load(){
    try{ const d=await fetch(session.api+'/api/dashboard/order-funnel/trend?n=12',{headers:auth()}).then(r=>r.json()); render(d.rows||[]); }
    catch(e){ $('trendWrap').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; }
  }
  function render(rows){
    // 데이터 있는 달만 (요청>0)
    const withData=rows.filter(r=>r.req_qty>0);
    // KPI: 최신 달 즉시매출% + 전월 대비
    const last=withData[withData.length-1], prev=withData[withData.length-2];
    let kpi='';
    if(last){
      const cur=last.ok_qty_pct;
      let delta='';
      if(prev){ const dv=Math.round((cur-prev.ok_qty_pct)*10)/10; delta='<span class="delta '+(dv>=0?'up':'down')+'">'+(dv>=0?'▲ +':'▼ ')+dv+'%p</span>'; }
      kpi+='<div class="kpibox"><div class="v">'+cur+'%</div><div class="l">최근('+last.ym+') 즉시매출 비중(수량) '+delta+'</div></div>';
      // 평균
      const avg=Math.round(withData.reduce((a,b)=>a+b.ok_qty_pct,0)/withData.length*10)/10;
      kpi+='<div class="kpibox"><div class="v" style="color:var(--brand)">'+avg+'%</div><div class="l">기간 평균 즉시매출 비중</div></div>';
      // 부족+개발 (기회손실)
      const loss=Math.round((100-cur)*10)/10;
      kpi+='<div class="kpibox"><div class="v" style="color:var(--expense)">'+loss+'%</div><div class="l">최근 즉시 못판 비중(부족+개발)</div></div>';
    } else { kpi='<div class="hint">데이터가 아직 없습니다.</div>'; }
    $('kpibar').innerHTML=kpi;

    if(!withData.length){ $('trendWrap').innerHTML='<div class="hint" style="margin-top:10px">견적 데이터가 있는 달이 없습니다.</div>'; return; }
    let h='<div style="overflow-x:auto"><table><thead><tr>'
      +'<th>월</th><th>요청 SKU</th><th>요청 수량</th><th>구성 (수량 비중)</th>'
      +'<th>즉시 %</th><th>부족 %</th><th>개발 %</th></tr></thead><tbody>';
    withData.forEach(r=>{
      const oi=r.ok_qty_pct, ss=r.short_qty_pct, dd=r.dev_qty_pct;
      h+='<tr>'
        +'<td><b>'+esc(r.ym)+'</b></td>'
        +'<td>'+nf(r.req_sku)+'</td>'
        +'<td>'+nf(r.req_qty)+'</td>'
        +'<td class="barcell"><span class="seg"><i class="si" style="width:'+oi+'%"></i><i class="ss" style="width:'+ss+'%"></i><i class="sd" style="width:'+dd+'%"></i></span></td>'
        +'<td class="okpct">'+oi+'%</td>'
        +'<td style="color:var(--gold)">'+ss+'%</td>'
        +'<td style="color:var(--purple)">'+dd+'%</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    $('trendWrap').innerHTML=h;
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
</body>
</html>
