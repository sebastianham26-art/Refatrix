<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix ERP · 수주 흐름 추이</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E6E1D6;
    --income:#0F6E56;--income-bg:#E4F0EB;--expense:#B23A2E;--gold:#B8893B;--purple:#6B4FB0;--brand:#143D34;--radius:12px;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:24px}
  .wrap{max-width:1080px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:12px;background:var(--brand);color:#fff;padding:14px 18px;border-radius:var(--radius)}
  .topbar h1{margin:0;font-size:18px}.topbar .sub{font-size:12px;color:#cfe0d8}
  .portalBtn{color:#cfe0d8;font-size:12px;text-decoration:none;border:1px solid #2f5d50;padding:5px 10px;border-radius:7px;margin-left:auto}
  .who{font-size:13px;text-align:right;margin-left:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
  .card-h{font-size:14px;font-weight:800;color:var(--brand);margin-bottom:4px}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 4px;font-weight:600}
  input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
  .btn{padding:8px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}.btn.sm{padding:5px 10px;font-size:12px}
  .msg{margin-top:10px;font-size:13px;border-radius:8px;padding:9px 12px;display:none}
  .msg.err{display:block;background:#F6E7E4;color:var(--expense)}
  .api{margin-top:12px;font-size:11px;color:var(--muted)}.api input{font-size:12px;padding:6px 8px;margin-top:3px;width:100%}
  .hidden{display:none}.hint{font-size:11.5px;color:var(--muted);line-height:1.5}
  .kpibar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .kpibox{background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:150px}
  .kpibox .v{font-size:26px;font-weight:800;color:var(--income)}.kpibox .l{font-size:11px;color:var(--muted);margin-top:2px}
  .delta{font-size:12px;font-weight:700}.delta.up{color:var(--income)}.delta.down{color:var(--expense)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:12px}
  th,td{padding:8px 9px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{font-size:11px;color:var(--muted);background:#faf8f3;font-weight:700;position:sticky;top:0}
  .barcell{position:relative;min-width:160px}
  .bar{height:18px;border-radius:4px;background:var(--income);display:inline-block;vertical-align:middle}
  .bartrack{background:#eee;border-radius:4px;height:18px;width:120px;display:inline-block;vertical-align:middle;overflow:hidden;margin-right:8px}
  .okpct{font-weight:800;color:var(--income)}
  .seg{display:inline-flex;height:16px;border-radius:3px;overflow:hidden;width:130px;vertical-align:middle;margin-right:8px;border:1px solid var(--line)}
  .seg i{display:block;height:100%}
  .si{background:var(--income)}.ss{background:var(--gold)}.sd{background:var(--purple)}
  .tg{display:inline-flex;align-items:center;gap:4px}
  .tgl{font-size:11px;font-weight:700;color:var(--muted);margin-right:2px}
  .tgb{padding:5px 11px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
  .tgb.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .chartbox{background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:8px 6px 4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div><h1>Refatrix ERP</h1><div class="sub">수주 흐름 월별 추이 · 즉시매출 비중 KPI</div></div><a href="refatrix-portal.html" class="portalBtn">← 포털</a><div class="who" id="who"></div></div>

  <div class="card" id="loginCard">
    <div class="card-h">로그인</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><div><label>아이디</label><input id="lid" type="text" value="admin" style="width:140px"></div><div><label>PIN</label><input id="pin" type="password" placeholder="••••" style="width:120px"></div></div>
    <button class="btn" id="go" style="margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg"></div>
    <div class="api">서버 주소(API)<input id="api" type="text" value="https://refatrix-production.up.railway.app"></div>
  </div>

  <div class="hidden" id="app">
    <div class="card">
      <div class="card-h">핵심 KPI — 즉시 매출 비중</div>
      <div class="hint">고객이 요청한 것 중 우리가 <b>바로 팔 수 있는 비중</b>입니다. 이 %가 매월 올라가는 것이 목표입니다(부족·미개발 비중↓ = 매출 기회↑).</div>
      <div class="kpibar" id="kpibar"></div>
    </div>

    <div class="card">
      <div class="card-h" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span id="trendTitle">월별 추이</span>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
          <div class="tg"><span class="tgl">보기</span>
            <button class="tgb on" id="byMonth" onclick="setBy('month')">월별</button>
            <button class="tgb" id="byOrder" onclick="setBy('order')">오더별</button>
          </div>
          <div class="tg" id="periodTg"><span class="tgl">기간</span></div>
        </div>
      </div>
      <div id="chartWrap" style="margin-top:6px"></div>
      <div class="hint" style="margin-top:4px;text-align:center">선 = 전체 요청 수량 · <span style="color:var(--income)">음영</span> = 즉시매출 가능 수량. <b>음영(즉시매출)이 점점 두꺼워지는 것이 목표</b>입니다.</div>
      <div id="trendWrap" style="margin-top:14px"><div class="hint" style="margin-top:10px">불러오는 중…</div></div>
      <div class="hint" style="margin-top:10px">막대: <span class="okpct">■</span> 즉시매출 · <span style="color:var(--gold)">■</span> 부족 · <span style="color:var(--purple)">■</span> 개발필요 (수량 비중). SKU·수량과 각 %를 함께 표시합니다.</div>
    </div>
  </div>
</div>

<script>
  let session={token:null,user:null,api:''};
  const $=(id)=>document.getElementById(id);
  const auth=()=>({'Authorization':'Bearer '+session.token});
  const esc=(s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nf=(n)=>Number(n||0).toLocaleString('es-MX');
  const pct=(a,b)=> b>0 ? (Math.round((a/b)*1000)/10) : 0;

  function portalSession(){
    try{ const raw=sessionStorage.getItem('refatrix_session'); if(raw){ const o=JSON.parse(raw); if(o&&o.token) return o; } }catch(e){}
    try{ const h=location.hash.slice(1); if(h){ const p=new URLSearchParams(h); const token=p.get('token'); if(token){ const o={token,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; try{sessionStorage.setItem('refatrix_session',JSON.stringify(o));}catch(e){} return o; } } }catch(e){}
    return null;
  }
  async function login(){
    const api=$('api').value.replace(/\/+$/,'');const login_id=$('lid').value.trim(),pin=$('pin').value.trim();
    const m=$('loginMsg');m.className='msg';
    if(!login_id||!pin){m.className='msg err';m.textContent='아이디와 PIN을 입력하세요.';return;}
    $('go').disabled=true;$('go').textContent='확인 중…';
    try{
      let d,res={ok:true};const ps=portalSession();
      if(ps&&ps.token){d={token:ps.token,user:ps.user};}
      else{res=await fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login_id,pin})});d=await res.json();}
      if(!res.ok||d.error){m.className='msg err';m.textContent='로그인 실패: '+(d.error||res.status);return;}
      session={token:d.token,user:d.user,api:(ps&&ps.api)||api};
      try{sessionStorage.setItem('refatrix_session',JSON.stringify({token:session.token,api:session.api,user:session.user||{}}));}catch(e){}
      $('who').innerHTML='<b>'+esc(d.user?.name||login_id)+'</b><br>'+esc(d.user?.role||'-');
      $('loginCard').classList.add('hidden');$('app').classList.remove('hidden');
      renderPeriod(); load();
    }catch(e){m.className='msg err';m.textContent='서버에 연결할 수 없습니다.';}
    finally{$('go').disabled=false;$('go').textContent='로그인';}
  }

  let viewBy='month';            // 'month' | 'order'
  let period={month:12, order:20}; // 표시 개월수 / 오더 건수
  const PERIOD_OPTS={ month:[6,12,24], order:[10,20,50] };

  function setBy(b){ viewBy=b; $('byMonth').classList.toggle('on',b==='month'); $('byOrder').classList.toggle('on',b==='order'); $('trendTitle').textContent=(b==='month'?'월별 추이':'오더(견적)별 추이'); renderPeriod(); load(); }
  function setPeriod(n){ period[viewBy]=n; renderPeriod(); load(); }
  function renderPeriod(){
    const opts=PERIOD_OPTS[viewBy], unit=(viewBy==='month'?'개월':'건');
    $('periodTg').innerHTML='<span class="tgl">기간</span>'+opts.map(n=>'<button class="tgb'+(period[viewBy]===n?' on':'')+'" onclick="setPeriod('+n+')">'+n+unit+'</button>').join('');
  }

  async function load(){
    const n=period[viewBy];
    try{ const d=await fetch(session.api+'/api/dashboard/order-funnel/trend?by='+viewBy+'&n='+n,{headers:auth()}).then(r=>r.json()); render(d.rows||[]); }
    catch(e){ $('trendWrap').innerHTML='<div class="hint">불러오지 못했습니다.</div>'; $('chartWrap').innerHTML=''; }
  }

  // 전체 수량 선 + 즉시매출 영역 음영 SVG
  function drawChart(rows){
    if(!rows.length){ $('chartWrap').innerHTML=''; return; }
    const W=Math.max(620, rows.length*Math.max(46, Math.min(90, 700/rows.length))), H=240;
    const padL=46, padR=14, padT=16, padB=40;
    const iw=W-padL-padR, ih=H-padT-padB;
    const maxQ=Math.max(...rows.map(r=>r.req_qty),1);
    const niceMax=Math.ceil(maxQ/ (maxQ>50?50:10))*(maxQ>50?50:10) || maxQ;
    const x=(i)=> padL + (rows.length===1? iw/2 : (i*iw/(rows.length-1)));
    const y=(v)=> padT + ih - (v/niceMax)*ih;
    const labelOf=(r)=> viewBy==='month' ? (r.ym? r.ym.slice(2).replace('-',''):'') : (r.label||'').replace(/^Q-?/,'').slice(-6);
    // 영역(즉시매출) path
    let area='M '+x(0)+' '+y(0);
    rows.forEach((r,i)=> area+=' L '+x(i)+' '+y(r.ok_qty));
    area+=' L '+x(rows.length-1)+' '+y(0)+' Z';
    // 전체 수량 선
    let line=''; rows.forEach((r,i)=> line+=(i?' L ':'M ')+x(i)+' '+y(r.req_qty));
    // 즉시매출 선(영역 상단 강조)
    let okline=''; rows.forEach((r,i)=> okline+=(i?' L ':'M ')+x(i)+' '+y(r.ok_qty));
    // 격자/축 눈금 (4단계)
    let grid='';
    for(let g=0;g<=4;g++){ const v=niceMax*g/4, yy=y(v); grid+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="#e6e1d6" stroke-width="1"/>'+'<text x="'+(padL-6)+'" y="'+(yy+3)+'" font-size="9" fill="#9b958a" text-anchor="end">'+nf(Math.round(v))+'</text>'; }
    // x 라벨 + 포인트 + 클릭 영역(도넛)
    let xl='', pts='';
    rows.forEach((r,i)=>{ xl+='<text x="'+x(i)+'" y="'+(H-padB+16)+'" font-size="9" fill="#6F6A60" text-anchor="middle"'+(rows.length>14?(' transform="rotate(40 '+x(i)+' '+(H-padB+16)+')"'):'')+'>'+esc(labelOf(r))+'</text>';
      pts+='<circle cx="'+x(i)+'" cy="'+y(r.req_qty)+'" r="2.5" fill="#143D34"/>'+'<circle cx="'+x(i)+'" cy="'+y(r.ok_qty)+'" r="2.5" fill="#0F6E56"/>'
        +'<circle cx="'+x(i)+'" cy="'+y(r.req_qty)+'" r="11" fill="transparent" style="cursor:pointer" onclick="showDonut('+i+')"><title>'+esc(labelOf(r))+' 클릭 → 구성 도넛</title></circle>'; });
    window.__chartRows=rows;
    const svg='<div style="overflow-x:auto" class="chartbox"><svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'
      +'<defs><linearGradient id="okg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0F6E56" stop-opacity="0.45"/><stop offset="1" stop-color="#0F6E56" stop-opacity="0.08"/></linearGradient></defs>'
      +grid
      +'<path d="'+area+'" fill="url(#okg)" stroke="none"/>'
      +'<path d="'+okline+'" fill="none" stroke="#0F6E56" stroke-width="2"/>'
      +'<path d="'+line+'" fill="none" stroke="#143D34" stroke-width="2" stroke-dasharray="0"/>'
      +pts+xl
      +'</svg></div><div class="hint" style="margin-top:4px;text-align:center">그래프의 점을 클릭하면 그 '+(viewBy==='month'?'달':'오더')+'의 구성 도넛이 아래에 나타납니다.</div><div id="donutWrap"></div>';
    $('chartWrap').innerHTML=svg;
  }

  // 월/오더 클릭 → 도넛 (즉시/부족/개발 구성, 가운데 즉시%)
  function showDonut(i){
    const rows=window.__chartRows||[]; const r=rows[i]; if(!r){ return; }
    const lab = viewBy==='month' ? (r.ym||r.label) : (r.label||'');
    const ok=Number(r.ok_qty)||0, ss=Number(r.short_qty)||0, dv=Number(r.dev_qty)||0;
    const tot=ok+ss+dv;
    if(tot<=0){ $('donutWrap').innerHTML='<div class="hint" style="text-align:center;margin-top:8px">'+esc(lab)+' : 데이터 없음</div>'; return; }
    const okPct=Math.round(ok/tot*1000)/10;
    const cx=110, cy=110, rO=80, rI=50, C=2*Math.PI;
    const segs=[['#0F6E56',ok,'즉시'],['#B8893B',ss,'부족'],['#6B4FB0',dv,'개발']];
    let acc=0, arcs='';
    segs.forEach(([col,val])=>{ if(val<=0) return; const frac=val/tot; const a0=acc*C-Math.PI/2, a1=(acc+frac)*C-Math.PI/2; acc+=frac;
      const large=frac>0.5?1:0;
      const x0=cx+rO*Math.cos(a0), y0=cy+rO*Math.sin(a0), x1=cx+rO*Math.cos(a1), y1=cy+rO*Math.sin(a1);
      const xi1=cx+rI*Math.cos(a1), yi1=cy+rI*Math.sin(a1), xi0=cx+rI*Math.cos(a0), yi0=cy+rI*Math.sin(a0);
      arcs+='<path d="M '+x0+' '+y0+' A '+rO+' '+rO+' 0 '+large+' 1 '+x1+' '+y1+' L '+xi1+' '+yi1+' A '+rI+' '+rI+' 0 '+large+' 0 '+xi0+' '+yi0+' Z" fill="'+col+'"/>';
    });
    const legend=segs.map(([col,val,nm])=>'<span style="display:inline-flex;align-items:center;gap:4px;margin:0 8px"><span style="width:10px;height:10px;background:'+col+';display:inline-block;border-radius:2px"></span>'+nm+' '+nf(val)+' ('+(tot>0?Math.round(val/tot*1000)/10:0)+'%)</span>').join('');
    $('donutWrap').innerHTML='<div style="text-align:center;margin-top:10px"><div style="font-weight:800;color:var(--brand);margin-bottom:4px">'+esc(lab)+' 구성</div>'
      +'<svg width="220" height="220" viewBox="0 0 220 220">'+arcs
      +'<text x="110" y="104" text-anchor="middle" font-size="26" font-weight="800" fill="#0F6E56">'+okPct+'%</text>'
      +'<text x="110" y="124" text-anchor="middle" font-size="11" fill="#6F6A60">즉시매출</text></svg>'
      +'<div style="font-size:12px;margin-top:4px">'+legend+'</div></div>';
    setTimeout(()=>{ const dw=$('donutWrap'); if(dw) dw.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
  }

  function render(rows){
    const withData=rows.filter(r=>r.req_qty>0);
    drawChart(withData);
    // KPI: 최신 즉시매출% + 직전 대비
    const last=withData[withData.length-1], prev=withData[withData.length-2];
    const unitLbl=(viewBy==='month'?'월':'오더');
    let kpi='';
    if(last){
      const cur=last.ok_qty_pct;
      let delta='';
      if(prev){ const dv=Math.round((cur-prev.ok_qty_pct)*10)/10; delta='<span class="delta '+(dv>=0?'up':'down')+'">'+(dv>=0?'▲ +':'▼ ')+dv+'%p</span>'; }
      kpi+='<div class="kpibox"><div class="v">'+cur+'%</div><div class="l">최근 '+unitLbl+'('+esc(last.label||last.ym||'')+') 즉시매출 비중(수량) '+delta+'</div></div>';
      const avg=Math.round(withData.reduce((a,b)=>a+b.ok_qty_pct,0)/withData.length*10)/10;
      kpi+='<div class="kpibox"><div class="v" style="color:var(--brand)">'+avg+'%</div><div class="l">기간 평균 즉시매출 비중</div></div>';
      const loss=Math.round((100-cur)*10)/10;
      kpi+='<div class="kpibox"><div class="v" style="color:var(--expense)">'+loss+'%</div><div class="l">최근 즉시 못판 비중(부족+개발)</div></div>';
    } else { kpi='<div class="hint">데이터가 아직 없습니다.</div>'; }
    $('kpibar').innerHTML=kpi;

    if(!withData.length){ $('trendWrap').innerHTML='<div class="hint" style="margin-top:10px">'+(viewBy==='month'?'견적 데이터가 있는 달이 없습니다.':'견적(오더)이 없습니다.')+'</div>'; return; }
    const col1=(viewBy==='month'?'월':'견적(오더)');
    let h='<div style="overflow-x:auto"><table><thead><tr>'
      +'<th>'+col1+'</th>'+(viewBy==='order'?'<th>고객</th><th>일자</th>':'')+'<th>요청 SKU</th><th>요청 수량</th><th>구성 (수량 비중)</th>'
      +'<th>즉시 %</th><th>부족 %</th><th>개발 %</th></tr></thead><tbody>';
    withData.forEach(r=>{
      const oi=r.ok_qty_pct, ss=r.short_qty_pct, dd=r.dev_qty_pct;
      h+='<tr>'
        +'<td><b>'+esc(r.label||r.ym||'')+'</b></td>'
        +(viewBy==='order'?'<td>'+esc(r.customer_name||'-')+'</td><td>'+esc(r.qdate||'')+'</td>':'')
        +'<td>'+nf(r.req_sku)+'</td>'
        +'<td>'+nf(r.req_qty)+'</td>'
        +'<td class="barcell"><span class="seg"><i class="si" style="width:'+oi+'%"></i><i class="ss" style="width:'+ss+'%"></i><i class="sd" style="width:'+dd+'%"></i></span></td>'
        +'<td class="okpct">'+oi+'%</td>'
        +'<td style="color:var(--gold)">'+ss+'%</td>'
        +'<td style="color:var(--purple)">'+dd+'%</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    $('trendWrap').innerHTML=h;
  }

  $('go').addEventListener('click',login);
  $('pin').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  (function(){ const ps=portalSession(); if(ps&&ps.token){ $('api').value=ps.api||$('api').value; $('lid').value='-';$('pin').value='-'; setTimeout(()=>login(),30); } })();
</script>
<script src="refatrix-nav.js"></script>
</body>
</html>
