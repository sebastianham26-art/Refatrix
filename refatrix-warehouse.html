<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix · 창고 포장</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E2DCCF;--steel:#52708A;--steel-d:#33495C;--gold:#B8893B;--red:#C0533B;--green:#3E7D5A;--radius:16px;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:16px;line-height:1.45;-webkit-text-size-adjust:100%}
  .wrap{max-width:980px;margin:0 auto}
  .head{background:var(--steel);color:#fff;padding:18px 22px;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .head h1{margin:0;font-size:26px;font-weight:800}
  .head .who{font-size:14px;color:#e7eef4;text-align:right;line-height:1.4}
  .head .who b{color:#fff;font-weight:800;font-size:16px}
  .sec{margin-top:18px}
  .sec-t{font-size:17px;font-weight:800;color:var(--steel-d);margin:0 4px 4px;display:flex;align-items:center;justify-content:space-between}
  .sec-t .cnt{font-weight:800;color:#fff;background:var(--steel);border-radius:999px;padding:2px 14px;font-size:16px}
  .bznote{font-size:13px;color:var(--muted);font-weight:600;margin:0 4px 12px}
  .bznote b{color:var(--steel-d)}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:6px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .qcard:active{background:#fbf9f4}
  .qcard .no{font-size:28px;font-weight:800;line-height:1.1;grid-column:1}
  .qcard .cu{font-size:20px;font-weight:700;color:#2c2a26;grid-column:1}
  .qcard .meta{grid-column:1;display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:2px;align-items:baseline}
  .qcard .meta .lab{font-size:13px;color:var(--muted);font-weight:600}
  .qcard .meta .val{font-size:16px;font-weight:700;color:#3a372f}
  .qcard .elap .t{font-size:22px;font-weight:800;color:var(--steel-d);font-variant-numeric:tabular-nums}
  .qcard .qbox{grid-column:2;grid-row:1 / span 3;align-self:center;text-align:center;min-width:96px}
  .qcard .qbox .pc{font-size:40px;font-weight:800;line-height:1}
  .qcard .qbox .pcl{font-size:13px;font-weight:700;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;font-size:13px;font-weight:800;border-radius:999px;padding:3px 12px;margin-left:6px}
  .b-over{color:#fff;background:var(--red)}
  @keyframes warnPulse{0%,100%{background:#fdece9;box-shadow:0 0 0 1px rgba(192,83,59,.10)}50%{background:#f8d6cf;box-shadow:0 0 0 3px rgba(192,83,59,.42)}}
  .qcard.overdue{border-color:#dca295;animation:warnPulse 2.4s ease-in-out infinite}
  .qcard.overdue .no,.qcard.overdue .elap .t,.qcard.overdue .qbox .pc{color:var(--red)}
  @media (prefers-reduced-motion: reduce){.qcard.overdue{animation:none;background:#f8d6cf}}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted);font-size:18px;font-weight:600}

  /* 패킹 패널 (nav 위로) */
  .panel{position:fixed;inset:0;background:var(--paper);z-index:9500;display:none}
  .panel.on{display:flex;flex-direction:column}
  .ptop{flex:0 0 auto;width:100%;max-width:980px;margin:0 auto;padding:14px 16px 0}
  .pscroll{flex:1 1 auto;min-height:0;overflow:auto;width:100%;max-width:980px;margin:0 auto;padding:0 16px 16px;scrollbar-gutter:stable}
  .back{background:var(--steel);color:#fff;border:none;border-radius:12px;padding:14px 22px;font-size:19px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  .back:active{background:var(--steel-d)}
  .phead{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin:12px 0 10px;display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 18px}
  .phead .no{font-size:20px;font-weight:800;color:var(--steel-d)}
  .phead .cu{font-size:26px;font-weight:800}
  .phead .el{font-size:16px;font-weight:700;color:var(--steel-d);font-variant-numeric:tabular-nums}
  /* 진행 */
  .prog{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px}
  .prog .bar{height:14px;background:#eee6d8;border-radius:999px;overflow:hidden;margin-top:8px}
  .prog .bar i{display:block;height:100%;background:var(--steel);border-radius:999px;transition:width .2s}
  .prog .lab{font-size:15px;font-weight:700}
  .prog .lab b{font-size:20px}
  .done-banner{background:#e7f3ec;border:1px solid #bcdcc8;color:#2e6b49;border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;font-size:18px;font-weight:800;text-align:center}
  /* 스캔 바 */
  .scanbar{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;position:sticky;top:0;z-index:3}
  .scanrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .curbox{font-size:17px;font-weight:800;color:var(--steel-d)}
  .curbox select{font-size:16px;font-weight:700;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .btn{background:var(--steel);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:800;cursor:pointer}
  .btn.ghost{background:#eef2f5;color:var(--steel-d)}
  #eanInput{flex:1 1 220px;min-width:200px;font-size:24px;font-weight:800;letter-spacing:1px;padding:14px 16px;border:2px solid var(--steel);border-radius:12px;font-family:ui-monospace,Menlo,Consolas,monospace}
  .fb{margin-top:10px;font-size:18px;font-weight:800;border-radius:10px;padding:10px 14px;min-height:44px;display:flex;align-items:center}
  .fb.ok{background:#e7f3ec;color:#2e6b49}
  .fb.err{background:#fbe9e5;color:#a33b27}
  .fb.warn{background:#fbf4e7;color:#8a6516}
  .fb.idle{background:#f3efe6;color:#8a857a}
  /* 남은 품목 */
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);table-layout:fixed;border-radius:12px;overflow:hidden}
  th,td{padding:13px 10px;font-size:18px;text-align:left;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  th{background:var(--steel);color:#fff;font-weight:800;font-size:16px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.ean{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:15px}
  tr.done td{color:#9a958b;background:#f7f5ef}
  tr:last-child td{border-bottom:none}
  .rem{font-weight:800;font-size:20px}
  .rem.zero{color:var(--green)}
  .rem.pos{color:var(--red)}
  /* 박스 내역 */
  .boxc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .boxc h4{margin:0 0 6px;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
  .boxc .bl{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px dashed var(--line);font-size:16px}
  .boxc .bl .mm{background:#f3efe6;border:none;border-radius:8px;width:34px;height:34px;font-size:20px;font-weight:800;cursor:pointer;color:var(--red)}
  .seal{background:#eef2f5;color:var(--steel-d);border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer}
  .seal.on{background:var(--green);color:#fff}
  .subt{font-size:14px;font-weight:800;color:var(--steel-d);margin:14px 4px 8px}
  .modal{position:fixed;inset:0;background:rgba(20,30,26,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
  .modal.on{display:flex}
  .mbox{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:26px;box-shadow:0 16px 48px rgba(0,0,0,.32);text-align:center}
  .mbox .ic{font-size:44px}.mbox h3{margin:10px 0 6px;font-size:22px;font-weight:800}.mbox p{margin:0 0 18px;font-size:16px;color:var(--muted)}
  .mbtn{background:var(--steel);color:#fff;border:none;border-radius:12px;padding:14px 18px;font-size:18px;font-weight:800;cursor:pointer;width:100%}
  .soon{opacity:.6;font-size:13px;color:var(--muted);margin-top:14px;text-align:center}
</style>

<body>
<div class="wrap">
  <div class="head"><h1>창고 · 포장 작업</h1><div class="who" id="whoBox">—</div></div>
  <div class="sec">
    <div class="sec-t"><span>포장 대기 (포장지시 도착)</span><span class="cnt" id="qCount">—</span></div>
    <div class="bznote">⏱ 경과시간은 <b>업무시간만</b> 계산됩니다 · 월–금 07:30–17:00 (SLA 기준 동일)</div>
    <div id="queue"><div class="empty">불러오는 중…</div></div>
  </div>
  <div class="soon">입고 · 작업현황 화면은 다음 단계에서 추가됩니다.</div>
</div>

<!-- 패킹 패널 -->
<div class="panel" id="panel">
  <div class="ptop">
    <button class="back" id="backBtn">← 목록으로</button>
    <div class="phead" id="pHead"></div>
    <div class="prog" id="pProg"></div>
    <div id="pDone"></div>
    <div class="scanbar">
      <div class="scanrow">
        <span class="curbox">현재 박스: <select id="boxSel"></select></span>
        <button class="btn" id="newBoxBtn">+ 새 박스</button>
        <input id="eanInput" inputmode="none" autocomplete="off" placeholder="EAN-13 스캔/입력 후 Enter">
      </div>
      <div class="fb idle" id="fb">바코드를 스캔하세요</div>
    </div>
  </div>
  <div class="pscroll">
    <div class="subt">남은 품목 (스캔하면 줄어듭니다)</div>
    <table><thead><tr><th>CTR</th><th>EAN-13</th><th class="num">남음/필요</th><th>랙</th></tr></thead><tbody id="remBody"></tbody></table>
    <div class="subt">박스 내역</div>
    <div id="boxList"></div>
    <button class="back" id="backBtn2" style="width:100%;justify-content:center;padding:16px;margin:8px 0 12px">← 목록으로 돌아가기</button>
  </div>
</div>

<div class="modal" id="newModal"><div class="mbox"><div class="ic">📦</div><h3>새 포장지시 도착</h3><p id="newMsg">새 포장 작업이 내려왔습니다.</p><button class="mbtn" id="newOk">확인</button></div></div>

<script>
(function(){
  function sess(){
    try{ var r=sessionStorage.getItem('refatrix_session'); if(r){ var o=JSON.parse(r); if(o&&o.token) return o; } }catch(e){}
    try{ var h=location.hash.slice(1); if(h){ var p=new URLSearchParams(h); var t=p.get('token'); if(t) return {token:t,api:p.get('api')||'',user:JSON.parse(p.get('user')||'{}')}; } }catch(e){}
    return null;
  }
  var S=sess(); var API=(S&&S.api)||''; var AUTH=S?{Authorization:'Bearer '+S.token}:{};
  var JH=Object.assign({'Content-Type':'application/json'},AUTH);
  var $=function(id){return document.getElementById(id);};
  var who=$('whoBox'); if(S&&S.user){ who.innerHTML=(S.user.name?'<b>'+S.user.name+'</b><br>':'')+'역할: '+(S.user.role||'—'); } else who.textContent='로그인 필요';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function p2(n){ return (n<10?'0':'')+n; }
  function fmtDT(iso){ if(!iso) return '—'; try{ var d=new Date(iso); return p2(d.getMonth()+1)+'-'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes()); }catch(e){ return '—'; } }
  function fmtHoursDec(sec){ return (Math.round((Number(sec)||0)/360)/10).toFixed(1)+'h'; }
  function fmtClock(sec){ sec=Math.max(0,Math.floor(Number(sec)||0)); return p2(Math.floor(sec/3600))+':'+p2(Math.floor((sec%3600)/60))+':'+p2(sec%60); }
  function isBusinessNow(){ var mx=new Date(Date.now()-6*3600000); var dow=mx.getUTCDay(); if(dow<1||dow>5) return false; var m=mx.getUTCHours()*60+mx.getUTCMinutes(); return m>=450&&m<1020; }
  function beep(ok){ try{ var C=window.AudioContext||window.webkitAudioContext; if(!C) return; var ac=new C(); var o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.value=ok?1000:320; g.gain.setValueAtTime(0.001,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.3,ac.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(ok?0.18:0.4)); o.start(); o.stop(ac.currentTime+(ok?0.18:0.4)); }catch(e){} }

  // ---------- 큐 ----------
  var SEEN_KEY='wh_seen_queue', firstLoad=true;
  function loadQueue(){
    fetch(API+'/api/warehouse/packing-queue',{headers:AUTH}).then(function(r){return r.json();}).then(function(d){
      var items=(d&&d.items)||[]; $('qCount').textContent=items.length; renderQueue(items); checkNew(items);
    }).catch(function(){ $('queue').innerHTML='<div class="empty">목록을 불러오지 못했습니다.</div>'; });
  }
  function renderQueue(items){
    var box=$('queue');
    if(!items.length){ box.innerHTML='<div class="empty">대기 중인 포장지시가 없습니다.</div>'; return; }
    box.innerHTML=items.map(function(it){
      return '<div class="qcard'+(it.overdue?' overdue':'')+'" data-id="'+it.quote_id+'">'
        +'<div class="no">'+esc(it.quote_no||('#'+it.quote_id))+'</div>'
        +'<div class="cu">'+esc(it.customer)+'</div>'
        +'<div class="meta"><span><span class="lab">포장지시</span> <span class="val">'+fmtDT(it.printed_at)+'</span></span>'
        +'<span class="elap"><span class="lab">경과(업무)</span> <span class="t">'+fmtHoursDec(it.elapsed_biz_sec)+'</span>'
        +(it.overdue?'<span class="badge b-over">⚠ 지연 중</span>':'')+'</span></div>'
        +'<div class="qbox"><div class="pc">'+(it.total_qty==null?'—':it.total_qty)+'</div><div class="pcl">수량(피스)</div></div></div>';
    }).join('');
    Array.prototype.forEach.call(box.querySelectorAll('.qcard'),function(el){
      el.addEventListener('click',function(){ if(Date.now()<suppressCard) return; openPacking(Number(el.getAttribute('data-id'))); });
    });
  }
  function checkNew(items){
    var ids=items.map(function(x){return x.quote_id;}); var seen={};
    try{ (JSON.parse(sessionStorage.getItem(SEEN_KEY)||'[]')||[]).forEach(function(i){seen[i]=1;}); }catch(e){}
    var fresh=ids.filter(function(i){return !seen[i];});
    try{ sessionStorage.setItem(SEEN_KEY, JSON.stringify(ids)); }catch(e){}
    if(firstLoad){ firstLoad=false; return; }
    if(fresh.length){ $('newMsg').textContent='새 포장 작업 '+fresh.length+'건이 내려왔습니다.'; $('newModal').classList.add('on'); beep(true); }
  }
  $('newOk').addEventListener('click',function(){ $('newModal').classList.remove('on'); });

  // ---------- 패킹 ----------
  var PK=null, curBox=null, drillTimer=null, drillSec=0;
  function openPacking(id){ loadPacking(id, true); }
  function loadPacking(id, open){
    fetch(API+'/api/warehouse/packing/'+id,{headers:AUTH}).then(function(r){return r.json();}).then(function(d){
      if(!d||d.error) return;
      PK=d;
      var un=(d.boxes||[]).filter(function(b){return !b.sealed;});
      if(curBox==null || !(d.boxes||[]).some(function(b){return b.box_id===curBox;})) curBox = un.length? un[un.length-1].box_id : null;
      renderPacking();
      if(open){ $('panel').classList.add('on'); startDrillTimer(Number(d.elapsed_biz_sec)||0); }
      setTimeout(focusScan,60);
    }).catch(function(){});
  }
  function renderPacking(){
    var d=PK;
    $('pHead').innerHTML='<span class="no">'+esc(d.quote_no||('#'+d.quote_id))+'</span><span class="cu">'+esc(d.customer)+'</span>'
      +'<span class="el" id="pEl">경과 '+fmtHoursDec(d.elapsed_biz_sec)+' · '+fmtClock(d.elapsed_biz_sec)+'</span>';
    var pct=d.required_total? Math.round(d.scanned_total/d.required_total*100):0;
    $('pProg').innerHTML='<div class="lab">진행 <b>'+d.scanned_total+'</b> / '+d.required_total+' 피스 ('+pct+'%)</div><div class="bar"><i style="width:'+pct+'%"></i></div>';
    $('pDone').innerHTML = d.all_done ? '<div class="done-banner">✓ 모든 품목 스캔 완료 — 박스 사진 업로드는 다음 단계</div>' : '';
    // 박스 셀렉트
    var bs=$('boxSel'); bs.innerHTML=(d.boxes||[]).map(function(b){ return '<option value="'+b.box_id+'"'+(b.box_id===curBox?' selected':'')+(b.sealed?' disabled':'')+'>Box '+b.box_no+(b.sealed?' (봉인)':'')+'</option>'; }).join('') || '<option value="">박스 없음</option>';
    // 남은 품목
    var rows=(d.items||[]).slice().sort(function(a,b){ return (b.remaining>0)-(a.remaining>0) || String(a.ctr_code).localeCompare(String(b.ctr_code)); });
    $('remBody').innerHTML=rows.map(function(it){
      var done=it.remaining<=0;
      return '<tr class="'+(done?'done':'')+'"><td>'+esc(it.ctr_code)+(done?' ✓':'')+'</td><td class="ean">'+esc(it.ean||'—')+'</td>'
        +'<td class="num"><span class="rem '+(done?'zero':'pos')+'">'+it.remaining+'</span> / '+it.required+'</td><td>'+esc(it.rack_location||'—')+'</td></tr>';
    }).join('') || '<tr><td colspan="4" style="text-align:center;color:#9a958b">포장할 품목이 없습니다</td></tr>';
    // 박스 내역
    $('boxList').innerHTML=(d.boxes||[]).map(function(b){
      var lines=(b.lines||[]).map(function(l){ return '<div class="bl"><span>'+esc(l.ctr_code)+' <span style="color:#8a857a">('+esc(l.ean||'')+')</span></span><span><b style="font-size:18px">'+l.qty+'</b> '+(b.sealed?'':'<button class="mm" data-box="'+b.box_id+'" data-pid="'+l.product_id+'" title="1개 빼기">−</button>')+'</span></div>'; }).join('') || '<div class="bl" style="color:#9a958b">비어 있음</div>';
      return '<div class="boxc"><h4>Box '+b.box_no+' <button class="seal'+(b.sealed?' on':'')+'" data-box="'+b.box_id+'" data-seal="'+(b.sealed?'0':'1')+'">'+(b.sealed?'봉인됨 · 해제':'봉인')+'</button></h4>'+lines+'</div>';
    }).join('') || '<div class="empty">박스가 없습니다. "+ 새 박스"로 시작하세요.</div>';
    // 핸들러
    Array.prototype.forEach.call($('boxList').querySelectorAll('.mm'),function(b){ b.addEventListener('click',function(){ unscan(Number(b.getAttribute('data-box')),Number(b.getAttribute('data-pid'))); }); });
    Array.prototype.forEach.call($('boxList').querySelectorAll('.seal'),function(b){ b.addEventListener('click',function(){ sealBox(Number(b.getAttribute('data-box')), b.getAttribute('data-seal')==='1'); }); });
  }
  function postJSON(url, body){
    return fetch(url,{method:'POST',headers:JH,body:body?JSON.stringify(body):undefined})
      .then(function(r){ return r.json().catch(function(){return {};}).then(function(j){ return {status:r.status, ok:r.ok, body:j||{}}; }); });
  }
  function failMsg(o){
    if(o.status===403) return '⚠ 권한 없음: 창고 “수정·기록(edit)” 권한이 필요합니다 (디렉터→사용자·권한에서 설정)';
    if(o.status===401) return '⚠ 로그인 만료 — 다시 로그인하세요';
    if(o.status>=500 || (o.body&&/relation|table|column|does not exist/i.test(JSON.stringify(o.body)))) return '⚠ 서버 오류 — DB 마이그레이션(npm run migrate)이 적용됐는지 확인하세요';
    return '⚠ 실패: '+((o.body&&o.body.error)||('상태 '+o.status));
  }
  function feedback(msg, kind){ var f=$('fb'); f.className='fb '+(kind||'idle'); f.textContent=msg; }
  function focusScan(){ var e=$('eanInput'); if(e && $('panel').classList.contains('on')) { try{ e.focus(); }catch(_){} } }

  $('boxSel').addEventListener('change',function(){ var v=Number(this.value); if(v) curBox=v; focusScan(); });
  $('newBoxBtn').addEventListener('click',function(){
    if(!PK) return;
    postJSON(API+'/api/warehouse/packing/'+PK.quote_id+'/box').then(function(o){
      if(o.ok && o.body && o.body.box_id){ PK.boxes.push({box_id:o.body.box_id,box_no:o.body.box_no,sealed:false,lines:[]}); curBox=o.body.box_id; renderPacking(); feedback('Box '+o.body.box_no+' 생성 — 스캔을 시작하세요','idle'); }
      else { feedback(failMsg(o),'err'); beep(false); }
      focusScan();
    }).catch(function(){ feedback('⚠ 박스 생성 실패(통신)','err'); focusScan(); });
  });
  $('eanInput').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); doScan(); } });
  function doScan(){
    var inp=$('eanInput'); var v=(inp.value||'').trim(); inp.value='';
    if(!v){ focusScan(); return; }
    if(!curBox){ feedback('⚠ 먼저 "+ 새 박스"로 박스를 만드세요','warn'); beep(false); focusScan(); return; }
    postJSON(API+'/api/warehouse/packing/'+PK.quote_id+'/scan',{box_id:curBox,ean:v}).then(function(o){
        if(!o.ok && o.status!==400){ feedback(failMsg(o),'err'); beep(false); focusScan(); return; }
        var res=o.body||{};
        if(res.result==='ok'){ applyOk(res); feedback('✓ '+res.ctr_code+' → Box '+res.box_no+' (남음 '+res.remaining+')','ok'); beep(true); }
        else if(res.result==='wrong'){ feedback('⚠ 오품: 이 주문에 없는 제품 '+(res.ctr_code||v),'err'); beep(false); }
        else if(res.result==='excess'){ feedback('⚠ 초과: '+res.ctr_code+' 필요수량('+res.required+') 이미 충족','err'); beep(false); }
        else if(res.result==='unknown'){ feedback('⚠ 미등록 바코드: '+v,'err'); beep(false); }
        else if(res.error==='box_sealed'){ feedback('⚠ 봉인된 박스입니다. 다른 박스를 선택하세요','warn'); beep(false); }
        else if(res.error==='no_box'){ feedback('⚠ 먼저 박스를 만드세요','warn'); beep(false); }
        else { feedback('스캔 처리 오류','err'); }
        focusScan();
      }).catch(function(){ feedback('스캔 실패(통신)','err'); focusScan(); });
  }
  function applyOk(res){
    var it=(PK.items||[]).find(function(x){return x.product_id===res.product_id;});
    if(it){ it.scanned++; it.remaining=Math.max(0,it.required-it.scanned); }
    var b=(PK.boxes||[]).find(function(x){return x.box_id===curBox;});
    if(b){ var bl=(b.lines||[]).find(function(x){return x.product_id===res.product_id;}); if(bl) bl.qty++; else b.lines.push({product_id:res.product_id,ctr_code:res.ctr_code,ean:res.ean,qty:1}); }
    PK.scanned_total=res.scanned_total; PK.required_total=res.required_total; PK.all_done=res.all_done;
    renderPacking();
  }
  function unscan(boxId,pid){
    fetch(API+'/api/warehouse/packing/'+PK.quote_id+'/unscan',{method:'POST',headers:JH,body:JSON.stringify({box_id:boxId,product_id:pid})})
      .then(function(r){return r.json();}).then(function(){ loadPacking(PK.quote_id,false); feedback('1개 차감했습니다','idle'); });
  }
  function sealBox(boxId,seal){
    fetch(API+'/api/warehouse/packing/'+PK.quote_id+'/box/'+boxId+'/seal',{method:'POST',headers:JH,body:JSON.stringify({seal:seal})})
      .then(function(r){return r.json();}).then(function(){ if(seal && curBox===boxId) curBox=null; loadPacking(PK.quote_id,false); });
  }

  // 타이머
  function startDrillTimer(baseSec){ stopDrillTimer(); drillSec=baseSec||0; paintTimer(); drillTimer=setInterval(function(){ if(isBusinessNow()) drillSec++; paintTimer(); },1000); }
  function stopDrillTimer(){ if(drillTimer){ clearInterval(drillTimer); drillTimer=null; } }
  function paintTimer(){ var e=$('pEl'); if(e) e.textContent='경과 '+fmtHoursDec(drillSec)+' · '+fmtClock(drillSec)+(isBusinessNow()?'':' · 업무시간 외'); }

  // 돌아가기 (터치 클릭-통과 방지)
  var suppressCard=0;
  function closeDrill(e){ if(e){ if(e.preventDefault)e.preventDefault(); if(e.stopPropagation)e.stopPropagation(); } $('panel').classList.remove('on'); stopDrillTimer(); suppressCard=Date.now()+700; loadQueue(); }
  ['backBtn','backBtn2'].forEach(function(bid){ var b=$(bid); if(!b) return; b.addEventListener('click',closeDrill); b.addEventListener('touchend',function(e){ e.preventDefault(); closeDrill(e); },{passive:false}); });

  if(S){ loadQueue(); setInterval(loadQueue,25000); }
})();
</script>
