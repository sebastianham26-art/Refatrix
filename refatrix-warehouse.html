<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- __sessbridge --><script>(function(){try{var k="refatrix_session";if(!sessionStorage.getItem(k)){var v=localStorage.getItem(k);if(v)sessionStorage.setItem(k,v);}var _s=sessionStorage.setItem.bind(sessionStorage);sessionStorage.setItem=function(key,val){_s(key,val);if(key===k){try{localStorage.setItem(k,val);}catch(e){}}};}catch(e){}})();</script>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refatrix · 창고 포장</title>
<style>
  :root{--paper:#F4F1EA;--card:#FFFFFF;--ink:#1C1B19;--muted:#6F6A60;--line:#E2DCCF;--steel:#52708A;--steel-d:#33495C;--gold:#B8893B;--red:#C0533B;--green:#3E7D5A;--radius:16px;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans KR',system-ui,-apple-system,'Malgun Gothic',sans-serif;padding:16px;line-height:1.45;-webkit-text-size-adjust:100%}
  .wrap{max-width:980px;margin:0 auto}
  .head{background:var(--steel);color:#fff;padding:18px 22px;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .head h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.01em}
  .head .who{font-size:14px;color:#e7eef4;text-align:right;line-height:1.4}
  .head .who b{color:#fff;font-weight:800;font-size:16px}
  .sec{margin-top:18px}
  .sec-t{font-size:17px;font-weight:800;color:var(--steel-d);margin:0 4px 4px;display:flex;align-items:center;justify-content:space-between}
  .sec-t .cnt{font-weight:800;color:#fff;background:var(--steel);border-radius:999px;padding:2px 14px;font-size:16px}
  .bznote{font-size:13px;color:var(--muted);font-weight:600;margin:0 4px 12px}
  .bznote b{color:var(--steel-d)}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:6px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .qcard:active{background:#fbf9f4}
  .qcard .no{font-size:28px;font-weight:800;line-height:1.1;grid-column:1}
  .qcard .cu{font-size:20px;font-weight:700;color:#2c2a26;grid-column:1}
  .qcard .meta{grid-column:1;display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:2px;align-items:baseline}
  .qcard .meta .lab{font-size:13px;color:var(--muted);font-weight:600}
  .qcard .meta .val{font-size:16px;font-weight:700;color:#3a372f}
  .qcard .elap{display:inline-flex;align-items:baseline;gap:6px}
  .qcard .elap .t{font-size:22px;font-weight:800;color:var(--steel-d);font-variant-numeric:tabular-nums}
  .qcard .qbox{grid-column:2;grid-row:1 / span 3;align-self:center;text-align:center;min-width:96px}
  .qcard .qbox .pc{font-size:40px;font-weight:800;line-height:1;color:var(--ink)}
  .qcard .qbox .pcl{font-size:13px;font-weight:700;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;font-size:13px;font-weight:800;border-radius:999px;padding:3px 12px;margin-left:6px}
  .b-over{color:#fff;background:var(--red)}
  /* KPI 기준시간(포장완료 기한) 초과 = 지연: 붉은 음영 + 천천히 깜빡임 */
  @keyframes warnPulse{0%,100%{background:#fdece9;box-shadow:0 0 0 1px rgba(192,83,59,.10)}50%{background:#f8d6cf;box-shadow:0 0 0 3px rgba(192,83,59,.42)}}
  .qcard.overdue{border-color:#dca295;animation:warnPulse 2.4s ease-in-out infinite}
  .qcard.overdue .no,.qcard.overdue .elap .t,.qcard.overdue .qbox .pc{color:var(--red)}
  @media (prefers-reduced-motion: reduce){.qcard.overdue{animation:none;background:#f8d6cf}}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:32px;text-align:center;color:var(--muted);font-size:18px;font-weight:600}

  /* 드릴다운: nav(z9000) 위로 올려 돌아가기 버튼이 반드시 눌리게 */
  .panel{position:fixed;inset:0;background:var(--paper);z-index:9500;display:none}
  .panel.on{display:flex;flex-direction:column}
  .ptop{flex:0 0 auto;width:100%;max-width:980px;margin:0 auto;padding:16px 16px 8px}
  .tscroll{flex:1 1 auto;min-height:0;overflow:auto;width:100%;max-width:980px;margin:0 auto;padding:0 16px}
  .pbottom{flex:0 0 auto;width:100%;max-width:980px;margin:0 auto;padding:8px 16px 16px;background:var(--paper)}
  .back{background:var(--steel);color:#fff;border:none;border-radius:12px;padding:14px 22px;font-size:19px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  .back:active{background:var(--steel-d)}
  .phead{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;margin:12px 0 6px}
  .phead .no{font-size:22px;font-weight:800;color:var(--steel-d)}
  .phead .cu{font-size:34px;font-weight:800;line-height:1.15;margin:4px 0 12px}
  .phead .grid{display:flex;flex-wrap:wrap;gap:14px 30px}
  .phead .kv{display:flex;flex-direction:column}
  .phead .kv .lab{font-size:14px;color:var(--muted);font-weight:700}
  .phead .kv .val{font-size:24px;font-weight:800;color:#2c2a26;font-variant-numeric:tabular-nums}
  .phead .kv.timer .val{color:var(--steel-d);font-size:30px;letter-spacing:.5px}
  .phead .kv.timer .off{font-size:13px;font-weight:700;color:var(--gold)}

  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);table-layout:fixed}
  th,td{padding:15px 12px;font-size:19px;text-align:left;border-bottom:1px solid var(--line);width:20%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  th{background:var(--steel);color:#fff;font-weight:800;cursor:pointer;user-select:none;position:sticky;top:0;font-size:18px;z-index:2}
  th .ar{font-size:13px;margin-left:4px;opacity:.9}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.ean{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:17px}
  td.qty{font-weight:800;font-size:22px}
  tr:last-child td{border-bottom:none}
  tbody tr:nth-child(even){background:#faf8f3}
  .pfoot{display:flex;justify-content:space-between;align-items:center;padding:14px 8px 10px;font-size:20px;font-weight:700}
  .pfoot b{font-size:30px;font-weight:800}
  .backbottom{margin-top:6px;width:100%;justify-content:center;padding:16px}

  .modal{position:fixed;inset:0;background:rgba(20,30,26,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
  .modal.on{display:flex}
  .mbox{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:26px;box-shadow:0 16px 48px rgba(0,0,0,.32);text-align:center}
  .mbox .ic{font-size:44px}
  .mbox h3{margin:10px 0 6px;font-size:22px;font-weight:800}
  .mbox p{margin:0 0 18px;font-size:16px;color:var(--muted)}
  .mbtn{background:var(--steel);color:#fff;border:none;border-radius:12px;padding:14px 18px;font-size:18px;font-weight:800;cursor:pointer;width:100%}
  .soon{opacity:.6;font-size:13px;color:var(--muted);margin-top:14px;text-align:center}
</style>
<link rel="stylesheet" href="refatrix-i18n.css?v=20260621j">
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>창고 · 포장 작업</h1>
    <div class="who" id="whoBox">—</div>
  </div>

  <div class="sec">
    <div class="sec-t"><span>포장 대기 (포장지시 도착)</span><span class="cnt" id="qCount">—</span></div>
    <div class="bznote">⏱ 경과시간은 <b>업무시간만</b> 계산됩니다 · 월–금 07:30–17:00 (SLA 기준 동일)</div>
    <div id="queue"><div class="empty">불러오는 중…</div></div>
  </div>
  <div class="soon">입고 · 작업현황 화면은 다음 단계에서 추가됩니다.</div>
</div>

<!-- 드릴다운 패널 -->
<div class="panel" id="panel">
  <div class="ptop">
    <button class="back" id="backBtn">← 목록으로</button>
    <div class="phead" id="pHead"></div>
    <div class="bznote">⏱ 경과시간은 <b>업무시간만</b> 계산됩니다 · 월–금 07:30–17:00</div>
  </div>
  <div class="tscroll">
    <table id="pTable"><thead id="pThead"></thead><tbody id="pBody"></tbody></table>
  </div>
  <div class="pbottom">
    <div class="pfoot"><span>총 피스</span><b id="pTotal">0</b></div>
    <button class="back backbottom" id="backBtn2">← 목록으로 돌아가기</button>
  </div>
</div>

<!-- 새 포장지시 팝업 -->
<div class="modal" id="newModal">
  <div class="mbox">
    <div class="ic">📦</div>
    <h3>새 포장지시 도착</h3>
    <p id="newMsg">새 포장 작업이 내려왔습니다.</p>
    <button class="mbtn" id="newOk">확인</button>
  </div>
</div>

<script>
(function(){
  function sess(){
    try{ var r=sessionStorage.getItem('refatrix_session'); if(r){ var o=JSON.parse(r); if(o&&o.token) return o; } }catch(e){}
    try{ var h=location.hash.slice(1); if(h){ var p=new URLSearchParams(h); var t=p.get('token'); if(t) return {token:t, api:p.get('api')||'', user:JSON.parse(p.get('user')||'{}')}; } }catch(e){}
    return null;
  }
  var S=sess();
  var API=(S&&S.api)||'';
  var AUTH=S?{Authorization:'Bearer '+S.token}:{};
  var who=document.getElementById('whoBox');
  if(S&&S.user){ who.innerHTML=(S.user.name?'<b>'+S.user.name+'</b><br>':'')+'역할: '+(S.user.role||'—'); } else { who.textContent='로그인 필요'; }

  var $=function(id){return document.getElementById(id);};
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function p2(n){ return (n<10?'0':'')+n; }
  function fmtDateTime(iso){ if(!iso) return '—'; try{ var d=new Date(iso); return p2(d.getMonth()+1)+'-'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes()); }catch(e){ return '—'; } }
  function fmtElapsed(sec, withSec){
    sec=Math.max(0, Math.floor(Number(sec)||0));
    var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
    return withSec ? (p2(h)+':'+p2(m)+':'+p2(s)) : (p2(h)+':'+p2(m));
  }
  // 현재가 업무시간(월~금 07:30~17:00, UTC-6)인가 — 서버 규칙과 동일. 실시간 틱 on/off용.
  function isBusinessNow(){
    var mx=new Date(Date.now()-6*3600000);
    var dow=mx.getUTCDay(); if(dow<1||dow>5) return false;
    var m=mx.getUTCHours()*60+mx.getUTCMinutes();
    return m>=450 && m<1020;
  }

  // ---------- 큐 ----------
  var SEEN_KEY='wh_seen_queue';
  var firstLoad=true;
  function loadQueue(){
    fetch(API+'/api/warehouse/packing-queue',{headers:AUTH}).then(function(r){return r.json();}).then(function(d){
      var items=(d&&d.items)||[];
      $('qCount').textContent=items.length;
      renderQueue(items);
      checkNew(items);
    }).catch(function(){ $('queue').innerHTML='<div class="empty">목록을 불러오지 못했습니다.</div>'; });
  }
  function renderQueue(items){
    var box=$('queue');
    if(!items.length){ box.innerHTML='<div class="empty">대기 중인 포장지시가 없습니다.</div>'; return; }
    box.innerHTML=items.map(function(it){
      return '<div class="qcard'+(it.overdue?' overdue':'')+'" data-id="'+it.quote_id+'">'
        +'<div class="no">'+esc(it.quote_no||('#'+it.quote_id))+'</div>'
        +'<div class="cu">'+esc(it.customer)+'</div>'
        +'<div class="meta">'
          +'<span><span class="lab">포장지시</span> <span class="val">'+fmtDateTime(it.printed_at)+'</span></span>'
          +'<span class="elap"><span class="lab">경과(업무)</span> <span class="t">'+fmtElapsed(it.elapsed_biz_sec)+'</span>'
            +(it.overdue?'<span class="badge b-over">⚠ 지연 중</span>':'')+'</span>'
        +'</div>'
        +'<div class="qbox"><div class="pc">'+(it.total_qty==null?'—':it.total_qty)+'</div><div class="pcl">수량(피스)</div></div>'
        +'</div>';
    }).join('');
    Array.prototype.forEach.call(box.querySelectorAll('.qcard'),function(el){
      el.addEventListener('click',function(){ openDrill(Number(el.getAttribute('data-id'))); });
    });
  }
  function checkNew(items){
    var ids=items.map(function(x){return x.quote_id;});
    var seen={};
    try{ (JSON.parse(sessionStorage.getItem(SEEN_KEY)||'[]')||[]).forEach(function(i){seen[i]=1;}); }catch(e){}
    var fresh=ids.filter(function(i){return !seen[i];});
    try{ sessionStorage.setItem(SEEN_KEY, JSON.stringify(ids)); }catch(e){}
    if(firstLoad){ firstLoad=false; return; }
    if(fresh.length){ popupNew(fresh.length); chime(); }
  }
  function popupNew(n){ $('newMsg').textContent='새 포장 작업 '+n+'건이 내려왔습니다.'; $('newModal').classList.add('on'); }
  $('newOk').addEventListener('click',function(){ $('newModal').classList.remove('on'); });
  function chime(){ try{ var C=window.AudioContext||window.webkitAudioContext; if(!C) return; var ac=new C(); var o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(0.001,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.25,ac.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5); o.start(); o.stop(ac.currentTime+0.5); }catch(e){} }

  // ---------- 드릴다운 ----------
  var curItems=[], sortKey='ctr_code', sortDir=1, drillTimer=null, drillSec=0;
  var COLS=[['ctr_code','CTR',false],['syd_code','SYD',false],['ean','EAN-13',false],['qty','수량',true],['rack_location','랙',false]];
  function openDrill(id){
    fetch(API+'/api/warehouse/packing-queue/'+id,{headers:AUTH}).then(function(r){return r.json();}).then(function(d){
      if(!d||d.error) return;
      $('pHead').innerHTML='<div class="no">'+esc(d.quote_no||('#'+d.quote_id))+'</div>'
        +'<div class="cu">'+esc(d.customer)+'</div>'
        +'<div class="grid">'
          +'<div class="kv"><span class="lab">SKU</span><span class="val">'+d.sku_count+'종</span></div>'
          +'<div class="kv"><span class="lab">총 수량</span><span class="val">'+d.total_pieces+' 피스</span></div>'
          +'<div class="kv"><span class="lab">포장지시</span><span class="val">'+fmtDateTime(d.printed_at)+'</span></div>'
          +'<div class="kv timer"><span class="lab">경과시간 (업무, 실시간)</span><span class="val" id="pElapsed">'+fmtElapsed(d.elapsed_biz_sec,true)+'</span><span class="off" id="pOff"></span></div>'
        +'</div>';
      curItems=d.items||[]; sortKey='ctr_code'; sortDir=1;
      $('pTotal').textContent=d.total_pieces;
      renderTable();
      $('panel').classList.add('on');
      var ts=document.querySelector('.tscroll'); if(ts) ts.scrollTop=0;
      startDrillTimer(Number(d.elapsed_biz_sec)||0);
    }).catch(function(){});
  }
  function startDrillTimer(baseSec){
    stopDrillTimer(); drillSec=baseSec||0; paintTimer();
    drillTimer=setInterval(function(){ if(isBusinessNow()) drillSec++; paintTimer(); },1000);
  }
  function stopDrillTimer(){ if(drillTimer){ clearInterval(drillTimer); drillTimer=null; } }
  function paintTimer(){ var e=$('pElapsed'), o=$('pOff'); if(e) e.textContent=fmtElapsed(drillSec,true); if(o) o.textContent=isBusinessNow()?'':'업무시간 외 — 정지'; }
  function renderTable(){
    $('pThead').innerHTML='<tr>'+COLS.map(function(c){
      var ar=(sortKey===c[0])?('<span class="ar">'+(sortDir>0?'▲':'▼')+'</span>'):'';
      return '<th class="'+(c[2]?'num':'')+'" data-k="'+c[0]+'">'+c[1]+ar+'</th>';
    }).join('')+'</tr>';
    var rows=curItems.slice().sort(function(a,b){
      var x=a[sortKey], y=b[sortKey];
      if(sortKey==='qty'){ x=Number(x)||0; y=Number(y)||0; return (x-y)*sortDir; }
      x=String(x||''); y=String(y||''); return x.localeCompare(y)*sortDir;
    });
    $('pBody').innerHTML=rows.map(function(it){
      return '<tr><td>'+esc(it.ctr_code)+'</td><td>'+esc(it.syd_code||'—')+'</td>'
        +'<td class="ean">'+esc(it.ean||'—')+'</td>'
        +'<td class="num qty">'+it.qty+'</td><td>'+esc(it.rack_location||'—')+'</td></tr>';
    }).join('');
    Array.prototype.forEach.call($('pThead').querySelectorAll('th'),function(th){
      th.addEventListener('click',function(){ var k=th.getAttribute('data-k'); if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=1; } renderTable(); });
    });
  }
  function closeDrill(){ $('panel').classList.remove('on'); stopDrillTimer(); }
  $('backBtn').addEventListener('click',closeDrill);
  $('backBtn2').addEventListener('click',closeDrill);

  // ---------- boot + 폴링 ----------
  if(S){ loadQueue(); setInterval(loadQueue, 25000); }
})();
</script>

</body>
</html>
